<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Pro - LaserApp Storage</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: #000; color: white; overflow: hidden; }
        
        #sidebar { width: 280px; background: #1c1c1e; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; }
        #project-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        
        .project-item { 
            padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; 
            background: #2c2c2e; border: 1px solid transparent; transition: all 0.2s;
        }
        .project-item:hover { background: #3a3a3c; }
        .project-item.active { border-color: #0A84FF; background: #3a3a3c; }
        .project-name { font-weight: bold; font-size: 14px; }

        #main-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; position: relative; }
        #main-image { max-width: 95%; max-height: 95%; border-radius: 4px; display: none; object-fit: contain; }
        .no-selection { color: #666; font-size: 16px; text-align: center; padding: 20px; }

        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #0A84FF; color: white; font-weight: bold; cursor: pointer; }
        #status { font-size: 11px; color: #888; padding: 8px; text-align: center; background: #1c1c1e; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <button id="authBtn">🔑 Увійти в Google Drive</button>
        </div>
        <div id="project-list">
            <div class="no-selection">Увійдіть для перегляду проектів</div>
        </div>
        <div id="status">LaserApp: Очікування...</div>
    </div>

    <div id="main-view">
        <div id="no-project-msg" class="no-selection">Оберіть проект із папки LaserApp</div>
        <img id="main-image">
    </div>

<script>
    const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest";
    const SCOPES = "https://www.googleapis.com/auth/drive.file";

    let tokenClient;
    let accessToken = null;
    let rootFolderId = null;

    function gapiLoaded() {
        gapi.load('client', async () => {
            await gapi.client.init({apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC]});
        });
    }

    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: async (res) => {
                if (res.error) return;
                accessToken = res.access_token;
                document.getElementById('authBtn').innerText = "✅ Доступ до Drive";
                await initMainFolder();
            },
        });
    }

    document.getElementById('authBtn').onclick = () => tokenClient.requestAccessToken();

    // 1. Пошук або створення головної папки "LaserApp"
    async function initMainFolder() {
        document.getElementById('status').innerText = "Пошук папки LaserApp...";
        try {
            const response = await gapi.client.drive.files.list({
                q: "name = 'LaserApp' and mimeType = 'application/vnd.google-apps.folder' and trashed = false",
                fields: 'files(id, name)'
            });

            if (response.result.files.length > 0) {
                rootFolderId = response.result.files[0].id;
                document.getElementById('status').innerText = "LaserApp знайдено";
            } else {
                document.getElementById('status').innerText = "Створення папки LaserApp...";
                const createRes = await gapi.client.drive.files.create({
                    resource: { name: 'LaserApp', mimeType: 'application/vnd.google-apps.folder' },
                    fields: 'id'
                });
                rootFolderId = createRes.result.id;
                document.getElementById('status').innerText = "LaserApp створено";
            }
            loadProjects();
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "Помилка ініціалізації сховища";
        }
    }

    // 2. Завантаження проектів (тільки зсередини LaserApp)
    async function loadProjects() {
        const listEl = document.getElementById('project-list');
        listEl.innerHTML = "Завантаження...";
        
        try {
            const response = await gapi.client.drive.files.list({
                q: `'${rootFolderId}' in parents and mimeType = 'application/vnd.google-apps.folder' and trashed = false`,
                fields: 'files(id, name)',
                orderBy: 'name'
            });

            const folders = response.result.files;
            listEl.innerHTML = "";

            if (folders && folders.length > 0) {
                folders.forEach(folder => {
                    const div = document.createElement('div');
                    div.className = 'project-item';
                    div.innerHTML = `<span class="project-name">📂 ${folder.name}</span>`;
                    div.onclick = () => selectProject(folder.id, div);
                    listEl.appendChild(div);
                });
            } else {
                listEl.innerHTML = "<div class='no-selection'>У LaserApp поки немає проектів</div>";
            }
        } catch (err) {
            document.getElementById('status').innerText = "Помилка списку проектів";
        }
    }

    // 3. Завантаження фото конкретного проекту
    async function selectProject(folderId, element) {
        document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        
        const imgEl = document.getElementById('main-image');
        const msgEl = document.getElementById('no-project-msg');
        
        imgEl.style.display = "none";
        msgEl.innerText = "Завантаження фото...";
        msgEl.style.display = "block";
        
        try {
            const response = await gapi.client.drive.files.list({
                q: `'${folderId}' in parents and mimeType contains 'image/' and trashed = false`,
                fields: 'files(id)',
                pageSize: 1
            });

            const files = response.result.files;
            if (files && files.length > 0) {
                const res = await fetch(`https://www.googleapis.com/drive/v3/files/${files[0].id}?alt=media`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const blob = await res.blob();
                imgEl.src = URL.createObjectURL(blob);
                imgEl.onload = () => {
                    imgEl.style.display = "block";
                    msgEl.style.display = "none";
                };
            } else {
                msgEl.innerText = "У проекті немає фото";
            }
        } catch (err) {
            msgEl.innerText = "Помилка завантаження файлу";
        }
    }
</script>

<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
