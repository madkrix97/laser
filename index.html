<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaserApp - Stable Drive Access</title>
<style>
    body { margin:0; font-family:-apple-system,sans-serif; background:#111; color:white; display:flex; height:100vh; }
    #sidebar { width:260px; background:#1c1c1e; border-right:1px solid #333; display:flex; flex-direction:column; }
    .btn { padding:10px; margin:5px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
    .btn-dark{background:#3a3a3c;color:white;} .btn-blue{background:#0A84FF;color:white;}
    #project-list { flex:1; overflow-y:auto; padding:5px; }
    #photo-strip { display:flex; gap:8px; padding:8px; overflow-x:auto; background:#222; height:110px; }
    .thumb { width:85px; height:85px; object-fit:cover; border:2px solid transparent; border-radius:6px; cursor:pointer; }
    .thumb.active { border-color:#0A84FF; }
    #status-bar { text-align:center; font-size:12px; padding:5px; background:#000; }
</style>
</head>
<body>

<div id="sidebar">
    <button id="authBtn" class="btn btn-dark">🔑 Google Drive</button>
    <button id="refreshCacheBtn" class="btn btn-blue">🔄 Оновити кеш</button>
    <div id="project-list"></div>
    <div id="status-bar">Система готова</div>
</div>

<div id="main-area" style="flex:1; display:flex; flex-direction:column;">
    <div id="photo-strip"></div>
</div>

<script>
const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

let tokenClient = null;
let accessToken = localStorage.getItem('at') || null;
let rootId = null; 
let currentFolderId = null;
let cache = {}; // { folderId: [photoObj,...] }

function gapiLoaded() {
    gapi.load('client', async () => {
        await gapi.client.init({ apiKey: API_KEY, discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
        console.log("GAPI Client initialized");
    });
}

function gisLoaded() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (resp) => {
            accessToken = resp.access_token;
            localStorage.setItem('at', accessToken);
            startApp();
        }
    });
    // Якщо вже є токен, запускаємо відразу
    if(accessToken) startApp();
}

// Кнопка авторизації
document.getElementById('authBtn').onclick = () => {
    if(tokenClient) tokenClient.requestAccessToken({prompt:''});
    else alert("GSI ще не готовий, зачекай кілька секунд");
}

// --- Додаткові функції ---
async function startApp() {
    gapi.client.setToken({ access_token: accessToken });
    document.getElementById('authBtn').innerText = "✅ ONLINE";
    await ensureRootFolder();
    await loadProjects();
}

// Перевіряємо, чи є головна папка LaserApp
async function ensureRootFolder() {
    const res = await gapi.client.drive.files.list({
        q:"name='LaserApp' and mimeType='application/vnd.google-apps.folder' and trashed=false"
    });
    if(res.result.files.length>0) rootId = res.result.files[0].id;
    else {
        const create = await gapi.client.drive.files.create({
            resource:{ name:'LaserApp', mimeType:'application/vnd.google-apps.folder' }
        });
        rootId = create.result.id;
    }
}

// --- Завантаження проектів ---
async function loadProjects() {
    const listDiv = document.getElementById('project-list'); 
    listDiv.innerHTML = "Завантаження...";
    const res = await gapi.client.drive.files.list({
        q:`'${rootId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,
        orderBy:'name'
    });
    listDiv.innerHTML = "";
    res.result.files.forEach(f => {
        const div = document.createElement('div');
        div.className = 'project-item btn btn-dark';
        div.innerText = "📂 " + f.name;
        div.onclick = () => loadPhotos(f.id);
        listDiv.appendChild(div);
    });
}

// --- Завантаження фото проекту ---
async function loadPhotos(folderId) {
    currentFolderId = folderId;
    const strip = document.getElementById('photo-strip');
    strip.innerHTML = "Завантаження фото...";

    // Якщо є кеш, беремо з нього
    if(cache[folderId]) {
        renderPhotos(cache[folderId]);
        return;
    }

    const res = await gapi.client.drive.files.list({
        q:`'${folderId}' in parents and mimeType contains 'image/' and trashed=false`
    });
    const photos = await Promise.all(res.result.files.map(async f => {
        const blob = await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`, { headers:{'Authorization':'Bearer '+accessToken} }).then(r=>r.blob());
        return { id: f.id, name: f.name, url: URL.createObjectURL(blob) };
    }));
    cache[folderId] = photos;
    renderPhotos(photos);
}

function renderPhotos(photos) {
    const strip = document.getElementById('photo-strip');
    strip.innerHTML = "";
    photos.forEach(p => {
        const img = document.createElement('img');
        img.src = p.url;
        img.className = 'thumb';
        img.onclick = ()=>alert(`Photo: ${p.name}`);
        strip.appendChild(img);
    });
}

// --- Кнопка оновлення кешу ---
document.getElementById('refreshCacheBtn').onclick = () => {
    if(currentFolderId) { delete cache[currentFolderId]; loadPhotos(currentFolderId); }
    else alert("Спочатку оберіть проект");
}

window.gapiLoaded = gapiLoaded;
window.gisLoaded = gisLoaded;
</script>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

</body>
</html>
