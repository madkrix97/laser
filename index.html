<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Laser Test</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .nav { display: flex; gap: 5px; padding: 10px; background: #222; justify-content: center; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #007AFF; color: white; }
        .btn-orange { background: #FF9500; color: white; }
        #canvas-container { flex-grow: 1; position: relative; touch-action: none; }
    </style>
</head>
<body>

    <div class="nav">
        <input type="file" id="imgLoader" style="display:none" accept="image/*">
        <button class="btn-blue" id="loadBtn">📷 ФОТО</button>
        <button class="btn-blue" id="modeBtn">➕ РОЗМІР</button>
        <button style="background: #ff3b30; color: white;" id="clearBtn">🗑️ ОЧИСТИТИ</button>
    </div>

    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="info" style="font-size: 10px; text-align: center; padding: 5px; color: #666;">
        Очікування дій...
    </div>

<script>
    // Весь код всередині однієї функції, щоб SES не міг його розірвати
    (function() {
        let canvas;
        let isDrawing = false;
        let startPoint = null;

        window.addEventListener('DOMContentLoaded', () => {
            // Ініціалізація з урахуванням ретини
            canvas = new fabric.Canvas('mainCanvas', {
                width: window.innerWidth,
                height: window.innerHeight - 80,
                backgroundColor: '#111',
                enableRetinaScaling: true
            });

            // Кнопка ФОТО
            document.getElementById('loadBtn').onclick = () => document.getElementById('imgLoader').click();
            
            document.getElementById('imgLoader').onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    fabric.Image.fromURL(event.target.result, (img) => {
                        const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                            scaleX: scale, scaleY: scale, originX: 'left', originY: 'top'
                        });
                    });
                };
                reader.readAsDataURL(e.target.files[0]);
            };

            // Кнопка РЕЖИМ
            const modeBtn = document.getElementById('modeBtn');
            modeBtn.onclick = () => {
                isDrawing = !isDrawing;
                modeBtn.className = isDrawing ? 'btn-orange' : 'btn-blue';
                document.getElementById('info').innerText = isDrawing ? "РЕЖИМ: Клікніть 2 точки" : "РЕЖИМ: Вибір";
                canvas.selection = !isDrawing;
            };

            // Кнопка ОЧИСТИТИ
            document.getElementById('clearBtn').onclick = () => {
                canvas.clear();
                canvas.backgroundColor = '#111';
                canvas.renderAll();
            };

            // МАЛЮВАННЯ ЛІНІЙ
            canvas.on('mouse:down', (o) => {
                if (!isDrawing) return;
                const pointer = canvas.getPointer(o.e);

                if (!startPoint) {
                    startPoint = pointer;
                    const circle = new fabric.Circle({
                        left: pointer.x - 3, top: pointer.y - 3,
                        radius: 6, fill: 'red', selectable: false, id: 'temp'
                    });
                    canvas.add(circle);
                } else {
                    const line = new fabric.Line([startPoint.x, startPoint.y, pointer.x, pointer.y], {
                        stroke: 'yellow', strokeWidth: 4, selectable: true, hasControls: true
                    });
                    
                    const text = new fabric.Text('0.000m', {
                        fontSize: 24, fill: 'white', backgroundColor: 'rgba(0,0,0,0.7)',
                        left: (startPoint.x + pointer.x) / 2, top: (startPoint.y + pointer.y) / 2,
                        selectable: true
                    });

                    canvas.add(line, text);
                    // Видаляємо точку
                    const objs = canvas.getObjects().filter(obj => obj.id === 'temp');
                    objs.forEach(obj => canvas.remove(obj));
                    
                    startPoint = null;
                    canvas.renderAll();
                }
            });
        });
    })();
</script>
</body>
</html>
