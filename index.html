<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaserApp - Заміри офлайн/онлайн</title>
<script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
<style>
:root {--blue:#0A84FF;--bg:#1c1c1e;--item:#2c2c2e;--orange:#FF9500;--red:#FF453A;--green:#30D158;}
body {margin:0;font-family:-apple-system,sans-serif;display:flex;height:100vh;background:#000;color:white;overflow:hidden;}
#sidebar {width:260px;background:var(--bg);border-right:1px solid #333;display:flex;flex-direction:column;z-index:10;}
.sidebar-header {padding:15px;border-bottom:1px solid #333;display:flex;flex-direction:column;gap:8px;}
#project-list {flex-grow:1;overflow-y:auto;padding:10px;}
.project-item {padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer;background:var(--item);font-size:14px;border:1px solid transparent;}
.project-item.active {border-color:var(--blue);background:#3a3a3c;}
#main-area {flex-grow:1;display:flex;flex-direction:column;background:#111;position:relative;}
#canvas-wrapper {flex-grow:1;position:relative;touch-action:none;overflow:hidden;}
#photo-strip {height:110px;background:var(--bg);border-top:1px solid #333;display:flex;gap:12px;padding:10px;overflow-x:auto;align-items:center;}
.thumb {height:85px;width:85px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.thumb.active {border-color:var(--blue);}
.btn {padding:12px;border-radius:8px;border:none;color:white;font-weight:bold;cursor:pointer;font-size:13px;text-align:center;}
.btn-orange {background:var(--orange);}
.btn-blue {background:var(--blue);}
.btn-red {background:var(--red);}
.btn-dark {background:#3a3a3c;}
#status-bar {font-size:11px;color:var(--green);padding:5px;text-align:center;background:#000;}
</style>
</head>
<body>
<div id="sidebar">
    <div class="sidebar-header">
        <button id="authBtn" class="btn btn-dark">🔑 Google Drive</button>
        <button id="newProjectBtn" class="btn btn-dark">➕ НОВИЙ ОБ'ЄКТ</button>
        <div style="display:flex;gap:5px;margin-top:5px;">
            <button id="drawModeBtn" class="btn btn-orange" style="flex:2;">➕ РОЗМІР</button>
            <button id="delObjBtn" class="btn btn-red" style="flex:1;">🗑️</button>
        </div>
        <button id="exportBtn" class="btn btn-blue" style="margin-top:5px;">📥 ЗБЕРЕГТИ ФОТО</button>
        <button id="refreshCacheBtn" class="btn btn-dark" style="margin-top:5px;">♻️ ОНОВИТИ КЕШ</button>
    </div>
    <div id="project-list"></div>
    <div id="status-bar">Система готова</div>
</div>
<div id="main-area">
    <div id="canvas-wrapper"><canvas id="c"></canvas></div>
    <div id="photo-strip" style="display:none;">
        <div onclick="document.getElementById('fileInp').click()" style="height:85px;width:85px;background:#333;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;flex-shrink:0;">+</div>
        <div id="thumbs-container" style="display:flex;gap:12px;"></div>
    </div>
</div>
<input type="file" id="fileInp" accept="image/*" multiple style="display:none">

<script>
const CLIENT_ID = 'ТУТ_ВАШ_CLIENT_ID';
const API_KEY = 'ТУТ_ВАШ_API_KEY';
const SCOPES = "https://www.googleapis.com/auth/drive.file";

let canvas, tokenClient, accessToken = localStorage.getItem('at');
let rootId=null, currentFolderId=null, currentPhotoId=null;
let isDrawingMode=false, firstPoint=null;
let photoCache={}, lineDataCache={};
let offlineLineCache = {};  
let offlineQueue = JSON.parse(localStorage.getItem('offlineQueue')||"[]");
const offlineCacheKey = 'laser_offline_cache';

function loadOfflineCache(){
    const data = localStorage.getItem(offlineCacheKey);
    if(data) lineDataCache = JSON.parse(data);
}
function saveOfflineCache(){localStorage.setItem(offlineCacheKey, JSON.stringify(lineDataCache));}
loadOfflineCache();

function setStatus(msg, timeout=1000){
    const s=document.getElementById('status-bar');
    s.innerText=msg;
    if(timeout>0) setTimeout(()=>{s.innerText="Система готова";},timeout);
}
function debounce(func, wait){let t; return function(...a){clearTimeout(t); t=setTimeout(()=>func.apply(this,a), wait);}}
async function enqueueOfflineChange(photoId,data){offlineQueue=offlineQueue.filter(i=>i.photoId!==photoId);offlineQueue.push({photoId,data});localStorage.setItem('offlineQueue',JSON.stringify(offlineQueue));}
async function flushOfflineQueue(){if(!accessToken) return; for(let item of offlineQueue){currentPhotoId=item.photoId; await saveCurrentData(item.data);} offlineQueue=[]; localStorage.setItem('offlineQueue',JSON.stringify(offlineQueue));}

// ---------------- GOOGLE API ----------------
function gapiLoaded(){gapi.load('client',()=>gapi.client.init({apiKey:API_KEY,discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]}));}
function gisLoaded(){
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (res)=>{ accessToken=res.access_token; localStorage.setItem('at',accessToken); startApp(); }
    });
    document.getElementById('authBtn').onclick=()=>{ if(tokenClient) tokenClient.requestAccessToken(); else alert("Google API ще не готовий..."); };
    if(accessToken) startApp();
}

// ---------------- START APP ----------------
async function startApp(){
    if(!accessToken) return;
    if(!gapi.client){setStatus("❌ gapi.client не готовий",3000); return;}
    gapi.client.setToken({access_token:accessToken});
    document.getElementById('authBtn').innerText="✅ ONLINE";
    initCanvas();
    const res = await gapi.client.drive.files.list({q:"name='LaserApp' and mimeType='application/vnd.google-apps.folder' and trashed=false"});
    rootId = res.result.files.length?res.result.files[0].id : (await gapi.client.drive.files.create({resource:{name:'LaserApp',mimeType:'application/vnd.google-apps.folder'}})).result.id;
    await loadProjects();
    await flushOfflineQueue();
}

// ---------------- CANVAS ----------------
function initCanvas(){
    const wrapper = document.getElementById('canvas-wrapper');
    canvas = new fabric.Canvas('c', {width:wrapper.clientWidth, height:wrapper.clientHeight, selection:false, backgroundColor:'#111'});
    // --- події canvas ---
    canvas.on('object:moving', e=>{const o=e.target; if(o.owner){updateDimension(o.owner); saveCurrentDataDebounced();}});
    canvas.on('object:modified', e=>{const o=e.target; if(o.owner){updateDimension(o.owner); saveCurrentDataDebounced();}});
    canvas.on('mouse:down', opt=>{if(opt.e.altKey){canvas.isDragging=true;canvas.lastPosX=opt.e.clientX;canvas.lastPosY=opt.e.clientY;}});
    canvas.on('mouse:move', opt=>{if(canvas.isDragging){const e=opt.e; canvas.viewportTransform[4]+=e.clientX-canvas.lastPosX; canvas.viewportTransform[5]+=e.clientY-canvas.lastPosY; canvas.requestRenderAll(); canvas.lastPosX=e.clientX; canvas.lastPosY=e.clientY; canvas.getObjects().forEach(o=>o.setCoords());}});
    canvas.on('mouse:up', ()=>{canvas.isDragging=false;});
}

// --- debounce save ---
const saveCurrentDataDebounced = debounce(async()=>{await saveCurrentData();},500);

// ---------------- PROJECTS ----------------
async function loadProjects(){
    const list=document.getElementById('project-list'); list.innerHTML="";
    const res=await gapi.client.drive.files.list({q:`'${rootId}' in parents and trashed=false`,orderBy:'name'});
    res.result.files.forEach(f=>{
        const div=document.createElement('div'); div.className='project-item'; div.innerText="📂 "+f.name;
        div.onclick=()=>{currentFolderId=f.id; loadPhotos();}
        list.appendChild(div);
    });
}

async function loadPhotos(){
    const container=document.getElementById('thumbs-container'); container.innerHTML="";
    document.getElementById('photo-strip').style.display='flex';
    const res=await gapi.client.drive.files.list({q:`'${currentFolderId}' in parents and mimeType contains 'image/' and trashed=false`});
    res.result.files.forEach(async (file,idx)=>{
        const img=document.createElement('img'); img.className='thumb';
        const url = await fetchPhoto(file.id); img.src=url;
        img.onclick=()=>setMainImg(url,file.id,img);
        container.appendChild(img);
        if(idx===0) setMainImg(url,file.id,img);
    });
}

async function fetchPhoto(id){
    if(photoCache[id]) return photoCache[id];
    const res=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:{'Authorization':'Bearer '+accessToken}});
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    photoCache[id]=url;
    return url;
}

async function setMainImg(url,id,thumb){
    currentPhotoId=id;
    document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
    thumb.classList.add('active');
    canvas.clear();
    fabric.Image.fromURL(url,img=>{
        const ratio=Math.min(canvas.width/img.width,canvas.height/img.height);
        canvas.setBackgroundImage(img,canvas.renderAll.bind(canvas),{scaleX:ratio,scaleY:ratio});
        // підтягуємо офлайн зміни
        if(offlineLineCache[id]) offlineLineCache[id].forEach(p=>createDimension({x:p.p1.x*ratio,y:p.p1.y*ratio},{x:p.p2.x*ratio,y:p.p2.y*ratio},p.val));
    });
}

// --- Створення ліній ---
function createDimension(p1,p2,val="0.000"){
    const commonProps={radius:12,fill:'rgba(255,149,0,0.8)',originX:'center',originY:'center',hasControls:false,hasBorders:false,role:'node'};
    const n1=new fabric.Circle({...commonProps,left:p1.x,top:p1.y});
    const n2=new fabric.Circle({...commonProps,left:p2.x,top:p2.y});
    const line=new fabric.Line([p1.x,p1.y,p2.x,p2.y],{stroke:'#FF9500',strokeWidth:3,selectable:false,evented:false});
    const text=new fabric.Text(val,{fontSize:20,fill:'white',backgroundColor:'black',originX:'center',originY:'center',hasControls:false});
    const owner={n1,n2,line,text}; n1.owner=n2.owner=text.owner=owner;
    text.on('mousedown',()=>{const v=prompt("Розмір:",text.text); if(v){text.set('text',v);canvas.renderAll();saveCurrentDataDebounced();}});
    canvas.add(line,text,n1,n2); updateDimension(owner); return owner;
}

function updateDimension(o){o.line.set({x1:o.n1.left,y1:o.n1.top,x2:o.n2.left,y2:o.n2.top}); o.text.set({left:(o.n1.left+o.n2.left)/2,top:(o.n1.top+o.n2.top)/2}); o.line.setCoords(); o.text.setCoords(); canvas.renderAll();}

// ---------------- SAVE ----------------
async function saveCurrentData(){
    if(!currentPhotoId) return;
    const scale = canvas.backgroundImage ? canvas.backgroundImage.scaleX : 1;
    const data=canvas.getObjects().filter(o=>o.role==='node'&&o.owner).map(node=>{
        if(node===node.owner.n1) return {p1:{x:node.owner.n1.left/scale,y:node.owner.n1.top/scale},p2:{x:node.owner.n2.left/scale,y:node.owner.n2.top/scale},val:node.owner.text.text};
        return null;
    }).filter(n=>n);
    offlineLineCache[currentPhotoId]=data;
    saveOfflineCache();
    setStatus("💾 Збережено",1000);
    if(!navigator.onLine||!accessToken) return;
    // синхронізація на Drive можна додати тут
}

// ---------------- BUTTONS ----------------
document.getElementById('newProjectBtn').onclick=async()=>{
    const name=prompt("Назва об'єкта:");
    if(name) await gapi.client.drive.files.create({resource:{name:name,mimeType:'application/vnd.google-apps.folder',parents:[rootId]}});
    await loadProjects();
};
document.getElementById('drawModeBtn').onclick=()=>{
    isDrawingMode=!isDrawingMode; document.getElementById('drawModeBtn').style.background=isDrawingMode?"var(--green)":"var(--orange)";
    if(isDrawingMode){
        canvas.on('mouse:down',function(opt){
            if(!isDrawingMode) return;
            const pointer=canvas.getPointer(opt.e);
            if(!firstPoint) firstPoint={x:pointer.x,y:pointer.y};
            else {const secondPoint={x:pointer.x,y:pointer.y}; createDimension(firstPoint,secondPoint,"0.000"); firstPoint=null; saveCurrentDataDebounced();}
        });
    } else canvas.off('mouse:down');
};
document.getElementById('delObjBtn').onclick=()=>{
    const act=canvas.getActiveObject();
    if(act&&act.owner){canvas.remove(act.owner.n1,act.owner.n2,act.owner.line,act.owner.text);canvas.discardActiveObject().renderAll(); saveCurrentDataDebounced();}
};

window.addEventListener('online',async()=>{setStatus("🌐 Інтернет відновлено",2000); for(const id in offlineLineCache){currentPhotoId=id; await saveCurrentData();} offlineLineCache={}; setStatus("✅ Офлайн-синхронізація завершена",3000);});

window.gapiLoaded=gapiLoaded; window.gisLoaded=gisLoaded;
</script>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
