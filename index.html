<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaserApp Projects Test</title>
<style>
body { font-family: sans-serif; background:#111; color:white; padding:20px; }
button { padding:10px 20px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.project { margin:10px 0; cursor:pointer; }
.photo { width:80px; height:80px; object-fit:cover; margin:3px; border-radius:5px; cursor:pointer; border:2px solid transparent; }
.photo.active { border-color:#0A84FF; }
#photos { display:flex; flex-wrap:wrap; }
</style>
</head>
<body>

<button id="authBtn">🔑 Авторизувати Google Drive</button>
<h2>Проекти:</h2>
<div id="projects"></div>
<h2>Фото:</h2>
<div id="photos"></div>

<script>
const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
const SCOPES = "https://www.googleapis.com/auth/drive.file";

let tokenClient, accessToken=null;
let rootId=null, currentFolderId=null;

function gapiLoaded() {
    gapi.load('client', async () => {
        await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
        console.log("GAPI client loaded");
    });
}

function gisLoaded() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (resp) => { 
            accessToken = resp.access_token; 
            localStorage.setItem('at', accessToken); 
            loadProjects();
        }
    });
}

document.getElementById('authBtn').onclick = () => tokenClient.requestAccessToken();

async function loadProjects() {
    gapi.client.setToken({ access_token: accessToken });
    const projectsDiv = document.getElementById('projects');

    // 1️⃣ Знайти або створити LaserApp
    let res = await gapi.client.drive.files.list({
        q:"name='LaserApp' and mimeType='application/vnd.google-apps.folder' and trashed=false"
    });

    if(res.result.files.length>0) rootId = res.result.files[0].id;
    else {
        const newFolder = await gapi.client.drive.files.create({
            resource: { name:'LaserApp', mimeType:'application/vnd.google-apps.folder' }
        });
        rootId = newFolder.result.id;
    }

    // 2️⃣ Підпапки → проекти
    res = await gapi.client.drive.files.list({ q:`'${rootId}' in parents and trashed=false and mimeType='application/vnd.google-apps.folder'` });
    projectsDiv.innerHTML = "";

    res.result.files.forEach(f => {
        const div = document.createElement('div');
        div.className = 'project';
        div.textContent = "📂 " + f.name;
        div.onclick = ()=> loadPhotos(f.id);
        projectsDiv.appendChild(div);
    });
}

async function loadPhotos(folderId) {
    currentFolderId = folderId;
    const photosDiv = document.getElementById('photos');
    photosDiv.innerHTML = "";

    const res = await gapi.client.drive.files.list({
        q:`'${folderId}' in parents and mimeType contains 'image/' and trashed=false`
    });

    for(const file of res.result.files){
        const img = document.createElement('img');
        img.className = 'photo';
        img.src = await fetchPhoto(file.id);
        photosDiv.appendChild(img);
    }
}

async function fetchPhoto(id){
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{
        headers: { 'Authorization': 'Bearer ' + accessToken }
    });
    return URL.createObjectURL(await res.blob());
}

window.gapiLoaded = gapiLoaded;
window.gisLoaded = gisLoaded;
</script>

<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

</body>
</html>
