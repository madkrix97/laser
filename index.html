<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Fixed</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .nav { padding: 10px; background: #222; display: flex; gap: 10px; justify-content: center; }
        button { padding: 15px; border-radius: 10px; border: none; background: #007AFF; color: white; font-weight: bold; }
        .active { background: #FF9500 !important; }
        #wrapper { flex-grow: 1; position: relative; }
    </style>
</head>
<body>

<div class="nav">
    <button id="drawBtn">➕ РОЗМІР</button>
    <button id="photoBtn">📷 ФОТО</button>
    <button id="delBtn" style="background:red">🗑️</button>
    <input type="file" id="fileInp" style="display:none" accept="image/*">
</div>

<div id="wrapper">
    <canvas id="c"></canvas>
</div>

<script>
(function() {
    let canvas, isDrawing = false, firstPoint = null;

    window.onload = () => {
        // Примусове скидання кешу канвасу
        canvas = new fabric.Canvas('c', {
            width: window.innerWidth,
            height: window.innerHeight - 80,
            backgroundColor: '#111',
            enableRetinaScaling: true,
            fireRightClick: true
        });

        document.getElementById('photoBtn').onclick = () => document.getElementById('fileInp').click();
        document.getElementById('drawBtn').onclick = function() {
            isDrawing = !isDrawing;
            this.classList.toggle('active', isDrawing);
        };

        // ЛОГІКА ТОЧОК
        canvas.on('mouse:down', (opt) => {
            if (!isDrawing) return;
            const pointer = canvas.getPointer(opt.e);

            if (!firstPoint) {
                firstPoint = pointer;
                // Малюємо початкову точку
                const p1 = new fabric.Circle({
                    left: pointer.x, top: pointer.y, radius: 12, fill: 'yellow',
                    originX: 'center', originY: 'center', hasControls: false, id: 'p1'
                });
                canvas.add(p1);
            } else {
                createLine(firstPoint, pointer);
                firstPoint = null;
                isDrawing = false;
                document.getElementById('drawBtn').classList.remove('active');
            }
        });

        function createLine(start, end) {
            const line = new fabric.Line([start.x, start.y, end.x, end.y], {
                stroke: 'yellow', strokeWidth: 4, selectable: false
            });

            const p2 = new fabric.Circle({
                left: end.x, top: end.y, radius: 12, fill: 'yellow',
                originX: 'center', originY: 'center', hasControls: false
            });

            const text = new fabric.Text('0.00m', {
                left: (start.x + end.x) / 2, top: (start.y + end.y) / 2,
                fontSize: 20, fill: 'white', backgroundColor: 'black',
                originX: 'center', originY: 'center', selectable: true
            });

            canvas.add(line, p2, text);
            canvas.renderAll();
        }

        document.getElementById('fileInp').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    const ratio = Math.min(canvas.width/img.width, canvas.height/img.height);
                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                        scaleX: ratio, scaleY: ratio
                    });
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    };
})();
</script>
</body>
</html>
