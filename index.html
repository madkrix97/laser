<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Pro - Engineering Edition</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        :root { --blue: #0A84FF; --bg: #1c1c1e; --item: #2c2c2e; --orange: #FF9500; --red: #FF453A; --green: #30D158; }
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: #000; color: white; overflow: hidden; }
        
        #sidebar { width: 260px; background: var(--bg); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 8px; }
        #project-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        
        .project-item { padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; background: var(--item); font-size: 14px; border: 1px solid transparent; }
        .project-item.active { border-color: var(--blue); background: #3a3a3c; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; background: #111; position: relative; }
        #canvas-wrapper { flex-grow: 1; position: relative; touch-action: none; overflow: hidden; }
        
        #magnifier {
            position: absolute; width: 150px; height: 150px; border: 3px solid var(--blue);
            border-radius: 50%; overflow: hidden; display: none; pointer-events: none;
            z-index: 1000; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #000;
        }
        #mag-canvas { position: absolute; }

        #photo-strip { height: 110px; background: var(--bg); border-top: 1px solid #333; display: flex; gap: 12px; padding: 10px; overflow-x: auto; align-items: center; }
        .thumb-wrap { position: relative; flex-shrink: 0; }
        .thumb { height: 85px; width: 85px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .thumb.active { border-color: var(--blue); }
        .del-btn { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border-radius: 50%; width: 22px; height: 22px; border: none; font-size: 14px; cursor: pointer; }

        .btn { padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 13px; text-align: center; }
        .btn-orange { background: var(--orange); }
        .btn-red { background: var(--red); }
        .btn-dark { background: #3a3a3c; }

        input[type="file"] { display: none; }
        #status { font-size: 11px; color: #888; padding: 5px; text-align: center; background: #000; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <button id="authBtn" class="btn btn-dark">🔑 Google Drive</button>
            <button id="newProjectBtn" class="btn btn-dark">➕ НОВИЙ ОБ'ЄКТ</button>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <button id="drawModeBtn" class="btn btn-orange" style="flex: 2;">➕ РОЗМІР1</button>
                <button id="delObjBtn" class="btn btn-red" style="flex: 1;">🗑️</button>
            </div>
        </div>
        <div id="project-list"></div>
        <div id="status">LaserApp: Очікування</div>
    </div>

    <div id="main-area">
        <div id="canvas-wrapper">
            <canvas id="c"></canvas>
            <div id="magnifier">
                <canvas id="mag-canvas" width="150" height="150"></canvas>
            </div>
        </div>
        
        <div id="photo-strip" style="display: none;">
            <div class="thumb-wrap" onclick="document.getElementById('extraFileInp').click()">
                <div style="height:85px; width:85px; background:#333; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:30px; cursor:pointer;">+</div>
            </div>
            <div id="thumbs-container" style="display: flex; gap: 12px;"></div>
        </div>
    </div>

    <input type="file" id="fileInp" accept="image/*">
    <input type="file" id="extraFileInp" accept="image/*" multiple>

<script>
    const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
    const SCOPES = "https://www.googleapis.com/auth/drive.file";

    let canvas, tokenClient, accessToken = localStorage.getItem('at'), rootId = null, currentFolderId = null;
    let isDrawingMode = false, firstPoint = null;
    let magCtx, magContainer;

    function gapiLoaded() { gapi.load('client', () => gapi.client.init({apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]})); }
    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (res) => { saveToken(res.access_token, res.expires_in); startApp(); }
        });
        if (accessToken && Date.now() < localStorage.getItem('ex')) startApp();
    }
    function saveToken(t, e) { accessToken = t; localStorage.setItem('at', t); localStorage.setItem('ex', Date.now() + (e * 1000)); }

    async function startApp() {
        gapi.client.setToken({ access_token: accessToken });
        document.getElementById('authBtn').innerText = "✅ ONLINE";
        initCanvas();
        const res = await gapi.client.drive.files.list({ q: "name='LaserApp' and mimeType='application/vnd.google-apps.folder' and trashed=false" });
        rootId = res.result.files.length ? res.result.files[0].id : (await gapi.client.drive.files.create({resource:{name:'LaserApp', mimeType:'application/vnd.google-apps.folder'}})).result.id;
        loadProjects();
    }

    function initCanvas() {
        const wrapper = document.getElementById('canvas-wrapper');
        magContainer = document.getElementById('magnifier');
        magCtx = document.getElementById('mag-canvas').getContext('2d', { willReadFrequently: true });

        canvas = new fabric.Canvas('c', {
            width: wrapper.clientWidth,
            height: wrapper.clientHeight,
            selection: false,
            backgroundColor: '#111',
            allowTouchScrolling: false,
            targetFindTolerance: 20
        });
        setupInteractions();
    }

    function setupInteractions() {
        canvas.on('mouse:wheel', (opt) => {
            let delta = opt.e.deltaY;
            let zoom = canvas.getZoom() * (0.999 ** delta);
            if (zoom > 20) zoom = 20; if (zoom < 0.01) zoom = 0.01;
            canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
            opt.e.preventDefault(); opt.e.stopPropagation();
        });

        canvas.on('mouse:down', function(opt) {
            const target = canvas.findTarget(opt.e);
            if (target) { this.isDragging = false; return; }

            if (isDrawingMode) {
                const pointer = canvas.getPointer(opt.e);
                if (!firstPoint) {
                    firstPoint = pointer;
                    const dot = new fabric.Circle({ left: pointer.x, top: pointer.y, radius: 5, fill: 'orange', originX: 'center', originY: 'center', id: 'temp', selectable: false });
                    canvas.add(dot);
                } else {
                    createDimension(firstPoint, pointer);
                    const temp = canvas.getObjects().find(o => o.id === 'temp');
                    if (temp) canvas.remove(temp);
                    firstPoint = null;
                }
                return;
            }

            this.isDragging = true;
            this.lastPosX = opt.e.clientX || (opt.e.touches ? opt.e.touches[0].clientX : 0);
            this.lastPosY = opt.e.clientY || (opt.e.touches ? opt.e.touches[0].clientY : 0);
        });

        canvas.on('mouse:move', function(opt) {
            if (this.isDragging && !isDrawingMode) {
                const e = opt.e;
                const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                this.viewportTransform[4] += clientX - this.lastPosX;
                this.viewportTransform[5] += clientY - this.lastPosY;
                this.requestRenderAll();
                this.lastPosX = clientX; this.lastPosY = clientY;
            } else if (opt.target && opt.target.owner) {
                updateDimension(opt.target.owner);
                if (opt.target.role === 'node') showMagnifier(opt.e);
            }
        });

        canvas.on('mouse:up', function() {
            this.isDragging = false;
            magContainer.style.display = 'none';
            canvas.forEachObject(o => o.setCoords());
        });
    }

    function showMagnifier(e) {
        const pointer = canvas.getPointer(e);
        const touch = e.touches ? e.touches[0] : e;
        magContainer.style.display = 'block';
        magContainer.style.left = (touch.clientX - 75) + 'px';
        magContainer.style.top = (touch.clientY - 180) + 'px';

        magCtx.clearRect(0, 0, 150, 150);
        magCtx.save();
        const zoom = canvas.getZoom() * 3;
        magCtx.translate(75, 75);
        magCtx.scale(zoom, zoom);
        magCtx.translate(-pointer.x, -pointer.y);
        if (canvas.backgroundImage) canvas.backgroundImage.render(magCtx);
        magCtx.restore();

        magCtx.strokeStyle = '#0A84FF';
        magCtx.lineWidth = 2;
        magCtx.beginPath();
        magCtx.moveTo(75, 60); magCtx.lineTo(75, 90);
        magCtx.moveTo(60, 75); magCtx.lineTo(90, 75);
        magCtx.stroke();
    }

    function createDimension(p1, p2, val = "0.000") {
        const common = { radius: 12, fill: 'rgba(255,149,0,0.5)', originX: 'center', originY: 'center', hasControls: false, hasBorders: false };
        const n1 = new fabric.Circle({ ...common, left: p1.x, top: p1.y, role: 'node' });
        const n2 = new fabric.Circle({ ...common, left: p2.x, top: p2.y, role: 'node' });
        const line = new fabric.Line([p1.x, p1.y, p2.x, p2.y], { stroke: '#FF9500', strokeWidth: 3, selectable: false, evented: false });
        const text = new fabric.Text(val, { fontSize: 22, fill: 'white', backgroundColor: 'black', originX: 'center', originY: 'center', hasControls: false, hasBorders: false });

        const owner = { n1, n2, line, text };
        n1.owner = n2.owner = text.owner = owner;
        text.on('mousedown', () => {
            const v = prompt("Розмір (м):", text.text);
            if (v !== null) text.set('text', v);
            canvas.renderAll();
        });
        canvas.add(line, text, n1, n2);
        updateDimension(owner);
    }

    function updateDimension(o) {
        o.line.set({ x1: o.n1.left, y1: o.n1.top, x2: o.n2.left, y2: o.n2.top });
        o.text.set({ left: (o.n1.left + o.n2.left)/2, top: (o.n1.top + o.n2.top)/2 });
        o.line.setCoords(); o.text.setCoords();
        canvas.renderAll();
    }

    document.getElementById('drawModeBtn').onclick = function() {
        isDrawingMode = !isDrawingMode;
        firstPoint = null;
        this.style.background = isDrawingMode ? "var(--green)" : "var(--orange)";
        this.innerText = isDrawingMode ? "📍 СТАВ ТОЧКУ" : "➕ РОЗМІР";
        canvas.getObjects().forEach(o => { if(o.id === 'temp') canvas.remove(o); });
        canvas.renderAll();
    };

    document.getElementById('delObjBtn').onclick = () => {
        const act = canvas.getActiveObject();
        if (act && act.owner) {
            canvas.remove(act.owner.n1, act.owner.n2, act.owner.line, act.owner.text);
            canvas.discardActiveObject().renderAll();
        }
    };

    async function loadProjects() {
        const list = document.getElementById('project-list');
        list.innerHTML = "";
        const res = await gapi.client.drive.files.list({ q: `'${rootId}' in parents and trashed=false`, orderBy: 'name' });
        res.result.files.forEach(f => {
            const div = document.createElement('div');
            div.className = 'project-item';
            div.innerText = "📂 " + f.name;
            div.onclick = () => openProject(f.id, div);
            list.appendChild(div);
        });
    }

    async function openProject(id, el) {
        currentFolderId = id;
        document.querySelectorAll('.project-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('photo-strip').style.display = 'flex';
        loadPhotos();
    }

    async function loadPhotos() {
        const container = document.getElementById('thumbs-container');
        container.innerHTML = "";
        const res = await gapi.client.drive.files.list({ q: `'${currentFolderId}' in parents and mimeType contains 'image/' and trashed=false` });
        res.result.files.forEach(async (file, idx) => {
            const wrap = document.createElement('div');
            wrap.className = 'thumb-wrap';
            const img = document.createElement('img');
            img.className = 'thumb';
            const url = await fetchPhoto(file.id);
            img.src = url;
            const del = document.createElement('button');
            del.className = 'del-btn'; del.innerHTML = '×';
            del.onclick = (e) => { e.stopPropagation(); deleteFile(file.id); };
            img.onclick = () => setMainImg(url, img);
            wrap.append(img, del);
            container.appendChild(wrap);
            if (idx === 0) setMainImg(url, img);
        });
    }

    async function fetchPhoto(id) {
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, { headers: { 'Authorization': 'Bearer ' + accessToken } });
        return URL.createObjectURL(await res.blob());
    }

    function setMainImg(url, thumb) {
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
        fabric.Image.fromURL(url, (img) => {
            canvas.clear();
            const ratio = Math.min(canvas.width / img.width, canvas.height / img.height);
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { scaleX: ratio, scaleY: ratio });
            canvas.setZoom(1); canvas.viewportTransform = [1,0,0,1,0,0];
        });
    }

    async function deleteFile(id) { if(confirm("Видалити фото?")) { await gapi.client.drive.files.delete({fileId:id}); loadPhotos(); } }

    document.getElementById('newProjectBtn').onclick = () => document.getElementById('fileInp').click();
    document.getElementById('fileInp').onchange = async (e) => {
        const name = prompt("Назва об'єкта:");
        if (!name || !e.target.files[0]) return;
        const f = await gapi.client.drive.files.create({resource:{name, mimeType:'application/vnd.google-apps.folder', parents:[rootId]}});
        await uploadPhoto(e.target.files[0], f.result.id);
        loadProjects();
    };
    document.getElementById('extraFileInp').onchange = async (e) => {
        for (let file of e.target.files) await uploadPhoto(file, currentFolderId);
        loadPhotos();
    };
    async function uploadPhoto(file, fId) {
        const meta = { name: `img_${Date.now()}.jpg`, parents: [fId] };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
        form.append('file', file);
        return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method:'POST', headers:{'Authorization':'Bearer '+accessToken}, body:form });
    }

    document.getElementById('authBtn').onclick = () => tokenClient.requestAccessToken();
</script>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
