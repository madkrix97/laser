<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaserApp - Заміри офлайн/онлайн</title>
<script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
<style>
:root {
    --blue: #0A84FF; --bg: #1c1c1e; --item: #2c2c2e; 
    --orange: #FF9500; --red: #FF453A; --green: #30D158;
}
body {margin:0;font-family:-apple-system,sans-serif;display:flex;height:100vh;background:#000;color:white;overflow:hidden;}
#sidebar {width:260px;background:var(--bg);border-right:1px solid #333;display:flex;flex-direction:column;z-index:10;}
.sidebar-header {padding:15px;border-bottom:1px solid #333;display:flex;flex-direction:column;gap:8px;}
#project-list {flex-grow:1;overflow-y:auto;padding:10px;}
.project-item {padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer;background:var(--item);font-size:14px;border:1px solid transparent;}
.project-item.active {border-color:var(--blue);background:#3a3a3c;}
#main-area {flex-grow:1;display:flex;flex-direction:column;background:#111;position:relative;}
#canvas-wrapper {flex-grow:1;position:relative;touch-action:none;overflow:hidden;}
#photo-strip {height:110px;background:var(--bg);border-top:1px solid #333;display:flex;gap:12px;padding:10px;overflow-x:auto;align-items:center;}
.thumb {height:85px;width:85px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.thumb.active {border-color:var(--blue);}
.btn {padding:12px;border-radius:8px;border:none;color:white;font-weight:bold;cursor:pointer;font-size:13px;text-align:center;}
.btn-orange {background:var(--orange);}
.btn-blue {background:var(--blue);}
.btn-red {background:var(--red);}
.btn-dark {background:#3a3a3c;}
#status-bar {font-size:11px;color:var(--green);padding:5px;text-align:center;background:#000;}

#net-status{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  padding:6px 10px;
  border-radius:20px;
  background:#1e1e1e;
  color:#fff;
  width:max-content;
}

#net-status .dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:gray;
}

    
</style>
</head>
<body>
<div id="sidebar">
    <div class="sidebar-header">
        <button id="authBtn" class="btn btn-dark">🔑 Google Drive</button>
        <button id="newProjectBtn" class="btn btn-dark">➕ НОВИЙ ОБ'ЄКТ</button>

<div id="net-status">
  <span class="dot"></span>
  <span class="text">Checking...</span>
</div>
        
        <div style="display:flex;gap:5px;margin-top:5px;">
            <button id="drawModeBtn" class="btn btn-orange" style="flex:2;">➕ РОЗМІР</button>
            <button id="delObjBtn" class="btn btn-red" style="flex:1;">🗑️</button>
        </div>
        <button id="exportBtn" class="btn btn-blue" style="margin-top:5px;">📥 ЗБЕРЕГТИ ФОТО</button>
        <button id="refreshCacheBtn" class="btn btn-dark" style="margin-top:5px;">♻️ ОНОВИТИ КЕШ</button>
    </div>
    <div id="project-list"></div>
    <div id="status-bar">Система готова</div>
</div>
<div id="main-area">
    <div id="canvas-wrapper"><canvas id="c"></canvas></div>
    <div id="photo-strip" style="display:none;">
        <div onclick="document.getElementById('fileInp').click()" style="height:85px;width:85px;background:#333;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;flex-shrink:0;">+</div>
        <div id="thumbs-container" style="display:flex;gap:12px;"></div>
    </div>
</div>
<input type="file" id="fileInp" accept="image/*" multiple style="display:none">

<script>
const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
const SCOPES = "https://www.googleapis.com/auth/drive.file";

let canvas=null, tokenClient=null, accessToken=localStorage.getItem('at');
let rootId=null, currentFolderId=null, currentPhotoId=null;
let isDrawingMode=false, firstPoint=null;

let photoCache={}, lineDataCache={}, offlineLineCache={};

// --- DEBOUNCE ---
function debounce(func, wait){
    let timeout;
    return function(...args){
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this,args), wait);
    };
}

// --- STATUS BAR ---
function setStatus(msg, timeout=1000){
    const s=document.getElementById('status-bar');
    s.innerText=msg;
    if(timeout>0) setTimeout(()=>{s.innerText="Система готова";},timeout);
}

// --- OFFLINE CACHE ---
const offlineCacheKey='laser_offline_cache';
function loadOfflineCache(){
    const data=localStorage.getItem(offlineCacheKey);
    if(data) lineDataCache=JSON.parse(data);
}
function saveOfflineCache(){ localStorage.setItem(offlineCacheKey, JSON.stringify(lineDataCache)); }
loadOfflineCache();

// --- GOOGLE API ---
function gapiLoaded(){
    gapi.load('client', async ()=>{
        await gapi.client.init({apiKey:API_KEY,discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]});
        if(accessToken) startApp();
    });
}
function gisLoaded(){
    tokenClient=google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (res)=>{ 
            accessToken=res.access_token; 
            localStorage.setItem('at',accessToken); 
            startApp(); 
        }
    });
    if(accessToken) startApp();
}
document.getElementById('authBtn').onclick=()=>tokenClient?.requestAccessToken();

// --- CANVAS INIT ---
function initCanvas(){
    const wrapper=document.getElementById('canvas-wrapper');
    canvas=new fabric.Canvas('c',{width:wrapper.clientWidth,height:wrapper.clientHeight,selection:false,backgroundColor:'#111'});

    const saveCurrentDataDebounced=debounce(saveCurrentData,500);

    canvas.on('object:moving', e=>{ if(e.target.owner){ updateDimension(e.target.owner); saveCurrentDataDebounced(); } });
    canvas.on('object:modified', e=>{ if(e.target.owner){ updateDimension(e.target.owner); saveCurrentDataDebounced(); } });

    // Панорамування
    canvas.on('mouse:down', opt=>{
        if(opt.e.altKey){ canvas.isDragging=true; canvas.lastPosX=opt.e.clientX; canvas.lastPosY=opt.e.clientY; }
    });
    canvas.on('mouse:move', opt=>{
        if(canvas.isDragging){
            const e=opt.e;
            canvas.viewportTransform[4]+=e.clientX-canvas.lastPosX;
            canvas.viewportTransform[5]+=e.clientY-canvas.lastPosY;
            canvas.requestRenderAll();
            canvas.lastPosX=e.clientX; canvas.lastPosY=e.clientY;
        }
    });
    canvas.on('mouse:up', ()=>{ canvas.isDragging=false; });

    // Видалення лінії по double click
    canvas.on("mouse:dblclick", function(opt){
        const obj = opt.target;
        if(obj && obj.owner){
            canvas.remove(obj.owner.n1,obj.owner.n2,obj.owner.line,obj.owner.text);
            canvas.renderAll();
            autoSave();
        }
    });
}

// --- DIMENSIONS ---
function createDimension(p1, p2, savedValue=null){
    const circleOptions = { radius: 6, fill: '#00d2ff', originX: 'center', originY: 'center' };
    const c1 = new fabric.Circle({...circleOptions, left: p1.x, top: p1.y});
    const c2 = new fabric.Circle({...circleOptions, left: p2.x, top: p2.y});
    const line = new fabric.Line([p1.x,p1.y,p2.x,p2.y], {stroke:'#00d2ff', strokeWidth:2, selectable:false, evented:false});
    const getDistance = ()=>Math.round(Math.hypot(c2.left-c1.left, c2.top-c1.top));
    const text = new fabric.Text(savedValue?savedValue+" mm":getDistance()+" mm", { left:(c1.left+c2.left)/2, top:(c1.top+c2.top)/2-10, fontSize:18, fill:'#fff', backgroundColor:'rgba(0,0,0,0.6)', originX:'center', originY:'center', selectable:false, evented:false });

    function updateLine(){
        line.set({x1:c1.left,y1:c1.top,x2:c2.left,y2:c2.top});
        text.set({left:(c1.left+c2.left)/2, top:(c1.top+c2.top)/2-10});
        if(!savedValue) text.text=getDistance()+" mm";
        canvas.renderAll();
        autoSave();
    }

    c1.on("moving", updateLine); c2.on("moving", updateLine);
    canvas.add(line,c1,c2,text);

    const dimensionGroup = {n1:c1,n2:c2,line,line,text:text};
    c1.owner=dimensionGroup; c2.owner=dimensionGroup;
}

function updateDimension(o){
    o.line.set({x1:o.n1.left,y1:o.n1.top,x2:o.n2.left,y2:o.n2.top});
    o.text.set({left:(o.n1.left+o.n2.left)/2,top:(o.n1.top+o.n2.top)/2});
    o.line.setCoords(); o.text.setCoords(); canvas.renderAll();
}

// --- SAVE / LOAD ---
async function saveCurrentData(){
    if(!currentPhotoId || !canvas) return;
    const scale=canvas.backgroundImage?canvas.backgroundImage.scaleX:1;
    const data=canvas.getObjects().filter(o=>o.owner&&o===o.owner.n1).map(o=>{
        return {p1:{x:o.owner.n1.left/scale,y:o.owner.n1.top/scale},p2:{x:o.owner.n2.left/scale,y:o.owner.n2.top/scale},val:o.owner.text.text};
    });

    offlineLineCache[currentPhotoId]=data; lineDataCache[currentPhotoId]=data;
    saveOfflineCache();

    if(!navigator.onLine){ setStatus("⚡ Збережено локально (офлайн)",2000); return; }
    if(!accessToken) return;

    const fileName=`data_${currentPhotoId}.json`;
    try{
        const res=await gapi.client.drive.files.list({q:`name='${fileName}' and '${currentFolderId}' in parents and trashed=false`});
        const fileContent=JSON.stringify(data);
        if(res.result.files.length>0){
            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${res.result.files[0].id}?uploadType=media`, {method:'PATCH', headers:{'Authorization':'Bearer '+accessToken}, body:fileContent});
        }else{
            const meta={name:fileName, parents:[currentFolderId]};
            const form=new FormData();
            form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
            form.append('file', new Blob([fileContent], {type:'application/json'}));
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST', headers:{'Authorization':'Bearer '+accessToken}, body:form});
        }
        setStatus("✅ Збережено на Drive");
    }catch(e){ console.error(e); setStatus("❌ Помилка збереження",3000); }
}

function loadCurrentData(photoId){
    if(!canvas) return;
    // Очищаємо dimension
    canvas.getObjects().forEach(obj=>{ if(obj.owner){ canvas.remove(obj.owner.n1,obj.owner.n2,obj.owner.line,obj.owner.text); } });
    canvas.renderAll();

    const scale = canvas.backgroundImage ? canvas.backgroundImage.scaleX : 1;
    const data = offlineLineCache[photoId] || lineDataCache[photoId];
    if(!data) return;

    data.forEach(p=>{
        createDimension({x:p.p1.x*scale, y:p.p1.y*scale},{x:p.p2.x*scale, y:p.p2.y*scale},p.val);
    });
}

// --- AUTO SAVE ---
function autoSave(){
    if(!currentPhotoId || !canvas) return;
    const imgObj = canvas.getObjects()[0];
    const scale = imgObj ? imgObj.scaleX : 1;
    const data=[];
    canvas.getObjects().forEach(obj=>{ if(obj.owner && obj===obj.owner.n1){ data.push({p1:{x:obj.owner.n1.left/scale,y:obj.owner.n1.top/scale},p2:{x:obj.owner.n2.left/scale,y:obj.owner.n2.top/scale},val:obj.owner.text.text}); } });
    offlineLineCache[currentPhotoId]=data;
    localStorage.setItem('laser_offline', JSON.stringify(offlineLineCache));
}

// --- ONLINE/OFFLINE STATUS ---
const netDot=document.querySelector('#net-status .dot');
const netText=document.querySelector('#net-status .text');
function updateNetStatus(state){
    if(state==="online"){ netDot.style.background="#18c964"; netText.textContent="ONLINE"; }
    else if(state==="offline"){ netDot.style.background="#f31260"; netText.textContent="OFFLINE"; }
    else if(state==="sync"){ netDot.style.background="#f5a524"; netText.textContent="SYNC..."; }
}

window.addEventListener('online', async()=>{
    updateNetStatus("sync");
    for(let photoId in offlineLineCache){ currentPhotoId=photoId; await saveCurrentData(); }
    offlineLineCache={}; localStorage.removeItem('laser_offline');
    updateNetStatus("online");
});
window.addEventListener('offline', ()=>{ updateNetStatus("offline"); setStatus("⚡ Працюємо офлайн",2000); });

// --- INITIAL LOAD ---
window.onload=function(){
    const s=document.createElement('script'); s.src="https://apis.google.com/js/api.js"; s.onload=gapiLoaded; document.body.appendChild(s);
    const gis=document.createElement('script'); gis.src="https://accounts.google.com/gsi/client"; gis.onload=gisLoaded; document.body.appendChild(gis);
    navigator.onLine ? updateNetStatus("online") : updateNetStatus("offline");
};
</script>
</body>
</html>
