        this.classList.toggle('active-mode', isDrawMode);

    document.getElementById('deleteBtn').onclick = () => {

            canvas.discardActiveObject().renderAll();

        reader.readAsDataURL(e.target.files[0]);
    };

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Меблевий Замір Pro - Повний Функціонал</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --panel-bg: #2c2c2e; --btn-blue: #007AFF; --btn-red: #ff3b30; --btn-green: #32D74B; --btn-orange: #ff9500; --btn-purple: #af52de; }
        body { font-family: -apple-system, sans-serif; background: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .toolbar { padding: 10px; background: var(--panel-bg); display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; z-index: 10; border-bottom: 1px solid #444; }
        button, label { background: var(--btn-blue); color: white; border: none; padding: 10px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; -webkit-tap-highlight-color: transparent; }
        .active-mode { background: var(--btn-green) !important; outline: 2px solid white; }
        .file-ops { background: var(--btn-orange) !important; }
        .export-op { background: var(--btn-purple) !important; }
        #connectBtn { background: var(--btn-green); }
        .bt-connected { background: #555 !important; }
        #fileInput, #jsonInput { display: none; }
        #canvas-wrapper { flex-grow: 1; position: relative; touch-action: none; background: #111; }
        #magnifier { position: absolute; width: 160px; height: 160px; border: 3px solid var(--btn-blue); border-radius: 50%; overflow: hidden; display: none; pointer-events: none; z-index: 1000; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.6); }
        #magnifier-canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="toolbar">
        <label for="fileInput">📷 ФОТО</label>
        <input type="file" id="fileInput" accept="image/*">
        <button id="drawModeBtn">➕ РОЗМІР</button>
        <button id="connectBtn">🔌 ЛАЗЕР</button>
        <button id="deleteBtn" style="background: var(--btn-red);">🗑️</button>
        
        <button onclick="saveProject()" class="file-ops">💾 JSON</button>
        <label for="jsonInput" class="file-ops">📂 JSON</label>
        <input type="file" id="jsonInput" accept=".json">
        
        <button onclick="exportImage()" class="export-op">🖼️ ЕКСПОРТ (JPG)</button>
    </div>

    <div id="canvas-wrapper">
        <div id="magnifier"><canvas id="magnifier-canvas" width="160" height="160"></canvas></div>
        <canvas id="c"></canvas>
    </div>

<script>
    const CONFIG = {
        lineColor: '#007AFF', lineActiveColor: '#FFD60A', textColor: '#32D74B',
        textBg: 'rgba(0,0,0,0.85)', markerColor: '#FFFFFF', lineWidth: 3,
        fontSize: 22, zoomLevel: 2.5
    };

    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth, height: window.innerHeight - 70,
        selection: false, allowTouchScrolling: false,
        backgroundColor: '#111'
    });

    let isDrawMode = false;
    let firstPoint = null;
    let laserCharacteristic = null;

    // --- ЕКСПОРТ У КАРТИНКУ ---
    function exportImage() {
        // 1. Знімаємо виділення, щоб не було видно рамок
        canvas.discardActiveObject();
        // 2. Ховаємо всі маркери (точки)
        canvas.getObjects().forEach(o => { if(o.subRole) o.set('visible', false); });
        canvas.renderAll();

        // 3. Генеруємо URL картинки
        const dataURL = canvas.toDataURL({
            format: 'jpeg',
            quality: 0.9,
            multiplier: 2 // Покращує якість (HD)
        });

        // 4. Скачуємо
        const link = document.createElement('a');
        link.download = `zamer_export_${new Date().getTime()}.jpg`;
        link.href = dataURL;
        link.click();

        // Повертаємо видимість (якщо щось було вибрано)
        alert("Картинку збережено у вашу галерею/завантаження");
    }

    // --- BLUETOOTH ---
    document.getElementById('connectBtn').onclick = async function() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Mileseey' }, { namePrefix: 'D5' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            laserCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
            await laserCharacteristic.startNotifications();
            laserCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                const val = new TextDecoder().decode(e.target.value);
                const match = val.match(/\d+(\.\d+)?/);
                if (match) {
                    const active = canvas.getActiveObject();
                    const line = active?.parentLine || (active?.type === 'line' ? active : null);
                    if (line && line.textObj) {
                        let num = parseFloat(match[0]);
                        if (num < 15) num = Math.round(num * 1000); 
                        line.textObj.set('text', num + " мм");
                        canvas.renderAll();
                    }
                }
            });
            this.innerText = "✅ BT OK";
            this.classList.add('bt-connected');
        } catch (e) { alert("BT Error: " + e.message); }
    };

    // --- JSON ЗБЕРЕЖЕННЯ / ЗАВАНТАЖЕННЯ ---
    function saveProject() {
        const json = canvas.toJSON(['measureId', 'subRole', 'selectable', 'hasControls', 'hasBorders']);
        const blob = new Blob([JSON.stringify(json)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `zamer_project_${new Date().getTime()}.json`;
        a.click();
    }

    document.getElementById('jsonInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            canvas.loadFromJSON(event.target.result, () => {
                const objs = canvas.getObjects();
                objs.filter(o => o.type === 'line').forEach(line => {
                    const mid = line.measureId;
                    line.p1 = objs.find(o => o.measureId === mid && o.subRole === 'p1');
                    line.p2 = objs.find(o => o.measureId === mid && o.subRole === 'p2');
                    line.textObj = objs.find(o => o.measureId === mid && o.type === 'i-text');
                    if (line.p1 && line.p2 && line.textObj) {
                        line.p1.parentLine = line; line.p2.parentLine = line; line.textObj.parentLine = line;
                        attachObjectEvents(line);
                        line.p1.set({visible: false, selectable: false});
                        line.p2.set({visible: false, selectable: false});
                    }
                });
                canvas.renderAll();
            });
        };
        reader.readAsText(e.target.files[0]);
    };

    // --- ЛОГІКА МАЛЮВАННЯ ТА ОНОВЛЕННЯ ---
    function updateLine(line) {
        line.set({ x1: line.p1.left, y1: line.p1.top, x2: line.p2.left, y2: line.p2.top });
        const cX = (line.p1.left + line.p2.left) / 2;
        const cY = (line.p1.top + line.p2.top) / 2;
        const angle = Math.atan2(line.p2.top - line.p1.top, line.p2.left - line.p1.left);
        line.textObj.set({ left: cX, top: cY - 25, angle: angle * (180/Math.PI) });
        line.setCoords(); line.textObj.setCoords();
        canvas.renderAll();
    }

    function attachObjectEvents(line) {
        const handler = (opt) => { updateLine(line); showMagnifier(canvas.getPointer(opt.e).x, canvas.getPointer(opt.e).y); };
        const stop = () => { mag.style.display = 'none'; canvas.renderAll(); };
        line.p1.on('moving', handler); line.p2.on('moving', handler);
        line.p1.on('mouseup', stop); line.p2.on('mouseup', stop);
        line.p1.on('touchend', stop); line.p2.on('touchend', stop);
        line.textObj.on('editing:entered', function() { if (this.text.includes('---')) this.text = ''; });
        line.textObj.on('editing:exited', function() { if (!this.text.includes('мм')) this.text += ' мм'; });
    }

    function createMeasurement(p1c, p2c) {
        const mId = 'm_' + new Date().getTime();
        const createMarker = (c, role) => {
            const l1 = new fabric.Line([-15,0,15,0],{stroke: CONFIG.markerColor, strokeWidth:2});
            const l2 = new fabric.Line([0,-15,0,15],{stroke: CONFIG.markerColor, strokeWidth:2});
            const tz = new fabric.Circle({radius:30, fill:'transparent', originX:'center', originY:'center'});
            return new fabric.Group([tz,l1,l2], {left:c.x, top:c.y, originX:'center', originY:'center', visible:false, hasControls:false, subRole: role, measureId: mId});
        };
        const p1 = createMarker(p1c, 'p1'); const p2 = createMarker(p2c, 'p2');
        const line = new fabric.Line([p1.left, p1.top, p2.left, p2.top], {stroke: CONFIG.lineColor, strokeWidth: CONFIG.lineWidth, hasControls:false, hasBorders:false, measureId: mId});
        const text = new fabric.IText('--- мм', {fontSize: CONFIG.fontSize, fill: CONFIG.textColor, fontWeight:'bold', backgroundColor: CONFIG.textBg, originX:'center', originY:'center', fontFamily:'monospace', measureId: mId, hasControls: false});
        line.p1=p1; line.p2=p2; line.textObj=text; p1.parentLine=line; p2.parentLine=line; text.parentLine=line;
        attachObjectEvents(line);
        canvas.add(line, text, p1, p2);
        updateLine(line);
    }

    // --- ІНТЕРФЕЙС ---
    canvas.on('selection:created', (e) => onSelect(e.selected[0]));
    canvas.on('selection:updated', (e) => onSelect(e.selected[0]));
    canvas.on('selection:cleared', () => {
        canvas.getObjects().forEach(o => { if(o.subRole) { o.visible = false; o.selectable = false; } if(o.type === 'line') o.set('stroke', CONFIG.lineColor); });
        canvas.renderAll();
    });

    function onSelect(active) {
        if(!active || isDrawMode) return;
        const line = active.parentLine || (active.type === 'line' ? active : null);
        canvas.getObjects().forEach(o => { if(o.subRole) { o.visible = false; o.selectable = false; } });
        canvas.getObjects('line').forEach(l => l.set('stroke', CONFIG.lineColor));
        if (line) {
            line.set('stroke', CONFIG.lineActiveColor);
            line.p1.set({visible: true, selectable: true}); line.p2.set({visible: true, selectable: true});
            line.p1.bringToFront(); line.p2.bringToFront();
        }
        canvas.renderAll();
    }

    canvas.on('mouse:down', (opt) => {
        if(!isDrawMode) return;
        const p = canvas.getPointer(opt.e);
        if(!firstPoint) {
            firstPoint = p;
            canvas.add(new fabric.Circle({left:p.x, top:p.y, radius:5, fill:CONFIG.lineActiveColor, id:'temp', originX:'center', originY:'center', selectable: false}));
        } else {
            createMeasurement(firstPoint, p);
            const tempDot = canvas.getObjects().find(o => o.id === 'temp');
            if(tempDot) canvas.remove(tempDot);
            firstPoint = null; isDrawMode = false;
            document.getElementById('drawModeBtn').classList.remove('active-mode');
        }
    });

    document.getElementById('drawModeBtn').onclick = function() { isDrawMode = !isDrawMode; this.classList.toggle('active-mode', isDrawMode); };
    document.getElementById('deleteBtn').onclick = () => {
        const a = canvas.getActiveObject();
        const l = a?.parentLine || (a?.type === 'line' ? a : null);
        if(l) { canvas.remove(l.p1, l.p2, l.textObj, l); canvas.discardActiveObject().renderAll(); }
    };

    document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            const r = Math.min(canvas.width/img.width, canvas.height/img.height);
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {scaleX:r, scaleY:r, originX:'left', originY:'top'});
        });
        reader.readAsDataURL(e.target.files[0]);
    };

    const mag = document.getElementById('magnifier');
    const magCtx = document.getElementById('magnifier-canvas').getContext('2d');
    function showMagnifier(x, y) {
        const bg = canvas.backgroundImage; if (!bg) return;
        mag.style.display = 'block'; mag.style.left = (x - 80) + 'px'; mag.style.top = (y - 190) + 'px';
        magCtx.clearRect(0,0,160,160); magCtx.save(); magCtx.translate(80,80); magCtx.scale(CONFIG.zoomLevel, CONFIG.zoomLevel);
        const vX = (x - bg.left) / bg.scaleX; const vY = (y - bg.top) / bg.scaleY;
        magCtx.drawImage(bg._element, vX-40, vY-40, 80, 80, -40, -40, 80, 80); magCtx.restore();
    }

    window.onresize = () => { canvas.setDimensions({ width: window.innerWidth, height: window.innerHeight - 70 }); canvas.renderAll(); };
</script>
