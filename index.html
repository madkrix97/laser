<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Points Move</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { padding: 10px; background: #1c1c1e; display: flex; gap: 10px; justify-content: center; }
        button { padding: 15px; border-radius: 10px; border: none; background: #007AFF; color: white; font-weight: bold; }
        .active { background: #FF9500 !important; }
        #c-w { flex-grow: 1; position: relative; touch-action: none; }
    </style>
</head>
<body>

<div class="toolbar">
    <button id="drawBtn">➕ РОЗМІР</button>
    <button id="delBtn" style="background:red">🗑️</button>
</div>

<div id="c-w">
    <canvas id="c"></canvas>
</div>

<script>
(function() {
    let canvas, isDrawing = false, firstPoint = null;

    window.onload = () => {
        canvas = new fabric.Canvas('c', {
            width: window.innerWidth,
            height: window.innerHeight - 80,
            backgroundColor: '#111',
            enableRetinaScaling: true,
            selection: false // вимикаємо рамку виділення для зручності тачу
        });

        document.getElementById('drawBtn').onclick = function() {
            isDrawing = !isDrawing;
            this.classList.toggle('active', isDrawing);
        };

        document.getElementById('delBtn').onclick = () => {
            // Видаляємо все, що пов'язане з активним об'єктом
            const active = canvas.getActiveObject();
            if (active && active.relation) {
                canvas.remove(active.relation.p1, active.relation.p2, active.relation.line, active.relation.text);
            }
            canvas.discardActiveObject().renderAll();
        };

        canvas.on('mouse:down', (opt) => {
            if (!isDrawing) return;
            const pointer = canvas.getPointer(opt.e);

            if (!firstPoint) {
                firstPoint = pointer;
                const dot = new fabric.Circle({
                    left: pointer.x, top: pointer.y, radius: 15, fill: 'rgba(255,255,0,0.5)',
                    originX: 'center', originY: 'center', selectable: false, id: 'tmp'
                });
                canvas.add(dot);
            } else {
                createSmartLine(firstPoint, pointer);
                canvas.getObjects('circle').forEach(o => { if(o.id==='tmp') canvas.remove(o); });
                firstPoint = null;
                isDrawing = false;
                document.getElementById('drawBtn').classList.remove('active');
            }
        });

        function createSmartLine(start, end) {
            // Створюємо дві точки
            const p1 = createAnchor(start.x, start.y);
            const p2 = createAnchor(end.x, end.y);

            // Створюємо лінію
            const line = new fabric.Line([p1.left, p1.top, p2.left, p2.top], {
                stroke: 'yellow', strokeWidth: 3, selectable: false, evented: false
            });

            // Створюємо текст
            const text = new fabric.Text('0.00m', {
                fontSize: 20, fill: 'white', backgroundColor: 'black',
                originX: 'center', originY: 'center', selectable: false, evented: false
            });

            // Зв'язуємо об'єкти
            const relation = { p1, p2, line, text };
            p1.relation = p2.relation = relation;

            canvas.add(line, text, p1, p2);
            updatePositions(relation);
        }

        function createAnchor(x, y) {
            return new fabric.Circle({
                left: x, top: y, radius: 20, // великий радіус для пальця
                fill: 'yellow', originX: 'center', originY: 'center',
                hasControls: false, hasBorders: false
            });
        }

        // Головна функція перемальовування при русі
        canvas.on('object:moving', (e) => {
            const obj = e.target;
            if (obj.relation) {
                updatePositions(obj.relation);
            }
        });

        function updatePositions(rel) {
            rel.line.set({ x1: rel.p1.left, y1: rel.p1.top, x2: rel.p2.left, y2: rel.p2.top });
            rel.text.set({
                left: (rel.p1.left + rel.p2.left) / 2,
                top: (rel.p1.top + rel.p2.top) / 2
            });
            
            // Розрахунок відстані (умовно, поки без калібрування)
            const d = Math.sqrt(Math.pow(rel.p2.left - rel.p1.left, 2) + Math.pow(rel.p2.top - rel.p1.top, 2));
            // Якщо буде підключено лазер, значення підставимо сюди
            
            rel.line.setCoords();
            rel.text.setCoords();
        }
    };
})();
</script>
</body>
</html>
