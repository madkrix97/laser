<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LaserApp Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --p-bg: #1c1c1e; --b-blue: #0A84FF; --b-green: #30D158; --b-orange: #FF9F0A; --b-red: #FF453A; }
        body { font-family: -apple-system, sans-serif; background: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .toolbar { padding: 10px; background: var(--p-bg); display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; border-bottom: 1px solid #333; z-index: 10; }
        button, label { background: var(--b-blue); color: white; border: none; padding: 10px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
        input[type="text"] { background: #2c2c2e; color: white; border: 1px solid #444; padding: 8px; border-radius: 6px; width: 130px; }
        #canvas-wrapper { flex-grow: 1; background: #111; position: relative; }
        .status-bar { font-size: 11px; color: #aaa; text-align: center; background: #1c1c1e; padding: 5px; border-top: 1px solid #333; }
        #gallery-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button id="authBtn">🔑 ВХІД</button>
        <input type="text" id="projectName" placeholder="Об'єкт">
        <label for="fileInput">📷 ФОТО</label>
        <input type="file" id="fileInput" style="display:none" accept="image/*">
        <button id="drawBtn">➕ РОЗМІР</button>
        <button id="laserBtn" style="background:#5856D6">🔌 ЛАЗЕР</button>
        <button id="saveBtn" style="background:var(--b-green)">☁️ ЗБЕРЕГТИ</button>
        <button id="galBtn" style="background:#64D2FF">🖼️ ХМАРА</button>
    </div>

    <div id="canvas-wrapper">
        <canvas id="c"></canvas>
    </div>
    <div class="status-bar" id="status">Статус: Завантаження...</div>

    <div id="gallery-overlay">
        <button id="closeGal" style="background:var(--b-red)">ЗАКРИТИ ГАЛЕРЕЮ</button>
        <div id="gallery-list" style="margin-top:20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

<script>
    // --- ПЕРЕМІННІ ---
    const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
    
    let canvas, tokenClient, gapiInited = false, gisInited = false;
    let isDrawMode = false, firstPoint = null, selectedLine = null;

    // --- ІНІЦІАЛІЗАЦІЯ ---
    window.addEventListener('load', () => {
        canvas = new fabric.Canvas('c', { 
            width: window.innerWidth, 
            height: window.innerHeight - 110 
        });
        
        // ПРИВ'ЯЗКА ПОДІЙ (Замість onclick в HTML)
        document.getElementById('authBtn').addEventListener('click', handleAuthClick);
        document.getElementById('drawBtn').addEventListener('click', toggleDrawMode);
        document.getElementById('saveBtn').addEventListener('click', syncWithCloud);
        document.getElementById('galBtn').addEventListener('click', showCloudGallery);
        document.getElementById('closeGal').addEventListener('click', () => {
            document.getElementById('gallery-overlay').style.display = 'none';
        });

        setupCanvasLogic();
        document.getElementById('status').innerText = "Додаток готовий. Очікування Google...";
    });

    function setupCanvasLogic() {
        canvas.on('mouse:down', (opt) => {
            if (!isDrawMode) return;
            const pointer = canvas.getPointer(opt.e);
            if (!firstPoint) {
                firstPoint = pointer;
                const dot = new fabric.Circle({ left: pointer.x-4, top: pointer.y-4, radius: 4, fill: 'yellow', selectable: false });
                canvas.add(dot);
            } else {
                const line = new fabric.Line([firstPoint.x, firstPoint.y, pointer.x, pointer.y], {
                    stroke: 'yellow', strokeWidth: 3, selectable: true, hasControls: false
                });
                const text = new fabric.Text('?', { 
                    fontSize: 18, fill: 'white', backgroundColor: 'black',
                    left: (firstPoint.x + pointer.x)/2, top: (firstPoint.y + pointer.y)/2 
                });
                line.textLabel = text;
                canvas.add(line, text);
                canvas.getObjects('circle').forEach(c => canvas.remove(c));
                firstPoint = null;
                canvas.renderAll();
            }
        });
    }

    function toggleDrawMode() {
        isDrawMode = !isDrawMode;
        const btn = document.getElementById('drawBtn');
        btn.style.background = isDrawMode ? '#FF9F0A' : '#0A84FF';
        document.getElementById('status').innerText = isDrawMode ? "РЕЖИМ МАЛЮВАННЯ" : "ВИБІР";
    }

    // --- GOOGLE API ---
    function gapiLoaded() {
        gapi.load('client', async () => {
            try {
                await gapi.client.init({apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]});
                gapiInited = true;
                document.getElementById('status').innerText = "Google Drive підключено";
            } catch(e) { console.error(e); }
        });
    }

    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: "https://www.googleapis.com/auth/drive.file",
            callback: (resp) => {
                if (resp.error) return;
                document.getElementById('authBtn').innerText = "✅ OK";
            }
        });
        gisInited = true;
    }

    function handleAuthClick() {
        if (tokenClient) tokenClient.requestAccessToken({prompt: 'consent'});
    }

    async function syncWithCloud() { /* логіка збереження... */ alert("Зберігаю..."); }
    async function showCloudGallery() { /* логіка галереї... */ document.getElementById('gallery-overlay').style.display='block'; }

    // Фото
    document.getElementById('fileInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            const r = Math.min(canvas.width/img.width, canvas.height/img.height);
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {scaleX:r, scaleY:r});
        });
        reader.readAsDataURL(e.target.files[0]);
    });
</script>

<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
