<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaserApp - Заміри офлайн/онлайн</title>
<script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
<style>
:root { --blue:#0A84FF; --bg:#1c1c1e; --item:#2c2c2e; --orange:#FF9500; --red:#FF453A; --green:#30D158; }
body{margin:0;font-family:-apple-system,sans-serif;display:flex;height:100vh;background:#000;color:white;overflow:hidden;}
#sidebar{width:260px;background:var(--bg);border-right:1px solid #333;display:flex;flex-direction:column;z-index:10;}
.sidebar-header{padding:15px;border-bottom:1px solid #333;display:flex;flex-direction:column;gap:8px;}
#project-list{flex-grow:1;overflow-y:auto;padding:10px;}
.project-item{padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer;background:var(--item);font-size:14px;border:1px solid transparent;}
.project-item.active{border-color:var(--blue);background:#3a3a3c;}
#main-area{flex-grow:1;display:flex;flex-direction:column;background:#111;position:relative;}
#canvas-wrapper{flex-grow:1;position:relative;touch-action:none;overflow:hidden;}
#photo-strip{height:110px;background:var(--bg);border-top:1px solid #333;display:flex;gap:12px;padding:10px;overflow-x:auto;align-items:center;}
.thumb{height:85px;width:85px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.thumb.active{border-color:var(--blue);}
.btn{padding:12px;border-radius:8px;border:none;color:white;font-weight:bold;cursor:pointer;font-size:13px;text-align:center;}
.btn-orange{background:var(--orange);}
.btn-blue{background:var(--blue);}
.btn-red{background:var(--red);}
.btn-dark{background:#3a3a3c;}
#status-bar{font-size:11px;color:var(--green);padding:5px;text-align:center;background:#000;}
#net-status{display:flex;align-items:center;gap:8px;font-size:14px;padding:6px 10px;border-radius:20px;background:#1e1e1e;color:#fff;width:max-content;}
#net-status .dot{width:10px;height:10px;border-radius:50%;background:gray;}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sidebar-header">
    <button id="authBtn" class="btn btn-dark">🔑 Google Drive</button>
    <button id="newProjectBtn" class="btn btn-dark">➕ НОВИЙ ОБ'ЄКТ</button>
    <div id="net-status"><span class="dot"></span><span class="text">Checking...</span></div>
    <div style="display:flex;gap:5px;margin-top:5px;">
      <button id="drawModeBtn" class="btn btn-orange" style="flex:2;">➕ РОЗМІР</button>
      <button id="delObjBtn" class="btn btn-red" style="flex:1;">🗑️</button>
    </div>
    <button id="exportBtn" class="btn btn-blue" style="margin-top:5px;">📥 ЗБЕРЕГТИ ФОТО</button>
  </div>
  <div id="project-list"></div>
  <div id="status-bar">Система готова</div>
</div>

<div id="main-area">
  <div id="canvas-wrapper"><canvas id="c"></canvas></div>
  <div id="photo-strip" style="display:none;">
    <div onclick="document.getElementById('fileInp').click()" style="height:85px;width:85px;background:#333;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;flex-shrink:0;">+</div>
    <div id="thumbs-container" style="display:flex;gap:12px;"></div>
  </div>
</div>
<input type="file" id="fileInp" accept="image/*" multiple style="display:none">

<script>
const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
const SCOPES = "https://www.googleapis.com/auth/drive.file";

let canvas=null, tokenClient=null, accessToken=localStorage.getItem('at');
let rootId=null, currentFolderId=null, currentPhotoId=null;
let isDrawingMode=false, firstPoint=null;
let photoCache={}, lineDataCache={}, offlineLineCache={};

// --- DEBOUNCE ---
function debounce(func, wait){let timeout; return function(...args){ clearTimeout(timeout); timeout = setTimeout(()=>func.apply(this,args), wait); }}

// --- STATUS BAR ---
function setStatus(msg, timeout=1000){const s=document.getElementById('status-bar'); s.innerText=msg; if(timeout>0) setTimeout(()=>{s.innerText="Система готова";},timeout);}

// ---------------- OFFLINE CACHE ----------------
const offlineCacheKey='laser_offline';
function loadOfflineCache(){ const data=localStorage.getItem(offlineCacheKey); if(data) lineDataCache=JSON.parse(data);}
function saveOfflineCache(){ localStorage.setItem(offlineCacheKey, JSON.stringify(lineDataCache)); }
loadOfflineCache();

// ---------------- GOOGLE API ----------------
function gapiLoaded(){ gapi.load('client', async ()=>{ await gapi.client.init({apiKey:API_KEY, discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]});});}
function gisLoaded(){ tokenClient=google.accounts.oauth2.initTokenClient({ client_id:CLIENT_ID, scope:SCOPES, callback:(res)=>{ accessToken=res.access_token; localStorage.setItem('at',accessToken); startApp(); } }); if(accessToken) startApp();}
document.getElementById('authBtn').onclick=()=>tokenClient?.requestAccessToken();

// ---------------- CANVAS ----------------
function initCanvas(){
  const wrapper=document.getElementById('canvas-wrapper');
  canvas=new fabric.Canvas('c',{width:wrapper.clientWidth,height:wrapper.clientHeight,selection:false,backgroundColor:'#111'});

  const saveCurrentDataDebounced=debounce(saveCurrentData,500);

  canvas.on('object:moving', e=>{ if(e.target.owner){ updateDimension(e.target.owner); saveCurrentDataDebounced(); } });
  canvas.on('object:modified', e=>{ if(e.target.owner){ updateDimension(e.target.owner); saveCurrentDataDebounced(); } });

  canvas.on('mouse:down', opt=>{ if(opt.e.altKey){ canvas.isDragging=true; canvas.lastPosX=opt.e.clientX; canvas.lastPosY=opt.e.clientY; }});
  canvas.on('mouse:move', opt=>{ if(canvas.isDragging){ const e=opt.e; canvas.viewportTransform[4]+=e.clientX-canvas.lastPosX; canvas.viewportTransform[5]+=e.clientY-canvas.lastPosY; canvas.requestRenderAll(); canvas.lastPosX=e.clientX; canvas.lastPosY=e.clientY;}});
  canvas.on('mouse:up', ()=>{ canvas.isDragging=false; });
}

// ---------------- DIMENSIONS ----------------
function createDimension(p1,p2,val="0.000"){
  const props={radius:12,fill:'rgba(255,149,0,0.8)',originX:'center',originY:'center',hasControls:false,hasBorders:false,role:'node'};
  const n1=new fabric.Circle({...props,left:p1.x,top:p1.y});
  const n2=new fabric.Circle({...props,left:p2.x,top:p2.y});
  const line=new fabric.Line([p1.x,p1.y,p2.x,p2.y],{stroke:'#FF9500',strokeWidth:3,selectable:false,evented:false});
  const text=new fabric.Text(val,{fontSize:20,fill:'white',backgroundColor:'black',originX:'center',originY:'center',hasControls:false});

  const owner={n1,n2,line,text};
  n1.owner=n2.owner=text.owner=owner;

  owner.getRelativeData=()=>{ if(!canvas.backgroundImage) return null; const img=canvas.backgroundImage; const left=img.left-(img.width*img.scaleX)/2; const top=img.top-(img.height*img.scaleY)/2; const width=img.width*img.scaleX; const height=img.height*img.scaleY; return {p1:{x:(n1.left-left)/width,y:(n1.top-top)/height},p2:{x:(n2.left-left)/width,y:(n2.top-top)/height},val:text.text};};

  text.on('mousedown',()=>{ const v=prompt("Розмір:",text.text); if(v){ text.set('text',v); canvas.renderAll(); saveCurrentData(); }});

  canvas.add(line,text,n1,n2);
  updateDimension(owner);
  return owner;
}
function updateDimension(o){ o.line.set({x1:o.n1.left,y1:o.n1.top,x2:o.n2.left,y2:o.n2.top}); o.text.set({left:(o.n1.left+o.n2.left)/2,top:(o.n1.top+o.n2.top)/2}); o.line.setCoords(); o.text.setCoords(); canvas.renderAll(); }

// ---------------- SAVE / LOAD ----------------
async function saveCurrentData(){
  if(!currentPhotoId || !canvas) return;
  const data=canvas.getObjects().filter(o=>o.owner&&o.role==='node').map(o=>o.owner.getRelativeData()).filter(n=>n);
  offlineLineCache[currentPhotoId]=data;
  lineDataCache[currentPhotoId]=data;
  saveOfflineCache();

  if(!navigator.onLine){ setStatus("⚡ Збережено локально",2000); return; }
  if(!accessToken) return;

  const fileName=`data_${currentPhotoId}.json`;
  try{
    const res=await gapi.client.drive.files.list({q:`name='${fileName}' and '${currentFolderId}' in parents and trashed=false`});
    const fileContent=JSON.stringify(data);

    if(res.result.files.length>0){
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${res.result.files[0].id}?uploadType=media`,{
        method:'PATCH', headers:{'Authorization':'Bearer '+accessToken}, body:fileContent
      });
    } else {
      const meta={name:fileName,parents:[currentFolderId]};
      const form=new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)],{type:'application/json'}));
      form.append('file', new Blob([fileContent],{type:'application/json'}));
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{'Authorization':'Bearer '+accessToken},body:form});
    }
    setStatus("✅ Збережено на Drive");
  }catch(err){ console.error(err); setStatus("❌ Помилка збереження",3000); }
}

function loadCurrentData(photoId){
  if(!canvas || !photoId) return;
  canvas.getObjects().forEach(obj=>{ if(obj.owner){ canvas.remove(obj.owner.n1,obj.owner.n2,obj.owner.line,obj.owner.text); }});
  canvas.renderAll();

  const bg=canvas.backgroundImage; if(!bg) return;
  const data=offlineLineCache[photoId]||lineDataCache[photoId]; if(!data) return;
  if(offlineLineCache[photoId]) setStatus("⚡ Використано локальні зміни",1500);

  const imgWidth=bg._element.naturalWidth||bg.width;
  const imgHeight=bg._element.naturalHeight||bg.height;
  const canvasWidth=canvas.width;
  const canvasHeight=canvas.height;
  const scale=Math.min(canvasWidth/imgWidth,canvasHeight/imgHeight);
  const offsetX=canvasWidth/2-(imgWidth*scale)/2;
  const offsetY=canvasHeight/2-(imgHeight*scale)/2;

  data.forEach(p=>{
    const x1=p.p1.x*scale+offsetX;
    const y1=p.p1.y*scale+offsetY;
    const x2=p.p2.x*scale+offsetX;
    const y2=p.p2.y*scale+offsetY;
    createDimension({x:x1,y:y1},{x:x2,y:y2},p.val);
  });
  canvas.renderAll();
}

// ---------------- PROJECTS / PHOTOS ----------------
async function loadProjects(){
  const list=document.getElementById('project-list'); list.innerHTML="";
  if(!accessToken) return;
  try{
    const res=await gapi.client.drive.files.list({q:`'${rootId}' in parents and trashed=false`,orderBy:'name'});
    res.result.files.forEach(f=>{
      const div=document.createElement('div'); div.className='project-item'; div.innerText="📂 "+f.name;
      div.onclick=()=>{ currentFolderId=f.id; loadPhotos(); };
      list.appendChild(div);
    });
  }catch(err){ console.error(err); setStatus("❌ Помилка завантаження проектів",3000); }
}

async function loadPhotos(){
  const container=document.getElementById('thumbs-container'); container.innerHTML="";
  document.getElementById('photo-strip').style.display='flex';
  if(!currentFolderId) return;
  try{
    const res=await gapi.client.drive.files.list({q:`'${currentFolderId}' in parents and mimeType contains 'image/' and trashed=false`});
    for(let i=0;i<res.result.files.length;i++){
      const file=res.result.files[i];
      const img=document.createElement('img'); img.className='thumb';
      const url=await fetchPhoto(file.id); img.src=url;
      img.onclick=()=>setMainImg(url,file.id,img);
      container.appendChild(img);
      if(i===0) setMainImg(url,file.id,img);
    }
  }catch(err){ console.error(err); setStatus("❌ Помилка завантаження фото",3000); }
}

async function fetchPhoto(id){
  if(photoCache[id]) return photoCache[id];
  const res=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:{'Authorization':'Bearer '+accessToken}});
  if(!res.ok) throw new Error("Помилка доступу до файлу"); 
  const blob=await res.blob(); const url=URL.createObjectURL(blob);
  photoCache[id]=url; return url;
}

async function setMainImg(url,id,thumb){
  currentPhotoId=id;
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active')); thumb.classList.add('active');
  if(!canvas) return;
  canvas.getObjects().forEach(obj=>canvas.remove(obj));
  fabric.Image.fromURL(url,img=>{
    const wrapper=document.getElementById('canvas-wrapper');
    canvas.setWidth(wrapper.clientWidth); canvas.setHeight(wrapper.clientHeight);
    const scale=Math.min(canvas.width/img.width,canvas.height/img.height);
    img.set({originX:'center',originY:'center',left:canvas.width/2,top:canvas.height/2,selectable:false,evented:false,scaleX:scale,scaleY:scale});
    canvas.setBackgroundImage(img,()=>{ canvas.viewportTransform=[1,0,0,1,0,0]; canvas.renderAll(); loadCurrentData(id); });
  },{crossOrigin:'anonymous'});

  // pan + zoom
  let isDragging=false,lastX=0,lastY=0;
  canvas.off('mouse:down'); canvas.off('mouse:move'); canvas.off('mouse:up');
  canvas.on('mouse:down',opt=>{ if(opt.e.altKey){ isDragging=true; lastX=opt.e.clientX; lastY=opt.e.clientY; }});
  canvas.on('mouse:move',opt=>{ if(isDragging){ const e=opt.e; const t=canvas.viewportTransform; t[4]+=e.clientX-lastX; t[5]+=e.clientY-lastY; canvas.setViewportTransform(t); canvas.requestRenderAll(); lastX=e.clientX; lastY=e.clientY;}});
  canvas.on('mouse:up',()=>{ isDragging=false; });
  canvas.on('mouse:wheel',opt=>{ const delta=opt.e.deltaY<0?1.1:0.9; const pointer=canvas.getPointer(opt.e); canvas.zoomToPoint({x:pointer.x,y:pointer.y},canvas.getZoom()*delta); opt.e.preventDefault(); opt.e.stopPropagation();});
}

// ---------------- OFFLINE → DRIVE SYNC ----------------
async function syncOfflineData(){
  const offlineIds=Object.keys(offlineLineCache);
  if(!offlineIds.length){ setStatus("✅ Немає даних для синхронізації",2000); updateNetStatus("online"); return; }
  updateNetStatus("sync"); setStatus(`🔄 Синхронізація ${offlineIds.length} фото...`,1000);
  for(let i=0;i<offlineIds.length;i++){
    const photoId=offlineIds[i]; currentPhotoId=photoId;
    try{ await saveCurrentData(); console.log(`✅ Синхронізовано photoId: ${photoId}`); } catch(err){ console.error(`❌ Помилка sync photoId: ${photoId}`,err); }
    await new Promise(r=>setTimeout(r,100));
  }
  offlineLineCache={}; localStorage.removeItem(offlineCacheKey);
  setStatus("✅ Синхронізація завершена",2000); updateNetStatus("online");
}

// ---------------- NETWORK STATUS ----------------
const netDot=document.querySelector('#net-status .dot');
const netText=document.querySelector('#net-status .text');
function updateNetStatus(state){
  if(state==="online"){ netDot.style.background="#18c964"; netText.textContent="ONLINE"; }
  else if(state==="offline"){ netDot.style.background="#f31260"; netText.textContent="OFFLINE"; }
  else if(state==="sync"){ netDot.style.background="#f5a524"; netText.textContent="SYNC..."; }
}

// ---------------- BUTTONS ----------------
document.getElementById('newProjectBtn').onclick=async ()=>{
  const name=prompt("Назва об'єкта:");
  if(name && rootId) await gapi.client.drive.files.create({resource:{name:name,mimeType:'application/vnd.google-apps.folder',parents:[rootId]}});
  loadProjects();
};

document.getElementById('drawModeBtn').onclick=function(){
  isDrawingMode=!isDrawingMode; this.style.background=isDrawingMode?"var(--green)":"var(--orange)";
  if(isDrawingMode){
    canvas.on('mouse:down',function(opt){
      if(!isDrawingMode) return;
      const pointer=canvas.getPointer(opt.e);
      if(!firstPoint) firstPoint={x:pointer.x,y:pointer.y};
      else{
        createDimension(firstPoint,{x:pointer.x,y:pointer.y},"0.000");
        saveCurrentData();
        firstPoint=null;
      }
    });
  } else { canvas.off('mouse:down'); firstPoint=null; }
};

document.getElementById('delObjBtn').onclick=()=>{ 
  const act=canvas.getActiveObject(); 
  if(act && act.owner){ canvas.remove(act.owner.n1,act.owner.n2,act.owner.line,act.owner.text); canvas.discardActiveObject().renderAll(); saveCurrentData(); } 
};

document.getElementById('exportBtn').onclick=()=>{ 
  if(!canvas || !canvas.backgroundImage) return; 
  const link=document.createElement('a'); 
  link.download=`plan_${Date.now()}.jpg`; 
  link.href=canvas.toDataURL({format:'jpeg',quality:0.95}); 
  link.click(); 
};

// ---------------- FILE UPLOAD ----------------
document.getElementById('fileInp').onchange=async function(e){
  const files=e.target.files; if(!files.length||!currentFolderId) return;
  for(let file of files){
    const metadata={name:file.name,parents:[currentFolderId]};
    const form=new FormData(); form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
    form.append('file',file);
    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
      method:'POST', headers:{'Authorization':'Bearer '+accessToken}, body:form
    });
  }
  loadPhotos();
};

// ---------------- INITIAL LOAD ----------------
window.onload=function(){
  const s=document.createElement('script'); s.src="https://apis.google.com/js/api.js"; s.onload=gapiLoaded; document.body.appendChild(s);
  const gis=document.createElement('script'); gis.src="https://accounts.google.com/gsi/client"; gis.onload=gisLoaded; document.body.appendChild(gis);

  if(navigator.onLine) updateNetStatus("online"); else updateNetStatus("offline");
};

window.addEventListener('online',()=>{ syncOfflineData(); });
window.addEventListener('offline',()=>{ setStatus("⚡ Відключено від інтернету, працюємо офлайн",3000); updateNetStatus("offline"); });

// ---------------- START APP ----------------
async function startApp(){
  if(!accessToken||!gapi.client) return;
  gapi.client.setToken({access_token:accessToken});
  document.getElementById('authBtn').innerText="✅ ONLINE";
  initCanvas();
  try{
    const res=await gapi.client.drive.files.list({q:"name='LaserApp' and mimeType='application/vnd.google-apps.folder' and trashed=false"});
    rootId=res.result.files.length?res.result.files[0].id:(await gapi.client.drive.files.create({resource:{name:'LaserApp',mimeType:'application/vnd.google-apps.folder'}})).result.id;
    loadProjects();
  } catch(err){ console.error(err); setStatus("❌ Помилка старту",3000); }
}
</script>
</body>
</html>
