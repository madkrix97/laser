<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Laser Measure PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body { margin:0; font-family:Arial; background:#111; color:#fff; }
#toolbar { padding:10px; background:#1e1e1e; display:flex; gap:10px; align-items:center; }
button { padding:6px 12px; cursor:pointer; }
canvas { border:1px solid #444; }
#status { margin-left:auto; font-size:14px; }
</style>
</head>
<body>

<div id="toolbar">
<input type="file" id="photoInput" accept="image/*">
<button onclick="syncToDrive()">💾 Sync</button>
<span id="status">Not authorized</span>
</div>

<canvas id="c"></canvas>

<script>
const CLIENT_ID = "300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com";
const API_KEY = "AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo";
const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest";
const SCOPES = "https://www.googleapis.com/auth/drive.file";

let canvas = new fabric.Canvas('c',{selection:false});
canvas.setWidth(window.innerWidth);
canvas.setHeight(window.innerHeight-60);

const AppState = {
    currentPhotoName:null,
    fileId:null,
    lines:[],
    isDirty:false
};

let tokenClient;
let accessToken=null;

function setStatus(t){ document.getElementById("status").innerText=t; }

// ---------------- AUTH ----------------

function initGapi(){
    gapi.load("client", async ()=>{
        await gapi.client.init({
            apiKey: API_KEY,
            discoveryDocs:[DISCOVERY_DOC],
        });
    });
}

function initGIS(){
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback:(tokenResponse)=>{
            accessToken=tokenResponse.access_token;
            setStatus("Authorized");
        }
    });
}

function authorize(){
    tokenClient.requestAccessToken();
}

window.onload=()=>{
    initGapi();
    initGIS();
    authorize();
};

// ---------------- PHOTO LOAD ----------------

document.getElementById("photoInput").addEventListener("change", function(e){

    const reader = new FileReader();
    const file = e.target.files[0];
    if(!file) return;

    AppState.currentPhotoName=file.name;
    AppState.lines=[];
    AppState.fileId=null;

    reader.onload=function(f){
        fabric.Image.fromURL(f.target.result,img=>{
            canvas.clear();
            canvas.setBackgroundImage(img,canvas.renderAll.bind(canvas),{
                originX:'center',
                originY:'center',
                left:canvas.width/2,
                top:canvas.height/2,
                scaleX: canvas.width/img.width,
                scaleY: canvas.height/img.height
            });
            loadFromDrive();
        });
    };
    reader.readAsDataURL(file);
});

// ---------------- DIMENSION TOOL ----------------

let tempPoints=[];

canvas.on("mouse:down", function(opt){
    const p = canvas.getPointer(opt.e);
    tempPoints.push({x:p.x,y:p.y});
    if(tempPoints.length===2){
        const val = prompt("Розмір:");
        if(val){
            addDimension(tempPoints[0],tempPoints[1],val);
        }
        tempPoints=[];
    }
});

function addDimension(p1,p2,val){

    const img = canvas.backgroundImage;
    const realW = img.width*img.scaleX;
    const realH = img.height*img.scaleY;
    const left = img.left-realW/2;
    const top  = img.top-realH/2;

    const rel={
        p1:{x:(p1.x-left)/realW,y:(p1.y-top)/realH},
        p2:{x:(p2.x-left)/realW,y:(p2.y-top)/realH},
        val:val
    };

    AppState.lines.push(rel);
    AppState.isDirty=true;
    renderLines();
}

function renderLines(){
    clearDimensions();
    const img = canvas.backgroundImage;
    if(!img) return;

    const realW = img.width*img.scaleX;
    const realH = img.height*img.scaleY;
    const left = img.left-realW/2;
    const top  = img.top-realH/2;

    AppState.lines.forEach(l=>{
        const x1=left+l.p1.x*realW;
        const y1=top +l.p1.y*realH;
        const x2=left+l.p2.x*realW;
        const y2=top +l.p2.y*realH;

        createVisualDimension(x1,y1,x2,y2,l.val);
    });

    canvas.renderAll();
}

function createVisualDimension(x1,y1,x2,y2,val){

    const line = new fabric.Line([x1,y1,x2,y2],{stroke:"red",strokeWidth:2,selectable:false});
    const text = new fabric.Text(val,{
        left:(x1+x2)/2,
        top:(y1+y2)/2,
        fill:"yellow",
        fontSize:16,
        selectable:false
    });

    const groupId = Date.now()+Math.random();
    line.groupId=groupId;
    text.groupId=groupId;

    line.on("mousedblclick",()=>removeDimension(groupId));
    text.on("mousedblclick",()=>removeDimension(groupId));

    canvas.add(line,text);
}

function removeDimension(id){
    canvas.getObjects().forEach(o=>{
        if(o.groupId===id) canvas.remove(o);
    });
    AppState.lines.splice(0,1);
    AppState.isDirty=true;
    canvas.renderAll();
}

function clearDimensions(){
    canvas.getObjects().forEach(o=>{
        if(o.type==="line"||o.type==="text") canvas.remove(o);
    });
}

// ---------------- DRIVE ----------------

async function loadFromDrive(){
    if(!accessToken) return;

    const q = `name='${AppState.currentPhotoName}.json'`;

    const res = await gapi.client.drive.files.list({
        q:q,
        fields:"files(id,name)"
    });

    if(res.result.files.length===0){
        renderLines();
        return;
    }

    const file=res.result.files[0];
    AppState.fileId=file.id;

    const fileData=await gapi.client.drive.files.get({
        fileId:file.id,
        alt:"media"
    });

    AppState.lines=JSON.parse(fileData.body);
    AppState.isDirty=false;
    renderLines();
}

async function syncToDrive(){
    if(!AppState.isDirty){ alert("Немає змін"); return; }

    const data=JSON.stringify(AppState.lines);

    if(AppState.fileId){
        await gapi.client.drive.files.update({
            fileId:AppState.fileId,
            uploadType:"media",
            body:data
        });
    }else{
        const res=await gapi.client.drive.files.create({
            resource:{name:`${AppState.currentPhotoName}.json`},
            media:{mimeType:"application/json",body:data},
            fields:"id"
        });
        AppState.fileId=res.result.id;
    }

    AppState.isDirty=false;
    alert("Saved to Drive");
}

// ---------------- ZOOM ----------------

canvas.on("mouse:wheel", function(opt){
    let zoom=canvas.getZoom();
    zoom*=0.999**opt.e.deltaY;
    if(zoom>5) zoom=5;
    if(zoom<0.2) zoom=0.2;
    canvas.zoomToPoint({x:opt.e.offsetX,y:opt.e.offsetY},zoom);
    opt.e.preventDefault();
    opt.e.stopPropagation();
});
</script>
</body>
</html>
