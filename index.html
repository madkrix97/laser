<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #auth {
            position: absolute;
            top: 10px;
            left: 10px;
        }
        #project-list {
            position: absolute;
            top: 50px;
            left: 10px;
            width: 200px;
            height: calc(100% - 50px);
            overflow-y: auto;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }
        #photo-viewer {
            position: absolute;
            top: 50px;
            left: 230px;
            width: calc(100% - 240px);
            height: calc(100% - 50px);
            border: 1px solid #ccc;
            background: #fff;
        }
    </style>
</head>
<body>
    <div id="auth">
        <h3>Authentication</h3>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="login">Login</button>
    </div>
    <div id="project-list">
        <h3>Project List</h3>
        <ul id="projects"></ul>
    </div>
    <div id="photo-viewer">
        <h3>Photo Viewer</h3>
        <img id="photo" src="" alt="Photo" style="max-width: 100%; max-height: 100%;">
    </div>
    <script>
        // Placeholder for project loading
        document.getElementById('login').addEventListener('click', function() {
            // Add authentication logic here
            console.log('Logged in:', document.getElementById('username').value);
        });

        // Placeholder for loading projects
        const projects = ['Project 1', 'Project 2', 'Project 3']; // Example projects
        const projectsList = document.getElementById('projects');
        projects.forEach(project => {
            const li = document.createElement('li');
            li.textContent = project;
            projectsList.appendChild(li);
        });

        // Placeholder for loading and switching photos
        const photos = ['photo1.jpg', 'photo2.jpg', 'photo3.jpg']; // Example photos
        let currentPhotoIndex = 0;
        document.getElementById('photo').src = photos[currentPhotoIndex];
        document.getElementById('projects').addEventListener('click', function() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            document.getElementById('photo').src = photos[currentPhotoIndex];
        });
    </script>
</body>
</html>
