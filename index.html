<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LaserApp Cloud Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --panel-bg: #1c1c1e; --btn-blue: #0A84FF; --btn-green: #30D158; --btn-orange: #FF9F0A; }
        body { font-family: -apple-system, sans-serif; background: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { padding: 10px; background: var(--panel-bg); display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; border-bottom: 1px solid #333; }
        button, label { background: var(--btn-blue); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
        input[type="text"] { background: #2c2c2e; color: white; border: 1px solid #444; padding: 8px; border-radius: 6px; width: 160px; }
        #canvas-wrapper { flex-grow: 1; position: relative; background: #111; }
        #authBtn { background: var(--btn-orange); }
        .sync-status { font-size: 10px; color: #888; width: 100%; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button id="authBtn" onclick="handleAuthClick()">🔑 УВІЙТИ GOOGLE</button>
        <input type="text" id="projectName" placeholder="Назва об'єкта">
        <label for="fileInput">📷 ФОТО</label>
        <input type="file" id="fileInput" style="display:none" accept="image/*">
        
        <button onclick="isDrawMode = !isDrawMode; this.classList.toggle('active')">➕ РОЗМІР</button>
        <button onclick="syncWithCloud()" style="background:var(--btn-green)">☁️ СИНХРОНІЗУВАТИ</button>
        <button onclick="showCloudGallery()">🖼️ ХМАРА</button>
        <div class="sync-status" id="status">Статус: Очікування авторизації</div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="c"></canvas>
    </div>

<script>
    // --- НАЛАШТУВАННЯ GOOGLE (ВСТАВ СВОЇ ДАНІ ТУТ) ---
    const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
    const API_KEY = 'ТВІЙ_API_KEY';
    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest";
    const SCOPES = "https://www.googleapis.com/auth/drive.file";

    let tokenClient;
    let gapiInited = false;
    let gisInited = false;

    // Ініціалізація Google API
    function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC]}); gapiInited = true; }); }
    function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({client_id: CLIENT_ID, scope: SCOPES, callback: ''}); gisInited = true; }

    async function handleAuthClick() {
        tokenClient.callback = async (resp) => {
            if (resp.error !== undefined) throw (resp);
            document.getElementById('authBtn').innerText = "✅ ПІДКЛЮЧЕНО";
            document.getElementById('status').innerText = "Статус: Авторизовано";
        };
        if (gapi.client.getToken() === null) { tokenClient.requestAccessToken({prompt: 'consent'}); }
        else { tokenClient.requestAccessToken({prompt: ''}); }
    }

    // --- ЛОГІКА ХМАРИ ---
    async function getOrCreateFolder(name, parentId = null) {
        let query = `name = '${name}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false`;
        if (parentId) query += ` and '${parentId}' in parents`;
        const resp = await gapi.client.drive.files.list({ q: query });
        if (resp.result.files.length > 0) return resp.result.files[0].id;
        
        const metadata = { name: name, mimeType: 'application/vnd.google-apps.folder', parents: parentId ? [parentId] : [] };
        const folder = await gapi.client.drive.files.create({ resource: metadata, fields: 'id' });
        return folder.result.id;
    }

    async function uploadFile(name, content, type, folderId) {
        // Видаляємо старий файл, якщо він є (перезапис)
        const old = await gapi.client.drive.files.list({ q: `name = '${name}' and '${folderId}' in parents and trashed = false` });
        if (old.result.files.length > 0) { await gapi.client.drive.files.delete({ fileId: old.result.files[0].id }); }

        const boundary = 'foo_bar_baz';
        const metadata = { name: name, parents: [folderId] };
        const multipartBody = `\r\n--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: ${type}\r\n\r\n${content}\r\n--${boundary}--`;
        
        return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${gapi.client.getToken().access_token}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
            body: multipartBody
        });
    }

    async function syncWithCloud() {
        const name = document.getElementById('projectName').value || "Без назви";
        document.getElementById('status').innerText = "Синхронізація...";
        
        try {
            const rootId = await getOrCreateFolder('LaserApp');
            const projectFolderId = await getOrCreateFolder(name, rootId);
            
            // JSON
            const json = JSON.stringify(canvas.toJSON(['measureId', 'subRole']));
            await uploadFile('data.json', json, 'application/json', projectFolderId);
            
            // Preview
            canvas.discardActiveObject().renderAll();
            const imgData = canvas.toDataURL({format:'jpeg', quality:0.5}).split(',')[1];
            await uploadFile('preview.jpg', atob(imgData), 'image/jpeg', projectFolderId);
            
            document.getElementById('status').innerText = "✅ Всі зміни в хмарі!";
        } catch (e) { alert("Помилка хмари: " + e.message); }
    }

    // --- ОСНОВНИЙ КАНВАС ---
    const canvas = new fabric.Canvas('c', { width: window.innerWidth, height: window.innerHeight - 100 });
    let isDrawMode = false;
    
    document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            const r = Math.min(canvas.width/img.width, canvas.height/img.height);
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {scaleX:r, scaleY:r});
        });
        reader.readAsDataURL(e.target.files[0]);
    };

    // (Тут залишається твоя логіка малювання ліній і Bluetooth з попередніх версій)
    // ...
</script>

<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
