<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaserApp Pro - Authorized</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.js"></script>
<style>
:root {
    --blue: #0A84FF; --bg: rgba(28, 28, 30, 0.85); --item: #2c2c2e; 
    --orange: #FF9500; --red: #FF453A; --green: #30D158; --dark: #3a3a3c;
}
body {margin:0; font-family:-apple-system,sans-serif; background:#000; color:white; overflow:hidden;}

/* ВЕРХНЯ ПАНЕЛЬ */
#header {
    position: fixed; top: 0; left: 0; right: 0; height: 50px;
    background: var(--bg); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 15px; z-index: 100; border-bottom: 1px solid #333;
}

/* ЛІВИЙ САЙДБАР */
#sidebar {
    position: fixed; left: 0; top: 50px; bottom: 0; width: 90px;
    background: var(--bg); backdrop-filter: blur(10px);
    display: flex; flex-direction: column; gap: 10px; padding: 10px;
    z-index: 90; border-right: 1px solid #333; overflow-y: auto;
}

/* КАНВАС */
#main-area { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
#canvas-wrapper { width: 100%; height: 100%; }

/* МЕНЮ ПРОЕКТІВ */
#project-dropdown {
    background: none; border: none; color: white; font-size: 16px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
}
#project-menu {
    display: none; position: absolute; top: 55px; left: 50%; transform: translateX(-50%);
    background: #2c2c2e; border: 1px solid #444; border-radius: 12px;
    width: 250px; max-height: 300px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
.menu-item { padding: 12px; border-bottom: 1px solid #38383a; cursor: pointer; }
.menu-item:hover { background: #3a3a3c; }

.thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
.thumb.active { border-color: var(--orange); }
.btn-round { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
.btn-orange { background: var(--orange); }
.btn-red { background: var(--red); }
.btn-blue { background: var(--blue); }
.btn-green { background: var(--green); }
</style>
</head>
<body>

<div id="header">
    <div style="display:flex; gap:10px; align-items:center;">
        <button id="authBtn" class="btn-round" style="background:#444" title="Вхід у Drive">🔑</button>
        <div style="width:1px; height:20px; background:#444;"></div>
        <button id="drawModeBtn" class="btn-round btn-orange" title="Малювати">➕</button>
        <button id="delObjBtn" class="btn-round btn-red" title="Видалити лінію">🗑️</button>
    </div>

    <div style="position: relative;">
        <button id="project-dropdown">📁 Виберіть об'єкт <small>▼</small></button>
        <div id="project-menu"></div> 
    </div>

    <div style="display:flex; gap:10px;">
        <button id="syncBtn" class="btn-round btn-blue" title="Синхронізація">☁️</button>
        <button id="exportBtn" class="btn-round btn-green" title="Експорт">📥</button>
        <button id="newProjectBtn" class="btn-round" style="background:#444">📂+</button>
    </div>
</div>

<div id="sidebar">
    <div onclick="document.getElementById('fileInp').click()" 
         style="width:70px; height:70px; background:#444; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; flex-shrink:0;">+</div>
    <div id="thumbs-container" style="display:flex; flex-direction:column; gap:10px;"></div>
</div>

<div id="main-area">
    <div id="canvas-wrapper"><canvas id="c"></canvas></div>
</div>

<input type="file" id="fileInp" accept="image/*" multiple style="display:none">
<div id="status-bar" style="position:fixed; bottom:10px; right:10px; font-size:10px; color:#666; z-index:101;">Система готова</div>

<script>
// --- ПІДГОТОВКА ЛУПИ ---
const magElem = document.createElement('div');
magElem.id = 'magnifier';
magElem.style.cssText = 'display:none; position:fixed; width:150px; height:150px; border-radius:50%; border:3px solid var(--orange); overflow:hidden; z-index:9999; pointer-events:none; box-shadow: 0 0 20px rgba(0,0,0,0.5); background:#111;';
const magCanvas = document.createElement('canvas');
magCanvas.width = 150; magCanvas.height = 150;
magElem.appendChild(magCanvas);
document.body.appendChild(magElem);
const mCtx = magCanvas.getContext('2d');

const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
const SCOPES = "https://www.googleapis.com/auth/drive.file";

let canvas=null, tokenClient=null, accessToken=localStorage.getItem('at');
let rootId=null, currentFolderId=null, currentPhotoId=null;
let firstPoint=null;
let isDrawingMode = false;
let photoCache={}, lineDataCache={};

function setStatus(msg, timeout=2000){
    const s=document.getElementById('status-bar');
    s.innerText=msg;
    if(timeout>0) setTimeout(()=>{s.innerText="Готово";},timeout);
}

// ---------------- ЛОКАЛЬНЕ ЗБЕРЕЖЕННЯ ----------------
function saveToLocal() {
    if (!currentPhotoId || !canvas || !canvas.backgroundImage) return;
    const img = canvas.backgroundImage;
    const scale = img.scaleX;
    const offsetX = (canvas.width / 2) - (img.width * scale / 2);
    const offsetY = (canvas.height / 2) - (img.height * scale / 2);

    const data = canvas.getObjects().filter(o => o.role === 'node' && o.owner).map(node => {
        if (node === node.owner.n1) {
            return {
                p1: { x: (node.owner.n1.left - offsetX) / scale, y: (node.owner.n1.top - offsetY) / scale },
                p2: { x: (node.owner.n2.left - offsetX) / scale, y: (node.owner.n2.top - offsetY) / scale },
                val: node.owner.text.text
            };
        }
        return null;
    }).filter(n => n);

    lineDataCache[currentPhotoId] = data;
    localStorage.setItem('laser_offline_cache', JSON.stringify(lineDataCache));
    setStatus("💾 Збережено");
}

// ---------------- DRIVE SYNC ----------------
async function syncAll() {
    if (!currentFolderId || !navigator.onLine) { alert("Немає зв'язку або не обрано проект!"); return; }
    setStatus("☁️ Синхронізація...");
    try {
        for (const photoId in lineDataCache) {
            const data = lineDataCache[photoId];
            if(!data || data.length === 0) continue;
            const fileName = `data_${photoId}.json`;
            const content = JSON.stringify(data);
            const res = await gapi.client.drive.files.list({ q: `name='${fileName}' and '${currentFolderId}' in parents and trashed=false` });

            if (res.result.files.length > 0) {
                await fetch(`https://www.googleapis.com/upload/drive/v3/files/${res.result.files[0].id}?uploadType=media`, {
                    method: 'PATCH', headers: { 'Authorization': 'Bearer ' + accessToken }, body: content
                });
            } else {
                const meta = { name: fileName, parents: [currentFolderId] };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                form.append('file', new Blob([content], { type: 'application/json' }));
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken }, body: form
                });
            }
        }
        setStatus("✅ Синхронізовано!");
    } catch (e) { setStatus("❌ Помилка Sync"); }
}

// ---------------- CANVAS ----------------
function initCanvas() {
    const wrapper = document.getElementById('canvas-wrapper');
    if (canvas) canvas.dispose();
    
    canvas = new fabric.Canvas('c', { 
        width: wrapper.clientWidth, 
        height: wrapper.clientHeight, 
        selection: false, 
        backgroundColor: '#111',
        // Оптимізація для плавності
        renderOnAddRemove: false,
        statefullCache: true
    });

    // Вимикаємо важке масштабування для Retina (планшет скаже "дякую")
    canvas.enableRetinaScaling = false;

    let isMultiTouch = false, lastTouchDist = 0, lastTouchMid = { x: 0, y: 0 };
    const mag = document.getElementById('magnifier');

    const updateMag = (evt) => {
        const pointer = canvas.getPointer(evt);
        const touch = evt.touches ? evt.touches[0] : evt;
        mag.style.display = 'block';
        mag.style.left = (touch.clientX - 75) + 'px';
        mag.style.top = (touch.clientY - 180) + 'px';
        mCtx.fillStyle = '#111'; 
        mCtx.fillRect(0, 0, 150, 150);
        mCtx.save();
        mCtx.translate(75, 75);
        mCtx.scale(2.5 * canvas.getZoom(), 2.5 * canvas.getZoom());
        mCtx.translate(-pointer.x, -pointer.y);
        canvas.renderCanvas(mCtx, canvas.getObjects());
        mCtx.restore();
        mCtx.strokeStyle = '#FF9500';
        mCtx.lineWidth = 1.5;
        mCtx.beginPath();
        mCtx.moveTo(75, 60); mCtx.lineTo(75, 90);
        mCtx.moveTo(60, 75); mCtx.lineTo(90, 75);
        mCtx.stroke();
    };

    canvas.on('mouse:down', (opt) => {
        const evt = opt.e;
        if (evt.touches && evt.touches.length === 2) {
            isMultiTouch = true;
            lastTouchDist = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
            lastTouchMid = { x: (evt.touches[0].clientX + evt.touches[1].clientX) / 2, y: (evt.touches[0].clientY + evt.touches[1].clientY) / 2 };
            mag.style.display = 'none';
            // Вимикаємо пошук об'єктів під час зуму
            canvas.skipTargetFind = true;
            return;
        }

        if (isDrawingMode || (opt.target && opt.target.role === 'node')) updateMag(evt);

        if (isDrawingMode && !isMultiTouch && !opt.target) {
            const pointer = canvas.getPointer(evt);
            if (!firstPoint) firstPoint = { x: pointer.x, y: pointer.y };
            else { createDimension(firstPoint, { x: pointer.x, y: pointer.y }, "0"); firstPoint = null; }
        }

        if (!isDrawingMode && opt.target && opt.target.type === 'text') {
            const v = prompt("Розмір:", opt.target.text);
            if (v !== null) { opt.target.set('text', v); canvas.renderAll(); saveToLocal(); }
        }
    });

    canvas.on('mouse:move', (opt) => {
        const evt = opt.e;
        
        if (evt.touches && evt.touches.length === 2) {
            isMultiTouch = true;
            const touch1 = evt.touches[0];
            const touch2 = evt.touches[1];
            const currentDist = Math.hypot(touch1.clientX - touch2.clientX, touch1.clientY - touch2.clientY);
            const currentMid = { x: (touch1.clientX + touch2.clientX) / 2, y: (touch1.clientY + touch2.clientY) / 2 };

            if (lastTouchDist > 0) {
                // Зум з лімітами (щоб не втратити картинку)
                let zoom = canvas.getZoom() * (currentDist / lastTouchDist);
                if (zoom > 15) zoom = 15;
                if (zoom < 0.05) zoom = 0.05;
                canvas.zoomToPoint({ x: currentMid.x, y: currentMid.y }, zoom);
                
                // Плавне переміщення через relativePan
                const dx = currentMid.x - lastTouchMid.x;
                const dy = currentMid.y - lastTouchMid.y;
                canvas.relativePan(new fabric.Point(dx, dy));
            }

            lastTouchDist = currentDist;
            lastTouchMid = currentMid;
            canvas.requestRenderAll(); // Оптимізований рендер
            return;
        }

        if (!isMultiTouch && (isDrawingMode || (opt.target && opt.target.role === 'node'))) {
            updateMag(evt);
        }
    });

    canvas.on('mouse:up', () => { 
        isMultiTouch = false; 
        lastTouchDist = 0;
        canvas.skipTargetFind = false; // Знову дозволяємо клікати по об'єктах
        mag.style.display = 'none'; 
        canvas.requestRenderAll();
    });

    canvas.on('object:moving', (e) => { if (e.target.owner) updateDimension(e.target.owner); });
    canvas.on('object:modified', saveToLocal);
}

function createDimension(p1, p2, val) {
    const nodeProps = { radius: 22, fill: 'rgba(255,149,0,0.1)', originX:'center', originY:'center', hasControls:false, hasBorders:false, role:'node' };
    const n1 = new fabric.Circle({ ...nodeProps, left: p1.x, top: p1.y });
    const n2 = new fabric.Circle({ ...nodeProps, left: p2.x, top: p2.y });
    const line = new fabric.Line([p1.x, p1.y, p2.x, p2.y], { stroke: '#FF9500', strokeWidth: 1.5, selectable: false });
    
    // ТУТ ВИПРАВЛЕНО: додано padding та вимкнено perPixelTargetFind
    const text = new fabric.Text(val, { 
        fontSize: 18, 
        padding: 25, 
        perPixelTargetFind: false, 
        fill: '#FF9500', 
        fontFamily: 'monospace', 
        backgroundColor: 'rgba(0,0,0,0.8)', 
        originX: 'center', 
        originY: 'center', 
        hasControls: false,
        selectable: true 
    });

    const tickProps = { stroke: '#FF9500', strokeWidth: 2, selectable: false };
    const tick1 = new fabric.Line([0,0,0,0], tickProps), tick2 = new fabric.Line([0,0,0,0], tickProps);
    const owner = { n1, n2, line, text, tick1, tick2 };
    n1.owner = n2.owner = text.owner = owner;
    canvas.add(line, tick1, tick2, text, n1, n2);
    updateDimension(owner);
    saveToLocal();
}

function updateDimension(owner) {
    const { n1, n2, line, text, tick1, tick2 } = owner;
    line.set({ x1: n1.left, y1: n1.top, x2: n2.left, y2: n2.top });
    text.set({ left: (n1.left + n2.left) / 2, top: (n1.top + n2.top) / 2 });
    const angle = Math.atan2(n2.top - n1.top, n2.left - n1.left) + Math.PI / 2;
    const dx = Math.cos(angle) * 8, dy = Math.sin(angle) * 8;
    tick1.set({ x1: n1.left-dx, y1: n1.top-dy, x2: n1.left+dx, y2: n1.top+dy });
    tick2.set({ x1: n2.left-dx, y1: n2.top-dy, x2: n2.left+dx, y2: n2.top+dy });
}

// ---------------- АВТОРИЗАЦІЯ ТА СТАРТ ----------------
async function startApp(){
    if(!gapi.client) { setTimeout(startApp, 500); return; }
    gapi.client.setToken({access_token:accessToken});
    
    const authBtn = document.getElementById('authBtn');
    if (accessToken) {
        authBtn.style.background = "var(--green)";
        authBtn.innerText = "👤";
    }

    initCanvas();
    try {
        const res = await gapi.client.drive.files.list({q:"name='LaserApp' and mimeType='application/vnd.google-apps.folder' and trashed=false"});
        rootId = res.result.files.length ? res.result.files[0].id : (await gapi.client.drive.files.create({resource:{name:'LaserApp',mimeType:'application/vnd.google-apps.folder'}})).result.id;
        loadProjects();
    } catch(e) { 
        setStatus("❌ Потрібен вхід"); 
        authBtn.style.background = "var(--red)";
    }
}

function gapiLoaded(){ 
    gapi.load('client', async () => {
        await gapi.client.init({apiKey:API_KEY, discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]});
        if(accessToken) startApp();
    });
}
function gisLoaded(){
    tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: (res)=>{ accessToken=res.access_token; localStorage.setItem('at',accessToken); startApp(); }});
}

// ---------------- ПРОЕКТИ ТА ФОТО ----------------
document.getElementById('project-dropdown').onclick = (e) => {
    const menu = document.getElementById('project-menu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    e.stopPropagation();
};
window.onclick = () => { document.getElementById('project-menu').style.display = 'none'; };

async function loadProjects(){
    const menu = document.getElementById('project-menu'); 
    menu.innerHTML = "";
    
    // Отримуємо список папок з Google Drive
    const res = await gapi.client.drive.files.list({ 
        q: `'${rootId}' in parents and trashed=false`, 
        orderBy:'name' 
    });
    
    res.result.files.forEach(f => {
        const item = document.createElement('div'); 
        item.className = 'menu-item'; 
        item.innerText = "📂 " + f.name;
        
        item.onclick = async () => {
            // 1. Оновлюємо заголовок меню
            document.getElementById('project-dropdown').innerHTML = f.name + " <small>▼</small>";
            
            // 2. Змінюємо поточну папку
            currentFolderId = f.id;
            
            // 3. !!! ВАЖЛИВО !!! Очищуємо канвас і старі прев'ю перед завантаженням нового проекту
            if(canvas) {
                canvas.clear();
                canvas.setBackgroundImage(null, canvas.renderAll.bind(canvas));
            }
            document.getElementById('thumbs-container').innerHTML = "⏳..."; 
            
            // 4. Підвантажуємо дані (лінії) та фото саме цього проекту
            await downloadProjectData(f.id); // Ця функція підтягне JSON з хмари
            loadPhotos(); // Ця функція знайде фото в цій папці
        };
        menu.appendChild(item);
    });
}
async function downloadProjectData(folderId) {
    setStatus("⏳ Завантаження даних проекту...");
    try {
        const res = await gapi.client.drive.files.list({
            q: `'${folderId}' in parents and name contains 'data_' and trashed=false`,
            fields: 'files(id, name)'
        });

        if (res.result.files && res.result.files.length > 0) {
            for (const file of res.result.files) {
                const photoId = file.name.replace('data_', '').replace('.json', '');
                const dataRes = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                lineDataCache[photoId] = await dataRes.json();
            }
            localStorage.setItem('laser_offline_cache', JSON.stringify(lineDataCache));
            setStatus("✅ Дані оновлено");
        }
    } catch (e) { console.error(e); }
}

async function loadPhotos(){
    const container=document.getElementById('thumbs-container'); container.innerHTML="";
    const res=await gapi.client.drive.files.list({q:`'${currentFolderId}' in parents and mimeType contains 'image/' and trashed=false`});
    res.result.files.forEach(async (file, idx)=>{
        const img=document.createElement('img'); img.className='thumb';
        const url=await fetchPhoto(file.id); img.src=url;
        img.onclick=()=>setMainImg(url, file.id, img);
        container.appendChild(img);
        if(idx===0) setMainImg(url, file.id, img);
    });
}

async function fetchPhoto(id){
    if(photoCache[id]) return photoCache[id];
    const res=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:{'Authorization':'Bearer '+accessToken}});
    const blob=await res.blob(); const url=URL.createObjectURL(blob);
    photoCache[id]=url; return url;
}

function setMainImg(url, id, thumb){
    currentPhotoId=id;
    document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active')); thumb.classList.add('active');
    fabric.Image.fromURL(url, (img)=>{
        const wrapper=document.getElementById('canvas-wrapper');
        canvas.setWidth(wrapper.clientWidth); canvas.setHeight(wrapper.clientHeight);
        const ratio=Math.min(canvas.width/img.width, canvas.height/img.height);
        img.set({ originX:'center', originY:'center', left:canvas.width/2, top:canvas.height/2, selectable:false, scaleX:ratio, scaleY:ratio });
        canvas.setBackgroundImage(img, ()=>{ 
            canvas.getObjects().forEach(o=>canvas.remove(o));
            const data = lineDataCache[id] || [];
            const offsetX = (canvas.width/2)-(img.width*ratio/2), offsetY = (canvas.height/2)-(img.height*ratio/2);
            data.forEach(p => createDimension({x:(p.p1.x*ratio)+offsetX, y:(p.p1.y*ratio)+offsetY}, {x:(p.p2.x*ratio)+offsetX, y:(p.p2.y*ratio)+offsetY}, p.val));
            canvas.renderAll(); 
        });
    }, {crossOrigin:'anonymous'});
}

// ---------------- КНОПКИ ----------------
document.getElementById('authBtn').onclick = () => tokenClient?.requestAccessToken();
document.getElementById('drawModeBtn').onclick = function() { isDrawingMode = !isDrawingMode; this.style.background = isDrawingMode ? "var(--green)" : "var(--orange)"; };
document.getElementById('delObjBtn').onclick = () => { const act = canvas.getActiveObject(); if (act && act.owner) { canvas.remove(act.owner.n1, act.owner.n2, act.owner.line, act.owner.text, act.owner.tick1, act.owner.tick2); saveToLocal(); canvas.renderAll(); }};
document.getElementById('syncBtn').onclick = syncAll;
document.getElementById('exportBtn').onclick = () => { const link = document.createElement('a'); link.download = 'export.jpg'; link.href = canvas.toDataURL({format:'jpeg', quality:0.9, multiplier:1.5}); link.click(); };
document.getElementById('newProjectBtn').onclick = async () => {
    const name = prompt("Назва проекту:");
    if (name) {
        await gapi.client.drive.files.create({resource:{name, mimeType:'application/vnd.google-apps.folder', parents:[rootId]}});
        loadProjects();
    }
};

document.getElementById('fileInp').onchange = async (e) => {
    if (!currentFolderId) { alert("Оберіть проект!"); return; }
    setStatus("⏳ Завантаження...");
    for (let file of e.target.files) {
        const metadata = { name: file.name, parents: [currentFolderId] };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', file);
        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken }, body: form });
    }
    loadPhotos();
};

window.onload=()=>{
    const s1=document.createElement('script'); s1.src="https://apis.google.com/js/api.js"; s1.onload=gapiLoaded; document.body.appendChild(s1);
    const s2=document.createElement('script'); s2.src="https://accounts.google.com/gsi/client"; s2.onload=gisLoaded; document.body.appendChild(s2);
    const saved = localStorage.getItem('laser_offline_cache'); if(saved) lineDataCache=JSON.parse(saved);
};
</script>
</body>
</html>
