<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Pro - AutoConnect</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        :root { --blue: #0A84FF; --bg: #1c1c1e; --item: #2c2c2e; }
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: #000; color: white; overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--bg); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        #project-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        
        .project-item { 
            padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; 
            background: var(--item); border: 1px solid transparent; transition: 0.2s;
        }
        .project-item.active { border-color: var(--blue); background: #3a3a3c; }

        #main-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; position: relative; }
        #main-image { max-width: 95%; max-height: 95%; border-radius: 4px; display: none; object-fit: contain; }
        
        button { padding: 12px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        .secondary-btn { background: #3a3a3c; font-size: 12px; }

        #status { font-size: 11px; color: #888; padding: 8px; text-align: center; background: var(--bg); border-top: 1px solid #333; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <button id="authBtn">🔑 Увійти в Google</button>
            <button id="newProjectBtn" class="secondary-btn" disabled>➕ НОВИЙ ПРОЕКТ</button>
            <input type="file" id="fileInp" accept="image/*">
        </div>
        <div id="project-list">
            <div style="color:#666; text-align:center; padding-top:20px;">Авторизація...</div>
        </div>
        <div id="status">LaserApp: Ініціалізація</div>
    </div>

    <div id="main-view">
        <div id="msg" style="color:#444">Оберіть або створіть проект</div>
        <img id="main-image">
    </div>

<script>
    const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest";
    const SCOPES = "https://www.googleapis.com/auth/drive.file";

    let tokenClient, accessToken = localStorage.getItem('at'), rootId = null;

    function gapiLoaded() {
        gapi.load('client', () => gapi.client.init({apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC]}));
    }

    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (res) => {
                if (res.error) return;
                saveToken(res.access_token, res.expires_in);
                startApp();
            }
        });
        // Авто-вхід, якщо токен є в пам'яті
        if (accessToken && Date.now() < localStorage.getItem('ex')) startApp();
    }

    function saveToken(token, expires) {
        accessToken = token;
        localStorage.setItem('at', token);
        localStorage.setItem('ex', Date.now() + (expires * 1000));
    }

    async function startApp() {
        document.getElementById('authBtn').innerText = "✅ ВХІД ВИКОНАНО";
        document.getElementById('newProjectBtn').disabled = false;
        gapi.client.setToken({ access_token: accessToken });
        await findOrCreateRoot();
    }

    async function findOrCreateRoot() {
        const res = await gapi.client.drive.files.list({ q: "name='LaserApp' and mimeType='application/vnd.google-apps.folder' and trashed=false" });
        if (res.result.files.length > 0) {
            rootId = res.result.files[0].id;
        } else {
            const create = await gapi.client.drive.files.create({ resource: { name: 'LaserApp', mimeType: 'application/vnd.google-apps.folder' } });
            rootId = create.result.id;
        }
        loadProjects();
    }

    async function loadProjects() {
        const list = document.getElementById('project-list');
        list.innerHTML = "";
        const res = await gapi.client.drive.files.list({ q: `'${rootId}' in parents and trashed=false`, orderBy: 'name' });
        res.result.files.forEach(f => {
            const div = document.createElement('div');
            div.className = 'project-item';
            div.innerText = "📂 " + f.name;
            div.onclick = () => selectProject(f.id, div);
            list.appendChild(div);
        });
        document.getElementById('status').innerText = "Проекти оновлено";
    }

    // СТВОРЕННЯ НОВОГО ПРОЕКТУ
    document.getElementById('newProjectBtn').onclick = () => document.getElementById('fileInp').click();

    document.getElementById('fileInp').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const projName = prompt("Введіть назву проекту:", "Новий об'єкт");
        if (!projName) return;

        document.getElementById('status').innerText = "Створення проекту...";
        
        // 1. Створюємо папку проекту
        const folder = await gapi.client.drive.files.create({
            resource: { name: projName, mimeType: 'application/vnd.google-apps.folder', parents: [rootId] }
        });
        const folderId = folder.result.id;

        // 2. Завантажуємо фото
        const metadata = { name: 'main_photo.jpg', parents: [folderId] };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
        form.append('file', file);

        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken },
            body: form
        });

        loadProjects();
    };

    async function selectProject(id, el) {
        document.querySelectorAll('.project-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        const img = document.getElementById('main-image');
        img.style.display = "none";
        
        const res = await gapi.client.drive.files.list({ q: `'${id}' in parents and mimeType contains 'image/'` });
        if (res.result.files.length > 0) {
            const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${res.result.files[0].id}?alt=media`, {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            img.src = URL.createObjectURL(await fileRes.blob());
            img.onload = () => { img.style.display = "block"; document.getElementById('msg').style.display = "none"; };
        }
    }

    document.getElementById('authBtn').onclick = () => tokenClient.requestAccessToken();
</script>

<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
