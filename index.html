<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LaserApp Pro Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --panel-bg: #1c1c1e; --btn-blue: #0A84FF; --btn-green: #30D158; --btn-orange: #FF9F0A; --btn-red: #FF453A; }
        body { font-family: -apple-system, sans-serif; background: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .toolbar { padding: 10px; background: var(--panel-bg); display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; border-bottom: 1px solid #333; z-index: 10; }
        button, label { background: var(--btn-blue); color: white; border: none; padding: 10px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
        button.active { background: var(--btn-orange); outline: 2px solid white; }
        input[type="text"] { background: #2c2c2e; color: white; border: 1px solid #444; padding: 8px; border-radius: 6px; width: 140px; }
        #canvas-wrapper { flex-grow: 1; position: relative; background: #111; touch-action: none; }
        .status-bar { font-size: 11px; color: #aaa; text-align: center; background: #1c1c1e; padding: 4px; border-top: 1px solid #333; }
        #gallery-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; padding: 20px; box-sizing: border-box; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .project-card { background: #2c2c2e; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #444; }
        .project-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button id="authBtn" onclick="handleAuthClick()" style="background:var(--btn-orange)">🔑 ВХІД</button>
        <input type="text" id="projectName" placeholder="Назва об'єкта">
        <label for="fileInput">📷 ФОТО</label>
        <input type="file" id="fileInput" style="display:none" accept="image/*">
        
        <button id="drawBtn" onclick="toggleDrawMode()">➕ РОЗМІР</button>
        <button id="laserBtn" onclick="connectLaser()" style="background:#5856D6">🔌 ЛАЗЕР</button>
        <button onclick="syncWithCloud()" style="background:var(--btn-green)">☁️ ЗБЕРЕГТИ</button>
        <button onclick="showCloudGallery()" style="background:#64D2FF">🖼️ ХМАРА</button>
        <button onclick="deleteSelected()" style="background:var(--btn-red)">🗑️</button>
    </div>

    <div id="canvas-wrapper">
        <canvas id="c"></canvas>
    </div>

    <div class="status-bar" id="status">Статус: Очікування авторизації</div>

    <div id="gallery-overlay">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0">Ваші проекти</h2>
            <button onclick="document.getElementById('gallery-overlay').style.display='none'" style="background:var(--btn-red)">ЗАКРИТИ</button>
        </div>
        <div id="gallery-list" class="gallery-grid"></div>
    </div>

<script>
// --- НАЛАШТУВАННЯ GOOGLE ---
const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo'; // ПЕРЕВІР ЦЕЙ РЯДОК!
const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest";
const SCOPES = "https://www.googleapis.com/auth/drive.file";

let tokenClient, gapiInited = false, gisInited = false;
let canvas, isDrawMode = false, firstPoint = null;
let selectedLine = null, bluetoothDevice = null, characteristic = null;

// ПРАВИЛЬНА ІНІЦІАЛІЗАЦІЯ КАНВАСУ
window.onload = () => {
    canvas = new fabric.Canvas('c', { 
        width: window.innerWidth, 
        height: window.innerHeight - 110,
        selection: true 
    });
    console.log("Canvas ready");
    setupCanvasEvents();
};

function setupCanvasEvents() {
    canvas.on('mouse:down', (opt) => {
        if (!isDrawMode) return;
        const pointer = canvas.getPointer(opt.e);
        
        if (!firstPoint) {
            firstPoint = pointer;
            const dot = new fabric.Circle({ 
                left: pointer.x - 4, top: pointer.y - 4, 
                radius: 4, fill: 'yellow', selectable: false, id: 'temp_dot' 
            });
            canvas.add(dot);
        } else {
            const line = new fabric.Line([firstPoint.x, firstPoint.y, pointer.x, pointer.y], {
                stroke: 'yellow', strokeWidth: 3, selectable: true, hasControls: false
            });
            const text = new fabric.Text('?', { 
                fontSize: 18, fill: 'white', backgroundColor: 'black',
                left: (firstPoint.x + pointer.x)/2, top: (firstPoint.y + pointer.y)/2 
            });
            line.textLabel = text;
            canvas.add(line, text);
            
            // Видаляємо тимчасову точку
            canvas.getObjects('circle').forEach(obj => { if(obj.id === 'temp_dot') canvas.remove(obj); });
            firstPoint = null;
            canvas.renderAll();
        }
    });

    canvas.on('selection:created', (e) => { if(e.selected[0].type === 'line') selectedLine = e.selected[0]; });
    canvas.on('selection:cleared', () => selectedLine = null);
}

// ФУНКЦІЇ КНОПОК
function toggleDrawMode() {
    isDrawMode = !isDrawMode;
    const btn = document.getElementById('drawBtn');
    btn.style.background = isDrawMode ? 'var(--btn-orange)' : 'var(--btn-blue)';
    canvas.discardActiveObject().renderAll();
    document.getElementById('status').innerText = isDrawMode ? "РЕЖИМ МАЛЮВАННЯ: Клікніть дві точки" : "РЕЖИМ ВИБОРУ";
}

function deleteSelected() {
    const active = canvas.getActiveObject();
    if (active) {
        if (active.textLabel) canvas.remove(active.textLabel);
        canvas.remove(active);
        canvas.discardActiveObject().renderAll();
    }
}

// --- GOOGLE API (БЕЗПЕЧНЕ ЗАВАНТАЖЕННЯ) ---
function gapiLoaded() { 
    gapi.load('client', async () => { 
        try {
            await gapi.client.init({apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC]}); 
            gapiInited = true; 
        } catch(e) { console.error("GAPI Error", e); }
    }); 
}

function gisLoaded() { 
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES, callback: ''
    }); 
    gisInited = true; 
}

async function handleAuthClick() {
    if (!tokenClient) return alert("Бібліотека Google не завантажена");
    tokenClient.callback = (resp) => {
        if (resp.error) return;
        document.getElementById('authBtn').innerText = "✅ OK";
        document.getElementById('status').innerText = "Хмара підключена";
    };
    tokenClient.requestAccessToken({prompt: 'consent'});
}

// Решта функцій (syncWithCloud, connectLaser і т.д.) залишаються без змін
</script>

<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
