<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Engineering Fix</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        .toolbar { padding: 10px; background: #1c1c1e; display: flex; gap: 8px; justify-content: center; border-bottom: 1px solid #333; }
        button { padding: 12px 15px; border-radius: 10px; border: none; background: #007AFF; color: white; font-weight: bold; font-size: 13px; }
        .active-btn { background: #FF9500 !important; }
        #c-container { flex-grow: 1; position: relative; touch-action: none; }
        #status { font-size: 12px; color: #888; text-align: center; padding: 6px; background: #1c1c1e; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button id="drawBtn">➕ РОЗМІР</button>
        <button id="photoBtn">📷 ФОТО</button>
        <button id="laserBtn" style="background:#5856D6">🔌 ЛАЗЕР</button>
        <button id="delBtn" style="background:#FF3B30">🗑️</button>
        <input type="file" id="fileInp" style="display:none" accept="image/*">
    </div>

    <div id="c-container">
        <canvas id="c"></canvas>
    </div>
    <div id="status">Натисніть на лінію, щоб активувати точки</div>

<script>
(function() {
    let canvas, isDrawing = false, firstPoint = null;
    let activePair = null;

    window.onload = () => {
        canvas = new fabric.Canvas('c', {
            width: window.innerWidth,
            height: window.innerHeight - 90,
            backgroundColor: '#111',
            enableRetinaScaling: true,
            selection: false
        });

        // --- ОБРОБКА КЛІКІВ ---
        canvas.on('mouse:down', (opt) => {
            const target = canvas.findTarget(opt.e);

            // Режим малювання
            if (isDrawing) {
                const pointer = canvas.getPointer(opt.e);
                handleNewDimension(pointer);
                return;
            }

            // Логіка активації
            if (target && target.pair) {
                activatePair(target.pair);
            } else if (!target) {
                deactivateAll();
            }
        });

        function handleNewDimension(pointer) {
            if (!firstPoint) {
                firstPoint = pointer;
                const dot = new fabric.Circle({
                    left: pointer.x, top: pointer.y, radius: 5, fill: '#FF9500',
                    originX: 'center', originY: 'center', selectable: false, id: 'temp'
                });
                canvas.add(dot);
            } else {
                createDimension(firstPoint, pointer);
                canvas.getObjects('circle').forEach(o => { if(o.id === 'temp') canvas.remove(o); });
                firstPoint = null;
                isDrawing = false;
                document.getElementById('drawBtn').classList.remove('active-btn');
            }
        }

        function createDimension(p1Pos, p2Pos) {
            const p1 = new fabric.Circle({
                left: p1Pos.x, top: p1Pos.y, radius: 25, fill: 'rgba(48, 209, 88, 0.7)',
                originX: 'center', originY: 'center', hasControls: false, 
                selectable: false, visible: false, role: 'anchor'
            });
            const p2 = new fabric.Circle({
                left: p2Pos.x, top: p2Pos.y, radius: 25, fill: 'rgba(48, 209, 88, 0.7)',
                originX: 'center', originY: 'center', hasControls: false, 
                selectable: false, visible: false, role: 'anchor'
            });

            const line = new fabric.Line([p1.left, p1.top, p2.left, p2.top], {
                stroke: '#FF9500', strokeWidth: 5, selectable: true, hasControls: false, perPixelTargetFind: true, targetFindTolerance: 15
            });

            const text = new fabric.Text('0.000', {
                fontSize: 22, fill: 'white', backgroundColor: 'rgba(0,0,0,0.8)',
                originX: 'center', originY: 'center', selectable: true, hasControls: false, padding: 5
            });

            const pair = { p1, p2, line, text };
            p1.pair = p2.pair = line.pair = text.pair = pair;

            // Ручний ввід
            text.on('mousedown', () => {
                if(activePair === pair) {
                    const val = prompt("Розмір (м):", text.text);
                    if (val !== null) text.set('text', parseFloat(val).toFixed(3));
                    canvas.renderAll();
                }
            });

            canvas.add(line, text, p1, p2);
            activatePair(pair);
        }

        function activatePair(pair) {
            deactivateAll();
            activePair = pair;
            
            // Робимо точки видимими та такими, що можна тягнути
            pair.p1.set({ visible: true, selectable: true, evented: true });
            pair.p2.set({ visible: true, selectable: true, evented: true });
            pair.line.set('stroke', '#30D158'); // зелений колір активного
            
            // Виводимо на передній план
            pair.p1.bringToFront();
            pair.p2.bringToFront();
            
            canvas.setActiveObject(pair.line);
            canvas.renderAll();
            document.getElementById('status').innerText = "Розмір активний. Тягніть зелені точки.";
        }

        function deactivateAll() {
            canvas.getObjects().forEach(obj => {
                if (obj.role === 'anchor') {
                    obj.set({ visible: false, selectable: false, evented: false });
                }
                if (obj.pair) obj.pair.line.set('stroke', '#FF9500');
            });
            activePair = null;
            canvas.renderAll();
            document.getElementById('status').innerText = "Оберіть лінію для редагування";
        }

        canvas.on('object:moving', (e) => {
            if (e.target.pair) {
                const p = e.target.pair;
                p.line.set({ x1: p.p1.left, y1: p.p1.top, x2: p.p2.left, y2: p.p2.top });
                p.text.set({ left: (p.p1.left + p.p2.left) / 2, top: (p.p1.top + p.p2.top) / 2 });
                p.line.setCoords();
                p.text.setCoords();
            }
        });

        // Кнопки
        document.getElementById('drawBtn').onclick = function() {
            isDrawing = !isDrawing;
            this.classList.toggle('active-btn', isDrawing);
            if(isDrawing) deactivateAll();
        };
        
        document.getElementById('photoBtn').onclick = () => document.getElementById('fileInp').click();
        
        document.getElementById('delBtn').onclick = () => {
            if (activePair) {
                canvas.remove(activePair.p1, activePair.p2, activePair.line, activePair.text);
                activePair = null;
                canvas.renderAll();
            }
        };

        // ФОТО
        document.getElementById('fileInp').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
                const r = Math.min(canvas.width/img.width, canvas.height/img.height);
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {scaleX:r, scaleY:r, originX:'left', originY:'top'});
            });
            reader.readAsDataURL(e.target.files[0]);
        };
    };
})();
</script>
</body>
</html>
