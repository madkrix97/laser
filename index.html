<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive Auth and Gallery</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        // Google Drive Authentication
        function handleClientLoad() {
            gapi.load('client:auth2', initClient);
        }
        function initClient() {
            gapi.client.init({
                apiKey: '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com',
                clientId: 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo',
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
                scope: 'https://www.googleapis.com/auth/drive.metadata.readonly',
            }).then(() => {
                return gapi.auth2.getAuthInstance().signIn();
            }).then(() => {
                listFiles();
            });
        }
        function listFiles() {
            gapi.client.drive.files.list({
                pageSize: 10,
                fields: 'nextPageToken, files(id, name)'
            }).then(response => {
                const files = response.result.files;
                const output = document.getElementById('content');
                output.innerHTML = ''; // Clear existing content
                files.forEach(file => {
                    const div = document.createElement('div');
                    div.innerText = file.name;
                    output.appendChild(div);
                });
            });
        }
    </script>
</head>
<body onload="handleClientLoad()">
    <h1>Google Drive Projects List</h1>
    <div id="content"></div>
    <h1>Photos Gallery</h1>
    <div>
        <img src="YOUR_IMAGE_URL" alt="Photo Gallery" style="width:100%;">
    </div>
    <h1>Canvas</h1>
    <canvas id="myCanvas" width="500" height="500" style="border:1px solid #000000;">
        Your browser does not support the canvas element.
    </canvas>
    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        // Draw a simple coordinate system
        ctx.moveTo(0, 250);
        ctx.lineTo(500, 250);
        ctx.moveTo(250, 0);
        ctx.lineTo(250, 500);
        ctx.stroke();
    </script>
</body>
</html>
