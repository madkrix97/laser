<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Coordinate System Fix</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        #canvas {
            position: relative;
            border: 1px solid #000;
        }
        #image {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div id="canvas">
        <img id="image" src="path/to/image.jpg" alt="Image" />
    </div>
    <button id="upload-btn">ЗАВАНТАЖИТИ ЗМІНИ</button>
    <script>
        let image = document.getElementById('image');
        let uploadButton = document.getElementById('upload-btn');
        
        function setImagePosition(x, y) {
            image.style.top = y + 'px';
            image.style.left = x + 'px';
        }
        
        // Implement local-first workflow
        uploadButton.onclick = function() {
            // Logic to handle explicit uploads and save changes
            alert('Changes uploaded!');
        };

        // Initial position set relative to the original image
        setImagePosition(0, 0);
    </script>
</body>
</html>
