<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Pro - Canvas & Sync</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        :root { --blue: #0A84FF; --bg: #1c1c1e; --red: #FF453A; }
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: #000; color: white; overflow: hidden; }
        
        #sidebar { width: 260px; background: var(--bg); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 8px; }
        #project-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        
        .project-item { padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; background: #2c2c2e; font-size: 14px; }
        .project-item.active { border: 1px solid var(--blue); background: #3a3a3c; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; background: #111; }
        #canvas-wrapper { flex-grow: 1; overflow: hidden; position: relative; touch-action: none; }

        /* Галерея */
        #photo-strip { height: 110px; background: var(--bg); border-top: 1px solid #333; display: flex; gap: 12px; padding: 10px; overflow-x: auto; align-items: center; }
        .thumb-wrap { position: relative; flex-shrink: 0; }
        .thumb { height: 85px; width: 85px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .thumb.active { border-color: var(--blue); }
        .del-btn { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border-radius: 50%; width: 22px; height: 22px; border: none; font-size: 14px; cursor: pointer; font-weight: bold; }

        .add-photo-btn { height: 85px; width: 85px; background: #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 30px; }

        button { padding: 10px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; }
        #status { font-size: 11px; color: #888; padding: 5px; text-align: center; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <button id="authBtn">🔑 Google Drive</button>
            <button id="newProjectBtn" style="background:#3a3a3c; font-size:12px;">➕ НОВИЙ ОБ'ЄКТ</button>


            <button id="drawModeBtn" style="flex: 1; background: #FF9500;">➕ РОЗМІР</button>
            <button id="delObjBtn" style="flex: 0.3; background: #FF453A;">🗑️</button>

            
        </div>
        <div id="project-list"></div>
        <div id="status">LaserApp: Очікування</div>
    </div>

    <div id="main-area">
        <div id="canvas-wrapper">
            <canvas id="c"></canvas>
        </div>
        
        <div id="photo-strip" style="display: none;">
            <div class="add-photo-btn" onclick="document.getElementById('extraFileInp').click()">+</div>
            <div id="thumbs-container" style="display: flex; gap: 12px;"></div>
        </div>
    </div>

    <input type="file" id="fileInp" accept="image/*">
    <input type="file" id="extraFileInp" accept="image/*" multiple>

<script>
    const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
    const SCOPES = "https://www.googleapis.com/auth/drive.file";

    let canvas, accessToken = localStorage.getItem('at'), rootId = null, currentFolderId = null;

    // --- ІНІЦІАЛІЗАЦІЯ CANVAS ---
    function initCanvas() {
        canvas = new fabric.Canvas('c', {
            width: document.getElementById('canvas-wrapper').clientWidth,
            height: document.getElementById('canvas-wrapper').clientHeight,
            backgroundColor: '#111',
            selection: false
        });

        // ZOOM & PAN LOGIC
        canvas.on('mouse:wheel', function(opt) {
            let delta = opt.e.deltaY;
            let zoom = canvas.getZoom() * (0.999 ** delta);
            if (zoom > 20) zoom = 20; if (zoom < 0.01) zoom = 0.01;
            canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
            opt.e.preventDefault(); opt.e.stopPropagation();
        });

        canvas.on('mouse:down', function(opt) {
            if (opt.e.altKey || !canvas.findTarget(opt.e)) {
                this.isDragging = true;
                this.lastPosX = opt.e.clientX || opt.e.touches[0].clientX;
                this.lastPosY = opt.e.clientY || opt.e.touches[0].clientY;
            }
        });
        canvas.on('mouse:move', function(opt) {
            if (this.isDragging) {
                let e = opt.e;
                let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                this.viewportTransform[4] += clientX - this.lastPosX;
                this.viewportTransform[5] += clientY - this.lastPosY;
                this.requestRenderAll();
                this.lastPosX = clientX; this.lastPosY = clientY;
            }
        });
        canvas.on('mouse:up', function() { this.isDragging = false; });
    }

    // --- GOOGLE DRIVE LOGIC ---
    function gapiLoaded() { gapi.load('client', () => gapi.client.init({apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]})); }
    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (res) => { saveToken(res.access_token, res.expires_in); startApp(); }
        });
        if (accessToken && Date.now() < localStorage.getItem('ex')) startApp();
    }
    function saveToken(t, e) { accessToken = t; localStorage.setItem('at', t); localStorage.setItem('ex', Date.now() + (e*1000)); }

    async function startApp() {
        gapi.client.setToken({ access_token: accessToken });
        document.getElementById('authBtn').innerText = "✅ DRIVE OK";
        initCanvas();
        const res = await gapi.client.drive.files.list({ q: "name='LaserApp' and mimeType='application/vnd.google-apps.folder' and trashed=false" });
        rootId = res.result.files.length ? res.result.files[0].id : (await gapi.client.drive.files.create({resource:{name:'LaserApp', mimeType:'application/vnd.google-apps.folder'}})).result.id;
        loadProjects();
    }

    async function loadProjects() {
        const list = document.getElementById('project-list');
        list.innerHTML = "";
        const res = await gapi.client.drive.files.list({ q: `'${rootId}' in parents and trashed=false`, orderBy: 'name' });
        res.result.files.forEach(f => {
            const div = document.createElement('div');
            div.className = 'project-item';
            div.innerText = "📁 " + f.name;
            div.onclick = () => openProject(f.id, div);
            list.appendChild(div);
        });
    }

    async function openProject(folderId, el) {
        currentFolderId = folderId;
        document.querySelectorAll('.project-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('photo-strip').style.display = 'flex';
        loadPhotos();
    }

    async function loadPhotos() {
        const container = document.getElementById('thumbs-container');
        container.innerHTML = "";
        const res = await gapi.client.drive.files.list({ q: `'${currentFolderId}' in parents and mimeType contains 'image/' and trashed=false` });
        
        res.result.files.forEach(async (file, idx) => {
            const wrap = document.createElement('div');
            wrap.className = 'thumb-wrap';
            
            const img = document.createElement('img');
            img.className = 'thumb';
            const url = await fetchPhoto(file.id);
            img.src = url;
            
            const del = document.createElement('button');
            del.className = 'del-btn';
            del.innerHTML = '×';
            del.onclick = (e) => { e.stopPropagation(); deleteFile(file.id); };

            img.onclick = () => setCanvasImage(url, img);
            wrap.append(img, del);
            container.appendChild(wrap);
            if (idx === 0) setCanvasImage(url, img);
        });
    }

    async function fetchPhoto(id) {
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, { headers: { 'Authorization': 'Bearer ' + accessToken } });
        return URL.createObjectURL(await res.blob());
    }

    function setCanvasImage(url, thumbEl) {
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumbEl.classList.add('active');
        
        fabric.Image.fromURL(url, (img) => {
            const ratio = Math.min(canvas.width / img.width, canvas.height / img.height);
            canvas.clear();
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                scaleX: ratio, scaleY: ratio, originX: 'left', originY: 'top'
            });
            canvas.setZoom(1);
            canvas.viewportTransform = [1, 0, 0, 1, 0, 0];
        });
    }

    async function deleteFile(id) {
        if (!confirm("Видалити це фото?")) return;
        await gapi.client.drive.files.delete({ fileId: id });
        loadPhotos();
    }

    // --- ДОДАВАННЯ ---
    document.getElementById('newProjectBtn').onclick = () => document.getElementById('fileInp').click();
    document.getElementById('fileInp').onchange = async (e) => {
        const name = prompt("Назва об'єкта:");
        if (!name || !e.target.files[0]) return;
        const folder = await gapi.client.drive.files.create({resource:{name: name, mimeType:'application/vnd.google-apps.folder', parents:[rootId]}});
        await uploadPhoto(e.target.files[0], folder.result.id);
        loadProjects();
    };
    document.getElementById('extraFileInp').onchange = async (e) => {
        for (let file of e.target.files) await uploadPhoto(file, currentFolderId);
        loadPhotos();
    };

    async function uploadPhoto(file, folderId) {
        const meta = { name: `img_${Date.now()}.jpg`, parents: [folderId] };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
        form.append('file', file);
        return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method:'POST', headers:{'Authorization':'Bearer '+accessToken}, body:form
        });
    }

    document.getElementById('authBtn').onclick = () => tokenClient.requestAccessToken();
    window.addEventListener('resize', () => {
        if(canvas) {
            canvas.setDimensions({ width: document.getElementById('canvas-wrapper').clientWidth, height: document.getElementById('canvas-wrapper').clientHeight });
        }
    });

let isDrawingMode = false;
    let firstPoint = null;

    // Ініціалізація кнопок малювання
    document.getElementById('drawModeBtn').onclick = function() {
        isDrawingMode = !isDrawingMode;
        this.style.background = isDrawingMode ? "#30D158" : "#FF9500";
        canvas.selection = !isDrawingMode; // вимикаємо виділення рамкою в режимі малювання
    };

    document.getElementById('delObjBtn').onclick = deleteSelected;

// Оновлена логіка натискань для усунення конфлікту
    function setupEngineeringLogic() {
        canvas.on('mouse:down', function(opt) {
            const pointer = canvas.getPointer(opt.e);
            const target = canvas.findTarget(opt.e);

            // 1. Якщо ми в режимі малювання і НЕ натиснули на вже існуючу точку/текст
            if (isDrawingMode && !target) {
                this.isDragging = false; // Забороняємо перетягування, якщо ставимо точку
                
                if (!firstPoint) {
                    firstPoint = pointer;
                    const tempDot = new fabric.Circle({
                        left: pointer.x, top: pointer.y, radius: 4, fill: '#FF9500',
                        originX: 'center', originY: 'center', id: 'temp', selectable: false
                    });
                    canvas.add(tempDot);
                } else {
                    createDimensionLine(firstPoint, pointer);
                    canvas.getObjects().forEach(obj => { if(obj.id === 'temp') canvas.remove(obj); });
                    firstPoint = null;
                }
                return; // Виходимо, щоб не спрацював панорамування
            }

            // 2. Логіка панорамування (працює, якщо ми НЕ малюємо АБО натиснули порожнє місце)
            if (!target || opt.e.altKey) {
                this.isDragging = true;
                this.selection = false;
                this.lastPosX = opt.e.clientX || (opt.e.touches ? opt.e.touches[0].clientX : 0);
                this.lastPosY = opt.e.clientY || (opt.e.touches ? opt.e.touches[0].clientY : 0);
            }
        });

        canvas.on('mouse:move', function(opt) {
            if (this.isDragging) {
                let e = opt.e;
                let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                
                this.viewportTransform[4] += clientX - this.lastPosX;
                this.viewportTransform[5] += clientY - this.lastPosY;
                this.requestRenderAll();
                
                this.lastPosX = clientX;
                this.lastPosY = clientY;
            }
        });

        canvas.on('mouse:up', function() {
            this.isDragging = false;
        });
    }

    function createDimensionLine(p1, p2) {
        // Створюємо вузли (точки), які можна рухати
        const node1 = new fabric.Circle({
            left: p1.x, top: p1.y, radius: 12, fill: 'rgba(255,149,0,0.6)',
            originX: 'center', originY: 'center', hasControls: false, hasBorders: false
        });
        const node2 = new fabric.Circle({
            left: p2.x, top: p2.y, radius: 12, fill: 'rgba(255,149,0,0.6)',
            originX: 'center', originY: 'center', hasControls: false, hasBorders: false
        });

        // Лінія
        const line = new fabric.Line([p1.x, p1.y, p2.x, p2.y], {
            stroke: '#FF9500', strokeWidth: 3, selectable: false, evented: false
        });

        // Текст (розмір)
        const text = new fabric.Text('0.000', {
            fontSize: 20, fill: 'white', backgroundColor: 'black',
            originX: 'center', originY: 'center', selectable: true, hasControls: false
        });

        // Групуємо логічно (не через fabric.Group, а через посилання)
        const lineGroup = { node1, node2, line, text };
        node1.lineGroup = node2.lineGroup = text.lineGroup = lineGroup;

        // Клік на текст для ручного вводу
        text.on('mousedown', () => {
            const val = prompt("Введіть розмір (м):", text.text);
            if (val !== null) text.set('text', val);
            canvas.renderAll();
        });

        canvas.add(line, text, node1, node2);
        updateLinePos(lineGroup);
    }

    function updateLinePos(lg) {
        lg.line.set({ x1: lg.node1.left, y1: lg.node1.top, x2: lg.node2.left, y2: lg.node2.top });
        
        // Текст завжди посередині
        lg.text.set({
            left: (lg.node1.left + lg.node2.left) / 2,
            top: (lg.node1.top + lg.node2.top) / 2
        });
        
        lg.line.setCoords();
        canvas.renderAll();
    }

    function deleteSelected() {
        const active = canvas.getActiveObject();
        if (!active) return;

        if (active.lineGroup) {
            const lg = active.lineGroup;
            canvas.remove(lg.node1, lg.node2, lg.line, lg.text);
        } else {
            canvas.remove(active);
        }
        canvas.discardActiveObject().renderAll();
    }

    // Виклич setupEngineeringLogic() всередині initCanvas()



    
</script>

<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
