<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Pro - Fixed Precision</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        :root { --blue: #0A84FF; --bg: #1c1c1e; --item: #2c2c2e; --orange: #FF9500; --red: #FF453A; --green: #30D158; }
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: #000; color: white; overflow: hidden; }
        #sidebar { width: 260px; background: var(--bg); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 8px; }
        #project-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .project-item { padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; background: var(--item); font-size: 14px; border: 1px solid transparent; }
        .project-item.active { border-color: var(--blue); background: #3a3a3c; }
        #main-area { flex-grow: 1; display: flex; flex-direction: column; background: #111; position: relative; }
        #canvas-wrapper { flex-grow: 1; position: relative; touch-action: none; }
        #photo-strip { height: 110px; background: var(--bg); border-top: 1px solid #333; display: flex; gap: 12px; padding: 10px; overflow-x: auto; }
        .thumb { height: 85px; width: 85px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
        .thumb.active { border-color: var(--blue); }
        .btn { padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 13px; text-align: center; }
        .btn-orange { background: var(--orange); }
        .btn-blue { background: var(--blue); }
        .btn-red { background: var(--red); }
        .btn-dark { background: #3a3a3c; }
        #status-bar { font-size: 11px; color: var(--green); padding: 5px; text-align: center; background: #000; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <button id="authBtn" class="btn btn-dark">🔑 Google Drive</button>
            <button id="newProjectBtn" class="btn btn-dark">➕ НОВИЙ ОБ'ЄКТ</button>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <button id="drawModeBtn" class="btn btn-orange" style="flex: 2;">➕ РОЗМІР22</button>
                <button id="delObjBtn" class="btn btn-red" style="flex: 1;">🗑️</button>
            </div>
            <button id="exportBtn" class="btn btn-blue" style="margin-top: 5px;">📥 ЗБЕРЕГТИ ФОТО З ЛІНІЯМИ</button>
        </div>
        <div id="project-list"></div>
        <div id="status-bar">LaserApp: Ready</div>
    </div>

    <div id="main-area">
        <div id="canvas-wrapper"><canvas id="c"></canvas></div>
        <div id="photo-strip" style="display: none;">
            <div id="thumbs-container" style="display: flex; gap: 12px;"></div>
        </div>
    </div>

<script>
    // Базові налаштування API (залишаються ваші)
    const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
    const SCOPES = "https://www.googleapis.com/auth/drive.file";

    let canvas, tokenClient, accessToken = localStorage.getItem('at'), currentPhotoId = null;
    let isDrawingMode = false, firstPoint = null;

    function gapiLoaded() { gapi.load('client', () => gapi.client.init({apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]})); }
    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (res) => { accessToken = res.access_token; startApp(); }
        });
        if (accessToken) startApp();
    }

    async function startApp() {
        gapi.client.setToken({ access_token: accessToken });
        document.getElementById('authBtn').innerText = "✅ ONLINE";
        initCanvas();
        // (Тут має бути ваш код завантаження папок)
    }

    function initCanvas() {
        const wrapper = document.getElementById('canvas-wrapper');
        canvas = new fabric.Canvas('c', { 
            width: wrapper.clientWidth, 
            height: wrapper.clientHeight, 
            selection: false,
            backgroundColor: '#111' 
        });
        
        setupInteractions();
    }

    function setupInteractions() {
        canvas.on('mouse:down', function(opt) {
            const target = canvas.findTarget(opt.e);
            if (target) return; // Дозволяємо Fabric обробляти клік по об'єкту

            if (isDrawingMode) {
                const pointer = canvas.getPointer(opt.e);
                if (!firstPoint) {
                    firstPoint = pointer;
                } else {
                    createDimension(firstPoint, pointer);
                    firstPoint = null;
                }
                return;
            }
            
            // Початок руху фото
            this.isDragging = true;
            this.lastPosX = opt.e.clientX || (opt.e.touches ? opt.e.touches[0].clientX : 0);
            this.lastPosY = opt.e.clientY || (opt.e.touches ? opt.e.touches[0].clientY : 0);
        });

        canvas.on('mouse:move', function(opt) {
            if (this.isDragging) {
                const e = opt.e;
                const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                
                this.viewportTransform[4] += clientX - this.lastPosX;
                this.viewportTransform[5] += clientY - this.lastPosY;
                
                this.requestRenderAll();
                this.lastPosX = clientX;
                this.lastPosY = clientY;
                
                // КРИТИЧНО: оновлюємо координати об'єктів після зсуву
                canvas.forEachObject(obj => obj.setCoords());
            } else if (opt.target && opt.target.owner) {
                updateDimension(opt.target.owner);
            }
        });

        canvas.on('mouse:up', () => {
            canvas.isDragging = false;
            canvas.forEachObject(obj => obj.setCoords());
        });
    }

    function createDimension(p1, p2, val = "0.000") {
        const common = { radius: 12, fill: 'rgba(255,149,0,0.7)', originX: 'center', originY: 'center', hasControls: false, hasBorders: false };
        const n1 = new fabric.Circle({ ...common, left: p1.x, top: p1.y, role: 'node' });
        const n2 = new fabric.Circle({ ...common, left: p2.x, top: p2.y, role: 'node' });
        const line = new fabric.Line([p1.x, p1.y, p2.x, p2.y], { stroke: '#FF9500', strokeWidth: 3, selectable: false });
        const text = new fabric.Text(val, { fontSize: 22, fill: 'white', backgroundColor: 'black', originX: 'center', originY: 'center', hasControls: false });

        const owner = { n1, n2, line, text };
        n1.owner = n2.owner = text.owner = owner;
        
        text.on('mousedown', () => {
            const v = prompt("Розмір:", text.text);
            if (v) { text.set('text', v); canvas.renderAll(); }
        });

        canvas.add(line, text, n1, n2);
        updateDimension(owner);
    }

    function updateDimension(o) {
        o.line.set({ x1: o.n1.left, y1: o.n1.top, x2: o.n2.left, y2: o.n2.top });
        o.text.set({ left: (o.n1.left + o.n2.left)/2, top: (o.n1.top + o.n2.top)/2 });
        o.line.setCoords(); o.text.setCoords();
        canvas.renderAll();
    }

    function exportImage() {
        if (!canvas.backgroundImage) return;
        
        document.getElementById('status-bar').innerText = "⌛ Експорт...";
        
        const img = canvas.backgroundImage;
        // Створюємо прихований StaticCanvas з розміром ОРИГІНАЛЬНОГО фото
        const exportCanvas = new fabric.StaticCanvas(null, {
            width: img.width,
            height: img.height
        });

        // Кладемо оригінальне фото як фон без жодного масштабування (scale 1)
        exportCanvas.setBackgroundImage(img.getSrc(), exportCanvas.renderAll.bind(exportCanvas), {
            originX: 'left',
            originY: 'top',
            scaleX: 1,
            scaleY: 1
        });

        // Рахуємо реальний масштаб фону на екрані, щоб правильно перенести точки
        const screenScale = img.scaleX; 

        canvas.getObjects().forEach(obj => {
            if (obj.owner && obj === obj.owner.n1) {
                const o = obj.owner;
                
                // Перераховуємо координати для оригінального розміру
                const x1 = o.n1.left / screenScale;
                const y1 = o.n1.top / screenScale;
                const x2 = o.n2.left / screenScale;
                const y2 = o.n2.top / screenScale;

                const l = new fabric.Line([x1, y1, x2, y2], { stroke: '#FF9500', strokeWidth: 5 });
                const t = new fabric.Text(o.text.text, { 
                    left: (x1+x2)/2, top: (y1+y2)/2, 
                    fontSize: 40, fill: 'white', backgroundColor: 'black', originX: 'center' 
                });
                
                // Додаємо точки-маркери
                const c1 = new fabric.Circle({ left: x1, top: y1, radius: 10, fill: '#FF9500', originX: 'center', originY: 'center' });
                const c2 = new fabric.Circle({ left: x2, top: y2, radius: 10, fill: '#FF9500', originX: 'center', originY: 'center' });

                exportCanvas.add(l, t, c1, c2);
            }
        });

        setTimeout(() => {
            const dataURL = exportCanvas.toDataURL({ format: 'jpeg', quality: 0.95 });
            const link = document.createElement('a');
            link.download = `laser_plan_${Date.now()}.jpg`;
            link.href = dataURL;
            link.click();
            document.getElementById('status-bar').innerText = "✅ Готово";
        }, 500);
    }

    document.getElementById('exportBtn').onclick = exportImage;
    document.getElementById('drawModeBtn').onclick = function() {
        isDrawingMode = !isDrawingMode;
        this.style.background = isDrawingMode ? "var(--green)" : "var(--orange)";
    };
    
    // Запуск скриптів Google
    window.gapiLoaded = gapiLoaded;
    window.gisLoaded = gisLoaded;
</script>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
