<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive Authentication and Photo Gallery</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        #gallery { position: relative; width: 100%; height: 400px; }
        .photo { position: absolute; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <h1>Google Drive Photo Gallery</h1>
    <div id="gallery"></div>
    <button id="next-button">Next Photo</button>
    <button id="prev-button">Previous Photo</button>
    
    <script>
        const CLIENT_ID = 'YOUR_CLIENT_ID';
        const API_KEY = 'YOUR_API_KEY';
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
        let photos = [];
        let currentIndex = 0;

        function handleClientLoad() {
            gapi.load('client:auth2', initClient);
        }

        async function initClient() {
            await gapi.client.init({
                apiKey: API_KEY,
                clientId: CLIENT_ID,
                scope: SCOPES,
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
            });
            listFiles();
        }

        async function listFiles() {
            const response = await gapi.client.drive.files.list({
                q: "mimeType='image/jpeg'",
                fields: 'files(id, name, webContentLink)'
            });
            photos = response.result.files;
            if (photos.length > 0) {
                loadPhoto(currentIndex);
            }
        }

        function loadPhoto(index) {
            const photo = photos[index];
            const img = document.createElement('img');
            img.src = photo.webContentLink;
            img.className = 'photo';
            img.style.display = 'block';
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = ''; // Clear previous photo
            gallery.appendChild(img);
        }

        document.getElementById('next-button').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % photos.length;
            loadPhoto(currentIndex);
        });

        document.getElementById('prev-button').addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + photos.length) % photos.length;
            loadPhoto(currentIndex);
        });

        handleClientLoad();
    </script>
</body>
</html>
