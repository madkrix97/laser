<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Pro - Multi-Photo</title>
    <style>
        :root { --blue: #0A84FF; --bg: #1c1c1e; --item: #2c2c2e; }
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: #000; color: white; overflow: hidden; }
        
        #sidebar { width: 260px; background: var(--bg); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        #project-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        
        .project-item { 
            padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; 
            background: var(--item); border: 1px solid transparent; font-size: 14px;
        }
        .project-item.active { border-color: var(--blue); background: #3a3a3c; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; background: #111; }
        #canvas-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #main-image { max-width: 95%; max-height: 95%; object-fit: contain; display: none; }

        /* Стрічка з фото (Галерея) */
        #photo-strip { height: 100px; background: var(--bg); border-top: 1px solid #333; display: flex; gap: 10px; padding: 10px; overflow-x: auto; align-items: center; }
        .thumb { height: 80px; width: 80px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
        .thumb.active { border-color: var(--blue); }
        .add-photo-btn { height: 80px; width: 80px; background: #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; flex-shrink: 0; }

        button { padding: 10px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; }
        .secondary { background: #3a3a3c; font-size: 12px; }
        #status { font-size: 11px; color: #888; padding: 5px; text-align: center; background: #000; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <button id="authBtn">🔑 Google Вхід</button>
            <button id="newProjectBtn" class="secondary">➕ НОВИЙ ОБ'ЄКТ</button>
        </div>
        <div id="project-list"></div>
        <div id="status">Завантаження...</div>
    </div>

    <div id="main-area">
        <div id="canvas-container">
            <div id="msg" style="color:#444">Оберіть об'єкт ліворуч</div>
            <img id="main-image">
        </div>
        
        <div id="photo-strip" style="display: none;">
            <div class="add-photo-btn" id="addMorePhotos" title="Додати фото в цей проект">+</div>
            <div id="thumbs-container" style="display: flex; gap: 10px;"></div>
        </div>
    </div>

    <input type="file" id="fileInp" accept="image/*">
    <input type="file" id="extraFileInp" accept="image/*" multiple>

<script>
    const CLIENT_ID = '300326529737-03b44mmra75ht9o3dmgbb5n8c0maqm0q.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyAYJo_Pcfot5LBrgm4IoakySM3XdGOxplo';
    const SCOPES = "https://www.googleapis.com/auth/drive.file";

    let accessToken = localStorage.getItem('at'), rootId = null, currentFolderId = null;

    // --- ІНІЦІАЛІЗАЦІЯ ---
    function gapiLoaded() { gapi.load('client', () => gapi.client.init({apiKey: API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]})); }
    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (res) => { saveToken(res.access_token, res.expires_in); startApp(); }
        });
        if (accessToken && Date.now() < localStorage.getItem('ex')) startApp();
    }
    function saveToken(t, e) { accessToken = t; localStorage.setItem('at', t); localStorage.setItem('ex', Date.now() + (e*1000)); }

    async function startApp() {
        gapi.client.setToken({ access_token: accessToken });
        document.getElementById('authBtn').innerText = "✅ ОНЛАЙН";
        const res = await gapi.client.drive.files.list({ q: "name='LaserApp' and mimeType='application/vnd.google-apps.folder' and trashed=false" });
        rootId = res.result.files.length ? res.result.files[0].id : (await gapi.client.drive.files.create({resource:{name:'LaserApp', mimeType:'application/vnd.google-apps.folder'}})).result.id;
        loadProjects();
    }

    // --- ПРОЕКТИ ---
    async function loadProjects() {
        const list = document.getElementById('project-list');
        list.innerHTML = "";
        const res = await gapi.client.drive.files.list({ q: `'${rootId}' in parents and trashed=false`, orderBy: 'name' });
        res.result.files.forEach(f => {
            const div = document.createElement('div');
            div.className = 'project-item';
            div.innerText = "📁 " + f.name;
            div.onclick = () => openProject(f.id, div);
            list.appendChild(div);
        });
    }

    // Створення нового об'єкта (з першим фото)
    document.getElementById('newProjectBtn').onclick = () => document.getElementById('fileInp').click();
    document.getElementById('fileInp').onchange = async (e) => {
        const name = prompt("Назва об'єкта:");
        if (!name || !e.target.files[0]) return;
        const folder = await gapi.client.drive.files.create({resource:{name: name, mimeType:'application/vnd.google-apps.folder', parents:[rootId]}});
        await uploadPhoto(e.target.files[0], folder.result.id);
        loadProjects();
    };

    // --- ГАЛЕРЕЯ (ФОТО ВСЕРЕДИНІ ПРОЕКТУ) ---
    async function openProject(folderId, el) {
        currentFolderId = folderId;
        document.querySelectorAll('.project-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('photo-strip').style.display = 'flex';
        loadPhotos();
    }

    async function loadPhotos() {
        const container = document.getElementById('thumbs-container');
        container.innerHTML = "Чит...";
        const res = await gapi.client.drive.files.list({ q: `'${currentFolderId}' in parents and mimeType contains 'image/' and trashed=false` });
        container.innerHTML = "";
        
        if (res.result.files.length) {
            res.result.files.forEach((file, idx) => {
                const img = document.createElement('img');
                img.className = 'thumb';
                // Завантажуємо прев'ю
                fetchPhoto(file.id).then(url => {
                    img.src = url;
                    if (idx === 0) displayMain(url, img); // показуємо перше фото відразу
                });
                img.onclick = () => displayMain(img.src, img);
                container.appendChild(img);
            });
        }
    }

    async function fetchPhoto(id) {
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, { headers: { 'Authorization': 'Bearer ' + accessToken } });
        return URL.createObjectURL(await res.blob());
    }

    function displayMain(url, thumbEl) {
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumbEl.classList.add('active');
        const main = document.getElementById('main-image');
        main.src = url;
        main.style.display = 'block';
        document.getElementById('msg').style.display = 'none';
    }

    // Додавання нових фото в існуючий проект
    document.getElementById('addMorePhotos').onclick = () => document.getElementById('extraFileInp').click();
    document.getElementById('extraFileInp').onchange = async (e) => {
        for (let file of e.target.files) {
            await uploadPhoto(file, currentFolderId);
        }
        loadPhotos();
    };

    async function uploadPhoto(file, folderId) {
        const meta = { name: `photo_${Date.now()}.jpg`, parents: [folderId] };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
        form.append('file', file);
        return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method:'POST', headers:{'Authorization':'Bearer '+accessToken}, body:form
        });
    }

    document.getElementById('authBtn').onclick = () => tokenClient.requestAccessToken();
</script>

<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
