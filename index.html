function setStatus(msg, timeout=2000){
    const s=document.getElementById('status-bar');
    s.innerText=msg;
    if(timeout>0) setTimeout(()=>{s.innerText="Готово";},timeout);

function updateNetStatus(state){
    const dot = document.querySelector('#net-status .dot');
    const text = document.querySelector('#net-status .text');
    if(state === "online") { dot.style.background = "#30D158"; text.textContent = "ONLINE"; }
    else if(state === "sync") { dot.style.background = "#FF9500"; text.textContent = "SYNCING..."; }
    else { dot.style.background = "#FF453A"; text.textContent = "OFFLINE"; }

// ---------------- ЛОКАЛЬНА РОБОТА ----------------

function saveToLocal() {
    if (!currentPhotoId || !canvas || !canvas.backgroundImage) return;
    const img = canvas.backgroundImage;
    const scale = img.scaleX;

    // Точний розрахунок відступів фону для координат
    const offsetX = (canvas.width / 2) - (img.width * scale / 2);
    const offsetY = (canvas.height / 2) - (img.height * scale / 2);

    const data = canvas.getObjects().filter(o => o.role === 'node' && o.owner).map(node => {
        if (node === node.owner.n1) {
            return {
                p1: { x: (node.owner.n1.left - offsetX) / scale, y: (node.owner.n1.top - offsetY) / scale },
                p2: { x: (node.owner.n2.left - offsetX) / scale, y: (node.owner.n2.top - offsetY) / scale },
                val: node.owner.text.text
            };
        }
        return null;
    }).filter(n => n);

    lineDataCache[currentPhotoId] = data;
    localStorage.setItem('laser_offline_cache', JSON.stringify(lineDataCache));
    setStatus("💾 Збережено локально");
}

// ---------------- DRIVE SYNC ----------------

async function syncAll() {
    if (!currentFolderId || !navigator.onLine) { alert("Немає зв'язку або не обрано проект!"); return; }
    updateNetStatus("sync");
    setStatus("☁️ Синхронізація...");

    try {
        for (const photoId in lineDataCache) {
            const data = lineDataCache[photoId];
            if(!data || data.length === 0) continue;
            const fileName = `data_${photoId}.json`;
            const content = JSON.stringify(data);

            const res = await gapi.client.drive.files.list({
                q: `name='${fileName}' and '${currentFolderId}' in parents and trashed=false`
            });

            if (res.result.files.length > 0) {
                await fetch(`https://www.googleapis.com/upload/drive/v3/files/${res.result.files[0].id}?uploadType=media`, {
                    method: 'PATCH', headers: { 'Authorization': 'Bearer ' + accessToken }, body: content
                });
            } else {
                const meta = { name: fileName, parents: [currentFolderId] };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                form.append('file', new Blob([content], { type: 'application/json' }));
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken }, body: form
                });
            }
        }
        setStatus("✅ Синхронізовано!");
        updateNetStatus("online");
    } catch (e) { setStatus("❌ Помилка Sync"); updateNetStatus("online"); }
}

// ---------------- CANVAS LOGIC ----------------
function initCanvas() {
    const wrapper = document.getElementById('canvas-wrapper');
    if (canvas) canvas.dispose();

    canvas = new fabric.Canvas('c', {
        width: wrapper.clientWidth,
        height: wrapper.clientHeight,
        selection: false,
        backgroundColor: '#111',
        allowTouchScrolling: false,
    });

    canvas.targetFindTolerance = 25; // Трохи збільшив для легшого підбору
    canvas.perPixelTargetFind = false;

    let isMultiTouch = false;
    let lastTouchDist = 0;
    let lastTouchMid = { x: 0, y: 0 };
    
    // Посилання на елементи лупи (ті, що ми створили вище)
    const mag = document.getElementById('magnifier');
    const mCanvas = mag.querySelector('canvas');

    canvas.on('mouse:wheel', function(opt) {
        const delta = opt.e.deltaY;
        let zoom = canvas.getZoom() * (0.999 ** delta);
        if (zoom > 20) zoom = 20;
        if (zoom < 0.05) zoom = 0.05;
        canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
        opt.e.preventDefault();
        opt.e.stopPropagation();
    });

    canvas.on('mouse:down', function(opt) {
        const evt = opt.e;

        if (evt.touches && evt.touches.length === 2) {
            isMultiTouch = true;
            firstPoint = null; 
            canvas.discardActiveObject();
            mag.style.display = 'none'; // Ховаємо лупу при зумі
            
            lastTouchDist = Math.hypot(
                evt.touches[0].clientX - evt.touches[1].clientX,
                evt.touches[0].clientY - evt.touches[1].clientY
            );
            lastTouchMid = {
                x: (evt.touches[0].clientX + evt.touches[1].clientX) / 2,
                y: (evt.touches[0].clientY + evt.touches[1].clientY) / 2
            };
            canvas.requestRenderAll();
            return;
        }

        // ПОКАЗУЄМО ЛУПУ при натисканні на вузол
        if (opt.target && opt.target.role === 'node') {
            mag.style.display = 'block';
        }

        if (isDrawingMode && !isMultiTouch) {
            if (opt.target) return; 
            const pointer = canvas.getPointer(evt);
            if (!firstPoint) {
                firstPoint = { x: pointer.x, y: pointer.y };
            } else {
                createDimension(firstPoint, { x: pointer.x, y: pointer.y }, "0.000");
                firstPoint = null;
                canvas.discardActiveObject();
                canvas.requestRenderAll();
            }
            return;
        }

        if (!isDrawingMode && opt.target && opt.target.type === 'text') {
            const t = opt.target;
            setTimeout(() => {
                const v = prompt("Введіть розмір:", t.text);
                if (v !== null && v.trim() !== "") {
                    t.set('text', v);
                    canvas.renderAll();
                    saveToLocal();
                }
            }, 100);
        }
    });

    canvas.on('mouse:move', function(opt) {
        const evt = opt.e;

        // ЛОГІКА ЛУПИ ПРИ РУСІ
        if (opt.target && opt.target.role === 'node' && !isMultiTouch) {
            const pointer = canvas.getPointer(evt);
            const touch = evt.touches ? evt.touches[0] : evt;
            
            // Позиція віконця лупи (над пальцем)
            mag.style.left = (touch.clientX - 75) + 'px';
            mag.style.top = (touch.clientY - 160) + 'px'; // 160px вище точки дотику

            // Малюємо вміст у лупу
            const zoom = 2.5; // Наскільки сильно збільшуємо
            const mCtx = mCanvas.getContext('2d');
            mCtx.fillStyle = '#111';
            mCtx.fillRect(0, 0, 150, 150);
            mCtx.save();
            mCtx.translate(75, 75);
            mCtx.scale(zoom * canvas.getZoom(), zoom * canvas.getZoom());
            mCtx.translate(-pointer.x, -pointer.y);
            canvas.renderCanvas(mCtx, canvas.getObjects());
            mCtx.restore();

            // Малюємо перехрестя в центрі лупи
            mCtx.strokeStyle = '#FF9500';
            mCtx.lineWidth = 1;
            mCtx.beginPath();
            mCtx.moveTo(75, 65); mCtx.lineTo(75, 85);
            mCtx.moveTo(65, 75); mCtx.lineTo(85, 75);
            mCtx.stroke();
        }

        if (isMultiTouch && evt.touches && evt.touches.length === 2) {
            const currentMid = {
                x: (evt.touches[0].clientX + evt.touches[1].clientX) / 2,
                y: (evt.touches[0].clientY + evt.touches[1].clientY) / 2
            };
            const vpt = canvas.viewportTransform;
            vpt[4] += currentMid.x - lastTouchMid.x;
            vpt[5] += currentMid.y - lastTouchMid.y;

            const currentDist = Math.hypot(
                evt.touches[0].clientX - evt.touches[1].clientX,
                evt.touches[0].clientY - evt.touches[1].clientY
            );
            const zoomDelta = currentDist / lastTouchDist;
            canvas.zoomToPoint({ x: currentMid.x, y: currentMid.y }, canvas.getZoom() * zoomDelta);

            lastTouchDist = currentDist;
            lastTouchMid = currentMid;
            canvas.requestRenderAll();
        }
    });

    canvas.on('mouse:up', () => {
        isMultiTouch = false;
        mag.style.display = 'none'; // Ховаємо лупу
    });

    canvas.on('object:moving', (e) => {
        if (e.target.owner) updateDimension(e.target.owner);
    });

    canvas.on('object:modified', saveToLocal);
}

function createDimension(p1, p2, val = "0") {
    const nodeProps = {
        radius: 22, // Достатньо для пальця
        fill: 'rgba(255, 149, 0, 0.03)', // Майже прозорий фон
        stroke: 'transparent',
        originX: 'center', 
        originY: 'center',
        hasControls: false,
        hasBorders: false,
        selectable: true,
        evented: true,
        role: 'node'
    };

    const n1 = new fabric.Circle({ ...nodeProps, left: p1.x, top: p1.y });
    const n2 = new fabric.Circle({ ...nodeProps, left: p2.x, top: p2.y });
    
    const line = new fabric.Line([p1.x, p1.y, p2.x, p2.y], {
        stroke: '#FF9500', 
        strokeWidth: 1.2, // Тонка акуратна лінія
        selectable: false,
        evented: false
    });

    const text = new fabric.Text(val, {
        fontSize: 13, // Компактний шрифт
        fill: '#FF9500', // Колір тексту як у ліній
        fontFamily: 'monospace',
        backgroundColor: 'rgba(17, 17, 17, 0.9)', // Темний фон під текстом
        originX: 'center', 
        originY: 'center',
        hasControls: false,
        hasBorders: false,
        selectable: true, 
        evented: true,
        padding: 4,
        rx: 4, ry: 4 // Заокруглення фону тексту (якщо Fabric версії 4+)
    });

    // Стиль засічок
    const tickProps = { 
        stroke: '#FF9500', 
        strokeWidth: 1.5, 
        selectable: false, 
        evented: false,
        strokeLineCap: 'round' 
    };
    const tick1 = new fabric.Line([0,0,0,0], tickProps);
    const tick2 = new fabric.Line([0,0,0,0], tickProps);

    const owner = { n1, n2, line, text, tick1, tick2 };
    n1.owner = n2.owner = text.owner = line.owner = tick1.owner = tick2.owner = owner;

    // Важливо: засічки і лінія під текстом і вузлами
    canvas.add(line, tick1, tick2, text, n1, n2);
    updateDimension(owner);
    
    canvas.discardActiveObject();
    canvas.requestRenderAll();
    saveToLocal();
}

    
function updateDimension(owner) {
    if (!owner) return;
    const { n1, n2, line, text, tick1, tick2 } = owner;
    
    // Оновлюємо основну лінію
    line.set({ x1: n1.left, y1: n1.top, x2: n2.left, y2: n2.top });

    // Позиція тексту (завжди посередині)
    const midX = (n1.left + n2.left) / 2;
    const midY = (n1.top + n2.top) / 2;
    text.set({ left: midX, top: midY });

    // Розрахунок засічок (під кутом 45° до лінії)
    const tickLength = 10; // Довжина засічки
    const angle = Math.atan2(n2.top - n1.top, n2.left - n1.left);
    
    // Кут засічки = кут лінії + 45 градусів (PI/4)
    const tAngle = angle + Math.PI / 2;

    const dx = Math.cos(tAngle) * (tickLength / 2);
    const dy = Math.sin(tAngle) * (tickLength / 2);

    function positionTick(tick, node) {
        tick.set({
            x1: node.left - dx,
            y1: node.top - dy,
            x2: node.left + dx,
            y2: node.top + dy
        });
        tick.setCoords();
    }

    positionTick(tick1, n1);
    positionTick(tick2, n2);

    // Оновлюємо координати об'єктів для коректного кліку
    n1.setCoords();
    n2.setCoords();
    text.setCoords();
}
    

async function downloadProjectData(folderId) {
    setStatus("⏳ Завантаження даних з хмари...");
    try {
        // Шукаємо всі файли, що починаються на data_ в цій папці
        const res = await gapi.client.drive.files.list({
            q: `'${folderId}' in parents and name contains 'data_' and trashed=false`,
            fields: 'files(id, name)'
        });

        if (res.result.files && res.result.files.length > 0) {
            for (const file of res.result.files) {
                // Отримуємо ID фото з назви файлу (data_ID.json)
                const photoId = file.name.replace('data_', '').replace('.json', '');
                
                // Завантажуємо вміст файлу
                const dataRes = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                const jsonData = await dataRes.json();
                
                // Записуємо в локальний кеш
                lineDataCache[photoId] = jsonData;
            }
            localStorage.setItem('laser_offline_cache', JSON.stringify(lineDataCache));
            setStatus("✅ Дані проекту імпортовано");
        }
    } catch (e) {
        console.error("Помилка завантаження даних:", e);
        setStatus("❌ Не вдалося підтягнути дані з Drive");
    }
}
    
function setMainImg(url, id, thumb){
    currentPhotoId=id;
    document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
    thumb.classList.add('active');

    fabric.Image.fromURL(url, (img)=>{
        const wrapper=document.getElementById('canvas-wrapper');
        canvas.setWidth(wrapper.clientWidth); canvas.setHeight(wrapper.clientHeight);
        const ratio=Math.min(canvas.width/img.width, canvas.height/img.height);
        
        img.set({ originX:'center', originY:'center', left:canvas.width/2, top:canvas.height/2, selectable:false, scaleX:ratio, scaleY:ratio });
        
        canvas.setBackgroundImage(img, ()=>{ 
            canvas.getObjects().forEach(o=>canvas.remove(o));
            const data = lineDataCache[id] || [];
            
            // Розрахунок зміщення фону для коректного відображення точок
            const offsetX = (canvas.width / 2) - (img.width * ratio / 2);
            const offsetY = (canvas.height / 2) - (img.height * ratio / 2);

            data.forEach(p => {
                createDimension(
                    {x: (p.p1.x * ratio) + offsetX, y: (p.p1.y * ratio) + offsetY},
                    {x: (p.p2.x * ratio) + offsetX, y: (p.p2.y * ratio) + offsetY},
                    p.val
                );
            });
            canvas.renderAll(); 
        });
    }, {crossOrigin:'anonymous'});
}


function exportCurrentPhoto() {
    if (!canvas || !currentPhotoId) {
        alert("Спочатку відкрийте фото!");
        return;
    }
    
    setStatus("🚀 Формування зображення...");

    // Створюємо "знімок" канвасу
    const dataURL = canvas.toDataURL({
        format: 'jpeg',
        quality: 0.9,
        multiplier: 1.5 // Робимо картинку чіткішою (1.5x від екранного розміру)
    });

    // Створюємо невидиме посилання для завантаження
    const link = document.createElement('a');
    link.download = `laser_export_${currentPhotoId}.jpg`;
    link.href = dataURL;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    setStatus("✅ Фото збережено!");
}

async function deleteCurrentPhoto() {
    if (!currentPhotoId || !currentFolderId) {
        alert("Оберіть фото для видалення");
        return;
    }

    const confirmDel = confirm("Видалити це фото та всі його розміри з Google Drive?");
    if (!confirmDel) return;

    setStatus("🗑️ Видалення...");

    try {
        // 1. Видаляємо саме фото
        await gapi.client.drive.files.delete({ fileId: currentPhotoId });

        // 2. Шукаємо і видаляємо всі JSON, що належать цьому фото
        const res = await gapi.client.drive.files.list({
            q: `name contains 'data_${currentPhotoId}' and '${currentFolderId}' in parents and trashed=false`
        });

        if (res.result.files && res.result.files.length > 0) {
            for (const file of res.result.files) {
                await gapi.client.drive.files.delete({ fileId: file.id });
            }
        }

        // 3. Очищуємо локальний кеш, щоб дані не "воскресли"
        delete lineDataCache[currentPhotoId];
        localStorage.setItem('laser_offline_cache', JSON.stringify(lineDataCache));

        setStatus("✅ Видалено");
        
        // 4. Оновлюємо інтерфейс
        canvas.clear();
        canvas.setBackgroundImage(null, canvas.renderAll.bind(canvas));
        currentPhotoId = null;
        loadPhotos(); // Перезавантажуємо стрічку прев'ю

    } catch (e) {
        console.error(e);
        setStatus("❌ Помилка видалення");
    }
}






    
    
// ---------------- AUTH & START ----------------

async function startApp(){
    if(!gapi.client) { 
        setTimeout(startApp, 500); 
        return; 
    }
    gapi.client.setToken({access_token:accessToken});
    
    // Оновлюємо вигляд кнопки, якщо ми залогінені
    const authBtn = document.getElementById('authBtn');
    if (accessToken) {
        authBtn.style.background = "var(--green)";
        authBtn.innerText = "👤";
    }

    initCanvas();
    
    try {
        const res = await gapi.client.drive.files.list({
            q: "name='LaserApp' and mimeType='application/vnd.google-apps.folder' and trashed=false"
        });
        
        if (res.result.files) {
            rootId = res.result.files.length ? res.result.files[0].id : (await gapi.client.drive.files.create({resource:{name:'LaserApp',mimeType:'application/vnd.google-apps.folder'}})).result.id;
            loadProjects();
            setStatus("Система готова");
        }
    } catch(e) { 
        console.error(e);
        setStatus("❌ Потрібна авторизація");
        authBtn.style.background = "var(--red)";
        authBtn.innerText = "🔑";
    }
}

function gapiLoaded(){ 
    gapi.load('client', async () => {
        await gapi.client.init({apiKey:API_KEY, discoveryDocs:["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]});
        if(accessToken) startApp();
    });
}
function gisLoaded(){
    tokenClient=google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: (res)=>{ accessToken=res.access_token; localStorage.setItem('at',accessToken); startApp(); }});
    if(accessToken && gapi.client) startApp();
}

// ---------------- PROJECTS ----------------

// 1. Відкриття/закриття меню
document.getElementById('project-dropdown').onclick = (e) => {
    const menu = document.getElementById('project-menu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    e.stopPropagation();
};

// Закриття меню при кліку поза ним
window.onclick = () => { document.getElementById('project-menu').style.display = 'none'; };

// 2. Оновлена функція завантаження проектів у випадаючий список
async function loadProjects(){
    const menu = document.getElementById('project-menu');
    menu.innerHTML = "";
    const res = await gapi.client.drive.files.list({
        q: `'${rootId}' in parents and trashed=false`, 
        orderBy:'name'
    });
    
    res.result.files.forEach(f => {
        const item = document.createElement('div');
        item.className = 'menu-item';
        item.innerText = "📂 " + f.name;
        item.onclick = async () => {
            document.getElementById('project-dropdown').innerHTML = f.name + " <small>▼</small>";
            currentFolderId = f.id;
            await downloadProjectData(f.id);
            loadPhotos();
        };
        menu.appendChild(item);
    });
}

async function loadPhotos(){
    const container=document.getElementById('thumbs-container'); container.innerHTML="";
    document.getElementById('photo-strip').style.display='flex';
    const res=await gapi.client.drive.files.list({q:`'${currentFolderId}' in parents and mimeType contains 'image/' and trashed=false`});
    res.result.files.forEach(async (file, idx)=>{
        const img=document.createElement('img'); img.className='thumb';
        const url=await fetchPhoto(file.id); img.src=url;
        img.onclick=()=>setMainImg(url, file.id, img);
        container.appendChild(img);
        if(idx===0) setMainImg(url, file.id, img);
    });
}

async function fetchPhoto(id){
    if(photoCache[id]) return photoCache[id];
    const res=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:{'Authorization':'Bearer '+accessToken}});
    const blob=await res.blob(); const url=URL.createObjectURL(blob);
    photoCache[id]=url; return url;
}

document.getElementById('exportBtn').onclick = exportCurrentPhoto;
document.getElementById('delPhotoBtn').onclick = deleteCurrentPhoto;
    
document.getElementById('authBtn').onclick=()=>tokenClient?.requestAccessToken();
document.getElementById('syncBtn').onclick=syncAll;
document.getElementById('clearCacheBtn').onclick=()=>{ if(confirm("Очистити локальні дані?")){ localStorage.removeItem('laser_offline_cache'); lineDataCache={}; location.reload(); }};

document.getElementById('drawModeBtn').onclick = function() {
    isDrawingMode = !isDrawingMode;
    
    // Візуальна індикація
    this.style.background = isDrawingMode ? "var(--green)" : "var(--orange)";
    
    // Скидаємо незавершену лінію при перемиканні режиму
    firstPoint = null;
    
    // Знімаємо виділення, щоб можна було відразу зумити
    if (canvas) {
        canvas.discardActiveObject();
        canvas.requestRenderAll();
    }
};

document.getElementById('delObjBtn').onclick = () => {
    const act = canvas.getActiveObject();
    if (act && act.owner) {
        const o = act.owner;
        // Додаємо tick1 та tick2 у список на видалення
        canvas.remove(o.n1, o.n2, o.line, o.text, o.tick1, o.tick2); 
        
        saveToLocal();
        canvas.discardActiveObject(); // Знімаємо виділення з видаленого об'єкта
        canvas.renderAll();
    }
};

document.getElementById('newProjectBtn').onclick = async () => {
    // 1. Перевірка авторизації
    if (!accessToken || !rootId) {
        alert("Будь ласка, спочатку пройдіть авторизацію (кнопка Drive Login)");
        return;
    }

    const name = prompt("Введіть назву нового об'єкта (проекту):");
    if (!name) return;

    setStatus("⏳ Створення папки...");

    try {
        // 2. Створення папки на Drive
        const response = await gapi.client.drive.files.create({
            resource: {
                name: name,
                mimeType: 'application/vnd.google-apps.folder',
                parents: [rootId]
            }
        });

        if (response.status === 200) {
            setStatus("✅ Об'єкт створено!");
            // 3. Оновлюємо список проектів, щоб побачити новий
            await loadProjects();
        }
    } catch (err) {
        console.error("Помилка створення проекту:", err);
        alert("Не вдалося створити папку. Перевірте з'єднання.");
        setStatus("❌ Помилка");
    }
};

// Коли ти обрав файли у вікні вибору:
document.getElementById('fileInp').onchange = async (e) => {
    const files = e.target.files;
    
    // Перевірка: чи вибрано проект і чи є інтернет
    if (!currentFolderId) {
        alert("Спочатку оберіть або створіть проект (папку)!");
        return;
    }
    if (!accessToken) {
        alert("Потрібна авторизація в Google Drive!");
        return;
    }

    setStatus(`⏳ Завантаження ${files.length} фото...`);

    for (let file of files) {
        try {
            // 1. Готуємо "паспорт" файлу (метадані)
            const metadata = {
                name: file.name,
                mimeType: file.type,
                parents: [currentFolderId] // Кладемо саме в папку поточного проекту
            };

            // 2. Формуємо запит для Google Drive
            const formData = new FormData();
            formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            formData.append('file', file);

            // 3. Відправляємо на сервер
            const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken },
                body: formData
            });

            if (!response.ok) throw new Error("Помилка завантаження");

            console.log(`Файл ${file.name} успішно завантажено`);

        } catch (err) {
            console.error("Помилка:", err);
            setStatus(`❌ Не вдалося завантажити ${file.name}`);
        }
    }

    setStatus("✅ Завантаження завершено!");
    
    // 4. Оновлюємо стрічку з прев'ю, щоб нові фото з'явилися внизу
    loadPhotos(); 
};

    
    

window.onload=()=>{
    const s1=document.createElement('script'); s1.src="https://apis.google.com/js/api.js"; s1.onload=gapiLoaded; document.body.appendChild(s1);
    const s2=document.createElement('script'); s2.src="https://accounts.google.com/gsi/client"; s2.onload=gisLoaded; document.body.appendChild(s2);
    const saved = localStorage.getItem('laser_offline_cache'); if(saved) lineDataCache=JSON.parse(saved);
};
