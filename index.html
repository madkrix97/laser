<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Engineering Mode</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { padding: 10px; background: #1c1c1e; display: flex; gap: 8px; justify-content: center; border-bottom: 1px solid #333; }
        button { padding: 12px 15px; border-radius: 10px; border: none; background: #007AFF; color: white; font-weight: bold; font-size: 13px; }
        .active { background: #FF9500 !important; }
        #canvas-container { flex-grow: 1; position: relative; touch-action: none; }
        #status { font-size: 11px; color: #888; text-align: center; padding: 5px; background: #1c1c1e; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button id="drawBtn">➕ НОВИЙ РОЗМІР</button>
        <button id="photoBtn">📷 ФОТО</button>
        <button id="delBtn" style="background:#FF3B30">🗑️ ВИДАЛИТИ</button>
        <input type="file" id="fileInp" style="display:none" accept="image/*">
    </div>

    <div id="canvas-container">
        <canvas id="c"></canvas>
    </div>
    <div id="status">Натисніть "Новий розмір" і поставте дві точки</div>

<script>
(function() {
    let canvas, isDrawing = false, firstPoint = null;

    window.onload = () => {
        canvas = new fabric.Canvas('c', {
            width: window.innerWidth,
            height: window.innerHeight - 85,
            backgroundColor: '#111',
            enableRetinaScaling: true,
            selection: false
        });

        // --- КНОПКИ ---
        document.getElementById('photoBtn').onclick = () => document.getElementById('fileInp').click();
        
        document.getElementById('drawBtn').onclick = function() {
            isDrawing = !isDrawing;
            this.classList.toggle('active', isDrawing);
            document.getElementById('status').innerText = isDrawing ? "Вкажіть першу точку" : "Режим редагування";
        };

        document.getElementById('delBtn').onclick = () => {
            const active = canvas.getActiveObject();
            if (active && active.role === 'anchor') {
                const pair = active.pair;
                canvas.remove(pair.p1, pair.p2, pair.line, pair.text);
                canvas.discardActiveObject().renderAll();
            }
        };

        // --- МАЛЮВАННЯ ---
        canvas.on('mouse:down', (opt) => {
            if (!isDrawing) return;
            const pointer = canvas.getPointer(opt.e);

            if (!firstPoint) {
                firstPoint = pointer;
                const dot = new fabric.Circle({
                    left: pointer.x, top: pointer.y, radius: 18, fill: 'rgba(255,255,0,0.4)',
                    originX: 'center', originY: 'center', selectable: false, id: 'temp'
                });
                canvas.add(dot);
            } else {
                createDimension(firstPoint, pointer);
                canvas.getObjects('circle').forEach(o => { if(o.id === 'temp') canvas.remove(o); });
                firstPoint = null;
                isDrawing = false;
                document.getElementById('drawBtn').classList.remove('active');
            }
        });

        function createDimension(p1Pos, p2Pos) {
            // Створюємо основні вузли (Точки)
            const p1 = new fabric.Circle({
                left: p1Pos.x, top: p1Pos.y, radius: 20, fill: '#FF9500',
                originX: 'center', originY: 'center', hasControls: false, role: 'anchor'
            });
            const p2 = new fabric.Circle({
                left: p2Pos.x, top: p2Pos.y, radius: 20, fill: '#FF9500',
                originX: 'center', originY: 'center', hasControls: false, role: 'anchor'
            });

            // Створюємо зв'язок (Лінія)
            const line = new fabric.Line([p1.left, p1.top, p2.left, p2.top], {
                stroke: '#FF9500', strokeWidth: 3, selectable: false, evented: false
            });

            // Створюємо підпис (Текст)
            const text = new fabric.Text('0.000', {
                fontSize: 22, fill: 'white', backgroundColor: 'rgba(0,0,0,0.8)',
                originX: 'center', originY: 'center', selectable: true, hasControls: false, padding: 5
            });

            // Зв'язуємо об'єкти між собою
            const pair = { p1, p2, line, text };
            p1.pair = p2.pair = text.pair = pair;

            // Додаємо можливість ручного вводу при кліку на текст
            text.on('mousedown', () => {
                const val = prompt("Введіть розмір (м):", text.text);
                if (val !== null) {
                    text.set('text', val);
                    canvas.renderAll();
                }
            });

            canvas.add(line, text, p1, p2);
            updatePair(pair);
        }

        // РУХ ТОЧОК
        canvas.on('object:moving', (e) => {
            if (e.target.pair) updatePair(e.target.pair);
        });

        function updatePair(pair) {
            pair.line.set({ x1: pair.p1.left, y1: pair.p1.top, x2: pair.p2.left, y2: pair.p2.top });
            pair.text.set({
                left: (pair.p1.left + pair.p2.left) / 2,
                top: (pair.p1.top + pair.p2.top) / 2
            });
            pair.line.setCoords();
            pair.text.setCoords();
        }

        // ФОТО
        document.getElementById('fileInp').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
                const r = Math.min(canvas.width/img.width, canvas.height/img.height);
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {scaleX:r, scaleY:r});
            });
            reader.readAsDataURL(e.target.files[0]);
        };
    };
})();
</script>
</body>
</html>
